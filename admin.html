<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f1a17">
  <title>Speylog · Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1a17;
      --bg2: #162320;
      --card: #1c2e28;
      --border: #2a4038;
      --primary: #5ee6a0;
      --primary-light: #1c3a2e;
      --text: #e8f0ec;
      --text-sec: #9bb5a8;
      --text-muted: #5f7d6e;
      --chip-bg: #243832;
      --chip-text: #8fc4a5;
      --danger: #f87171;
      --released: #5ee6a0;
      --kept: #f87171;
      --yellow: #fbbf24;
      --blue: #60a5fa;
      --pink: #f472b6;
      --radius: 12px;
      --radius-lg: 14px;
      --warn-bg: #2a2a1c;
      --danger-bg: #2e1c1c;
    }

    [data-theme="light"] {
      --bg: #f6f9f4;
      --bg2: #eef2eb;
      --card: #ffffff;
      --border: #e2eadf;
      --primary: #1a8a52;
      --primary-light: #e2f3e8;
      --text: #16271d;
      --text-sec: #5a7a64;
      --text-muted: #92a596;
      --chip-bg: #eef5ee;
      --chip-text: #3f6149;
      --danger: #c0492f;
      --released: #1a8a52;
      --kept: #c0492f;
      --yellow: #b45309;
      --blue: #1d4ed8;
      --pink: #be185d;
      --warn-bg: #fdf3e3;
      --danger-bg: #fdeaea;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 50;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .sub { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .dot-live {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
    }

    .container { padding: 24px 28px; max-width: 1200px; margin: 0 auto; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card .accent {
      position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      border-radius: 0 2px 2px 0;
    }
    .stat-card .label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .stat-card .value { font-size: 28px; font-weight: 700; line-height: 1; margin-top: 4px; }
    .stat-card .sub-val { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-wrap {
      position: relative;
      flex: 1 1 220px;
    }
    .search-wrap .icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 15px; pointer-events: none;
    }
    .search-input, .filter-select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      border-radius: 10px;
      outline: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px 10px 34px;
    }
    .filter-select {
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-muted);
    }
    .filter-select.active { color: var(--text); }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .table-header, .table-row {
      display: grid;
      grid-template-columns: 2fr 1fr 100px 80px 80px 90px;
      align-items: center;
      padding: 12px 20px;
    }
    .table-header {
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
    }
    .table-header span { cursor: pointer; user-select: none; }
    .table-row {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      padding: 14px 20px;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover { background: var(--primary-light); }

    /* ── Avatar ── */
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; flex-shrink: 0;
      font-size: 14px; letter-spacing: 0.5px;
    }
    .avatar.lg { width: 56px; height: 56px; font-size: 21px; }

    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .user-cell .name {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-cell .email {
      font-size: 12px; color: var(--text-muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Chips / Badges ── */
    .chip {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .chip .dot { width: 6px; height: 6px; border-radius: 50%; }
    .chip-role {
      background: var(--chip-bg);
      color: var(--chip-text);
    }
    .chip-active { background: var(--primary-light); color: var(--primary); }
    .chip-active .dot { background: var(--primary); }
    .chip-inactive { background: var(--warn-bg); color: var(--yellow); }
    .chip-inactive .dot { background: var(--yellow); }
    .chip-suspended { background: var(--danger-bg); color: var(--danger); }
    .chip-suspended .dot { background: var(--danger); }

    .count-big { font-size: 16px; font-weight: 700; }
    .count-muted { color: var(--text-muted); }
    .weight-val { font-size: 13px; color: var(--text-sec); }
    .date-val { font-size: 12px; color: var(--text-muted); }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      padding: 14px 4px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Detail View ── */
    .back-btn {
      background: none; border: none;
      color: var(--primary);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      padding: 0 0 20px;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Outfit', sans-serif;
    }

    .profile-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .profile-card .info { flex: 1; }
    .profile-card .info h2 { font-size: 22px; font-weight: 700; }
    .profile-card .info .email-line { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .profile-card .meta {
      display: flex; gap: 8px; margin-top: 10px;
      align-items: center; flex-wrap: wrap;
    }
    .profile-card .meta-text { font-size: 12px; color: var(--text-muted); }

    .tags { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
    .tag {
      font-size: 12px; color: var(--chip-text); background: var(--chip-bg);
      padding: 4px 10px; border-radius: 6px; font-weight: 500;
    }
    .tag-outline {
      background: var(--card);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }

    .catch-table {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .catch-table-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .catch-table-header h3 { font-size: 15px; font-weight: 700; }
    .catch-table-header .count { font-size: 12px; color: var(--text-muted); }

    .catch-cols {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
    }
    .catch-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .catch-row:last-child { border-bottom: none; }
    .c-date { color: var(--text-muted); width: 90px; flex-shrink: 0; font-size: 12px; }
    .c-river { color: var(--text); font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .c-species { color: var(--text-sec); width: 70px; text-align: center; flex-shrink: 0; }
    .c-length { color: var(--text); font-weight: 600; width: 55px; text-align: right; flex-shrink: 0; }
    .c-weight { color: var(--text-sec); width: 55px; text-align: right; flex-shrink: 0; }
    .c-status {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
    }
    .c-released { background: var(--primary-light); color: var(--released); }
    .c-kept { background: var(--danger-bg); color: var(--kept); }

    .empty-state {
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Auth ── */
    .auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 360px;
      max-width: 100%;
      text-align: center;
    }
    .auth-box h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .auth-box .sub { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .auth-box input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-size: 15px;
      border-radius: 10px;
      outline: none;
      font-family: 'Outfit', sans-serif;
      margin-bottom: 12px;
    }
    .auth-box button {
      width: 100%;
      background: var(--primary);
      color: var(--bg);
      border: none;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
    }
    .auth-box button:disabled { opacity: 0.45; cursor: default; }
    .auth-box .msg {
      margin-top: 14px;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
    }
    .msg-ok { background: var(--primary-light); color: var(--primary); }
    .msg-err { background: var(--danger-bg); color: var(--danger); }
    .msg-deny { background: var(--danger-bg); color: var(--danger); }

    /* ── Loading ── */
    .loading {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: var(--text-muted);
    }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn .3s ease; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 9px 18px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card); color: var(--text-sec);
      font-family: 'Outfit', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;
      display: inline-flex; align-items: center;
    }
    .tab-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .badge-num {
      background: var(--danger); color: #fff; border-radius: 9px;
      font-size: 11px; font-weight: 700; padding: 1px 7px; margin-left: 7px;
    }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--card); color: var(--text-sec);
      cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px;
    }

    /* ── Elver ── */
    .river-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px;
    }
    .river-card .top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .river-card h3 { font-size: 16px; font-weight: 700; }
    .river-card .meta { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
    .hint {
      display: flex; align-items: center; gap: 8px;
      border-radius: 8px; padding: 8px 12px; margin: 12px 0; font-size: 13px;
    }
    .hint-warn { background: var(--warn-bg); color: var(--yellow); }
    .hint-ok { background: var(--primary-light); color: var(--primary); }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 9px 16px; border-radius: 9px;
      font-family: 'Outfit', sans-serif; font-size: 13.5px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--text);
    }
    .btn-ok { color: var(--primary); border-color: var(--primary); }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn:disabled { opacity: .5; cursor: default; }
    .sildre-link { color: var(--blue); font-size: 13px; text-decoration: none; white-space: nowrap; }
    .thr-inp {
      width: 68px; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 7px 9px; font-size: 14px; font-weight: 600;
      font-family: 'Outfit', sans-serif; outline: none;
    }
    .stale-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .table-header, .table-row {
        grid-template-columns: 2fr 80px 70px 50px;
      }
      .table-header .col-role,
      .table-header .col-weight,
      .table-row .col-role,
      .table-row .col-weight { display: none; }
      .container { padding: 16px; }
      .header { padding: 16px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ── Supabase ──
const SUPABASE_URL = 'https://sygxotiqbljukaekiipc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_wJX40u1dWNyz5xS3NTle7A_TI52gsrJ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Admin emails — add more as needed ──
const ADMIN_EMAILS = ['magnus@jepson.no'];

const app = document.getElementById('app');

// ── Tema (mørk/lys) ──
function initTheme() {
  const saved = localStorage.getItem('admin_theme');
  const mode = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  document.documentElement.setAttribute('data-theme', mode);
}
function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('admin_theme', next);
  render();
}
initTheme();

// ── Avatar color from seed ──
function avatarColor(seed) {
  const colors = ["#1a5c3a","#2d6a4f","#52796f","#386641","#6a994e","#8b5cf6","#7c3aed","#0891b2","#0e7490","#b45309","#a16207","#be123c","#9f1239","#9333ea","#1e40af"];
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;
  return colors[h % colors.length];
}

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const m = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  return `${d.getDate()}. ${m[d.getMonth()]} ${d.getFullYear()}`;
}

// ── State ──
let state = {
  loading: true,
  session: null,
  denied: false,
  tab: 'users', // 'users' | 'groups' | 'rivers'
  users: [],
  groups: [],
  groupsByUser: {},
  rivers: [],
  selectedUserId: null,
  selectedGroupId: null,
  search: '',
  sortCol: 'name',
  sortAsc: true,
  backfillBusy: false,
  backfillMsg: '',
};

// ── Auth ──
async function init() {
  const { data } = await sb.auth.getSession();
  state.session = data.session;
  state.loading = false;

  if (!state.session) {
    // Not logged in — send to main app to log in there
    window.location.href = '/';
    return;
  }

  const email = state.session.user.email;
  if (!ADMIN_EMAILS.includes(email)) {
    state.denied = true;
    render();
    return;
  }

  await loadData();
  render();

  sb.auth.onAuthStateChange(async (_, session) => {
    if (!session) {
      window.location.href = '/';
      return;
    }
    state.session = session;
    const email = session.user.email;
    if (!ADMIN_EMAILS.includes(email)) {
      state.denied = true;
      render();
      return;
    }
    state.denied = false;
    await loadData();
    render();
  });
}

// ── Data loading ──
async function loadData() {
  // Fetch all profiles
  const { data: profiles } = await sb.from('profiles').select('*');

  // Fetch all catches (admin bypass — we need a service role or RLS policy for this)
  // Since we're using anon key + RLS, we can only see public catches + our own.
  // For a proper admin, you'd use service_role key on a backend.
  // Workaround: fetch all catches via the logged-in admin user
  const { data: catches } = await sb.from('catches').select('*');

  // Fetch all groups and members (requires admin RLS policy on these tables)
  const { data: groups } = await sb.from('groups').select('*');
  const { data: members } = await sb.from('group_members').select('*');

  // Fetch follows. NB: med anon-nøkkel + RLS ser admin bare follows-rader
  // den selv er involvert i, med mindre det finnes en admin-policy på
  // follows. For full oversikt over alle følge-relasjoner trengs en
  // admin RLS-policy på follows-tabellen.
  const { data: follows } = await sb.from('follows').select('*');

  // Elver/målestasjoner — inkluderer ventende forslag (verified=false)
  const { data: rivers } = await sb.from('river_stations').select('*');
  state.rivers = (rivers || []).sort((a, b) => a.river_name.localeCompare(b.river_name, 'nb'));

  // Build memberships lookups
  const membersByGroup = {};
  const groupsByUser = {};
  (members || []).forEach(m => {
    if (!membersByGroup[m.group_id]) membersByGroup[m.group_id] = [];
    membersByGroup[m.group_id].push(m.user_id);
    if (!groupsByUser[m.user_id]) groupsByUser[m.user_id] = [];
    groupsByUser[m.user_id].push(m.group_id);
  });

  state.groups = (groups || []).map(g => ({
    ...g,
    members: membersByGroup[g.id] || [],
  }));
  state.groupsByUser = groupsByUser;

  // Fetch auth users' last sign in (from profiles + catches join)
  const usersMap = {};

  (profiles || []).forEach(p => {
    usersMap[p.id] = {
      id: p.id,
      name: p.display_name || p.username || '—',
      email: '',  // we'll try to get this
      username: p.username,
      avatar_url: p.avatar_url,
      joined: p.created_at,
      catches: [],
    };
  });

  (catches || []).forEach(c => {
    if (usersMap[c.user_id]) {
      usersMap[c.user_id].catches.push(c);
    }
  });

  // Sort catches by date desc within each user
  Object.values(usersMap).forEach(u => {
    u.catches.sort((a, b) => new Date(b.date) - new Date(a.date));
    u.totalWeight = u.catches.reduce((s, c) => s + (parseFloat(c.weight) || 0), 0);
    u.lastCatch = u.catches.length > 0 ? u.catches[0].date : null;
    u.following = 0;
    u.followers = 0;
  });

  // Følge-relasjoner per bruker (basert på det RLS eksponerer)
  (follows || []).forEach(f => {
    if (usersMap[f.follower_id]) usersMap[f.follower_id].following++;
    if (usersMap[f.following_id]) usersMap[f.following_id].followers++;
  });
  state.followsCount = (follows || []).length;

  state.users = Object.values(usersMap);
}

// ── Elver: godkjenningskø + stasjonshelse + backfill ──
function editDist(a, b) {
  if (Math.abs(a.length - b.length) > 3) return 99;
  const d = Array.from({ length: a.length + 1 }, (_, i) => [i, ...Array(b.length).fill(0)]);
  for (let j = 0; j <= b.length; j++) d[0][j] = j;
  for (let i = 1; i <= a.length; i++) for (let j = 1; j <= b.length; j++)
    d[i][j] = Math.min(d[i - 1][j] + 1, d[i][j - 1] + 1, d[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1));
  return d[a.length][b.length];
}
function riverDupHint(r) {
  const others = state.rivers.filter(x => x.river_name !== r.river_name);
  const ln = r.river_name.toLowerCase();
  const sim = others.find(o => {
    const e = o.river_name.toLowerCase();
    return e.startsWith(ln) || ln.startsWith(e) || (ln.length > 5 && editDist(e, ln) <= 2);
  });
  return sim
    ? `<div class="hint hint-warn">⚠ Ligner på «${sim.river_name}» (stasjon ${sim.nve_station_id}${sim.verified ? '' : ', også ventende'})</div>`
    : `<div class="hint hint-ok">✓ Ingen duplikater funnet</div>`;
}
async function approveRiver(name) {
  const { error } = await sb.from('river_stations').update({ verified: true }).eq('river_name', name);
  if (error) { alert('Feil: ' + error.message); return; }
  await loadData();
  render();
}
async function rejectRiver(name) {
  if (!confirm(`Avvise og slette forslaget «${name}»?`)) return;
  const { error } = await sb.from('river_stations').delete().eq('river_name', name);
  if (error) { alert('Feil: ' + error.message); return; }
  await loadData();
  render();
}
async function runBackfill() {
  state.backfillBusy = true;
  state.backfillMsg = 'Kjører…';
  render();
  const { data, error } = await sb.functions.invoke('fetch-conditions', { body: { backfill: true } });
  state.backfillBusy = false;
  state.backfillMsg = error ? ('Feil: ' + error.message)
    : (data && data.error) ? ('Feil: ' + data.error)
    : `Oppdaterte ${data.updated} av ${data.processed} fangster — ${data.remaining} gjenstår`;
  render();
}
// NVE-persentiler [p25,p50,p75,p95] for dagens dato — hint for å sette fisketerskler.
function percTodayAdmin(r) {
  const fp = r.flow_percentiles;
  if (!fp || fp.none || typeof fp !== 'object') return null;
  const d = new Date();
  const key = String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
  if (fp[key]) return fp[key];
  const keys = Object.keys(fp).sort();
  if (!keys.length) return null;
  return fp[keys.reduce((b, k) => Math.abs(+k - +key) < Math.abs(+b - +key) ? k : b, keys[0])];
}
async function saveThresholds(name, idx) {
  const minEl = document.getElementById('fmin-' + idx);
  const maxEl = document.getElementById('fmax-' + idx);
  const parse = v => { v = (v || '').trim().replace(',', '.'); return v === '' ? null : (isNaN(parseFloat(v)) ? null : parseFloat(v)); };
  const fish_min = parse(minEl.value), fish_max = parse(maxEl.value);
  const { error } = await sb.from('river_stations').update({ fish_min, fish_max }).eq('river_name', name);
  if (error) { alert('Feil: ' + error.message); return; }
  await loadData();
  render();
}

            <div class="catch-row">
              <span class="c-date">${c.date || '—'}</span>
              <span class="c-river">${c.river || '—'}${c.beat ? ' · ' + c.beat : ''}</span>
              <span class="c-species">${c.species || '—'} <span title="${visLabel}" style="opacity: .6; margin-left: 4px;">${visIcon}</span></span>
              <span class="c-length">${c.length ? c.length + ' cm' : '—'}</span>
              <span class="c-weight">${c.weight ? parseFloat(c.weight).toFixed(1) + ' kg' : '—'}</span>
              <span class="c-status ${c.released ? 'c-released' : 'c-kept'}">${c.released ? 'C&R' : 'Avlivet'}</span>
            </div>
          `;}).join('')
        }
      </div>
    </div>`;
}

function renderGroupDetail() {
  const group = state.groups.find(g => g.id === state.selectedGroupId);
  if (!group) { state.selectedGroupId = null; render(); return; }

  const memberUsers = group.members
    .map(uid => state.users.find(u => u.id === uid))
    .filter(Boolean);

  const creator = state.users.find(u => u.id === group.created_by);

  // Catches shared to this group
  const groupCatches = state.users
    .flatMap(u => u.catches)
    .filter(c => {
      const vis = c.visibility || (c.is_public ? 'public' : 'private');
      return vis === 'groups' && group.members.includes(c.user_id);
    })
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  app.innerHTML = `
    ${headerHTML('Admin · Gruppedetaljer')}
    <div class="container fade-in">
      <button class="back-btn" onclick="state.selectedGroupId = null; render();">← Tilbake til oversikt</button>

      <div class="profile-card">
        <div class="avatar lg" style="background: ${avatarColor(group.name)}">${initials(group.name)}</div>
        <div class="info">
          <h2>${group.name}</h2>
          <div class="email-line">Opprettet av ${creator ? creator.name : '—'}</div>
          <div class="meta">
            <span class="meta-text">Opprettet ${fmtDate(group.created_at)}</span>
            <span class="meta-text" style="margin-left: 10px; opacity: .7;">Invite: ${group.invite_code}</span>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="accent" style="background: var(--primary)"></div>
          <div class="label">Medlemmer</div>
          <div class="value">${memberUsers.length}</div>
        </div>
        <div class="stat-card">
          <div class="accent" style="background: var(--blue)"></div>
          <div class="label">Gruppe-fangster</div>
          <div class="value">${groupCatches.length}</div>
        </div>
        <div class="stat-card">
          <div class="accent" style="background: var(--yellow)"></div>
          <div class="label">Total vekt</div>
          <div class="value">${groupCatches.reduce((s, c) => s + (parseFloat(c.weight) || 0), 0).toFixed(0)} kg</div>
        </div>
        <div class="stat-card">
          <div class="accent" style="background: var(--pink)"></div>
          <div class="label">Aktive medlemmer</div>
          <div class="value">${memberUsers.filter(u => u.catches.length > 0).length}</div>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <span>Medlem</span>
          <span class="col-role">Brukernavn</span>
          <span>Siste fangst</span>
          <span>Fangster</span>
          <span class="col-weight">Totalvekt</span>
          <span>Ble med</span>
        </div>
        ${memberUsers.length === 0 ? `<div class="empty-state">Ingen medlemmer</div>` :
          memberUsers.map(u => `
            <div class="table-row" onclick="state.selectedGroupId = null; state.selectedUserId = '${u.id}'; render();">
              <div class="user-cell">
                ${u.avatar_url
                  ? `<img src="${u.avatar_url}" class="avatar" style="object-fit: cover;" onerror="this.outerHTML='<div class=\\'avatar\\' style=\\'background: ${avatarColor(u.name)}\\'>${initials(u.name)}</div>'" />`
                  : `<div class="avatar" style="background: ${avatarColor(u.name)}">${initials(u.name)}</div>`
                }
                <div>
                  <div class="name">${u.name}${u.id === group.created_by ? ' <span style="font-size: 11px; color: var(--primary); margin-left: 4px;">★ Admin</span>' : ''}</div>
                  <div class="email">${u.username || ''}</div>
                </div>
              </div>
              <span class="col-role"><span class="chip chip-role">${u.username || '—'}</span></span>
              <span class="date-val">${u.lastCatch ? fmtDate(u.lastCatch) : '—'}</span>
              <span class="count-big ${u.catches.length === 0 ? 'count-muted' : ''}">${u.catches.length}</span>
              <span class="col-weight weight-val">${u.totalWeight > 0 ? u.totalWeight.toFixed(1) + ' kg' : '—'}</span>
              <span class="date-val">${fmtDate(u.joined)}</span>
            </div>
          `).join('')
        }
      </div>

      <div class="footer-bar">
        <span>${memberUsers.length} medlem${memberUsers.length !== 1 ? 'mer' : ''} · ${groupCatches.length} gruppe-fangster</span>
        <span>Klikk på et medlem for detaljer</span>
      </div>
    </div>`;
}

function toggleSort(col) {
  if (state.sortCol === col) state.sortAsc = !state.sortAsc;
  else { state.sortCol = col; state.sortAsc = true; }
  render();
}

// ── Start ──
init();
</script>
</body>
</html>
