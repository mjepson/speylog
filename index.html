    const DEFAULT_RIVERS=["Altaelva","Bjerkreimselva","Bøelva","Dirdalselva","Driva","Etneelva","Figgjo","Flåmselva","Gaula","Håelva","Lærdalselva","Mandalselva","Namsen","Nidelva (Arendal)","Numedalslågen","Ogna","Orkla","Otra","Suldalslågen","Surna","Tovdalselva","Vikedalselva","River Dee","River Spey","River Tay","River Tweed"];

    const DB_VER=1;

    // ══════════════════════════════════════
    // IndexedDB Storage Layer
    // ══════════════════════════════════════
    function openDB(){
      return new Promise((resolve,reject)=>{
        const req=indexedDB.open(DB_NAME,DB_VER);
        req.onupgradeneeded=(e)=>{
          const db=e.target.result;
          if(!db.objectStoreNames.contains("catches")) db.createObjectStore("catches",{keyPath:"id"});
          if(!db.objectStoreNames.contains("settings")) db.createObjectStore("settings",{keyPath:"key"});
        };
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
      });
    }

    async function dbGetAll(storeName){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readonly");
        const store=tx.objectStore(storeName);
        const req=store.getAll();
        req.onsuccess=()=>resolve(req.result);
        req.onerror=()=>reject(req.error);
      });
    }

    async function dbPut(storeName,item){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        const store=tx.objectStore(storeName);
        store.put(item);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    async function dbDelete(storeName,key){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        tx.objectStore(storeName).delete(key);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    async function dbPutAll(storeName,items){
      const db=await openDB();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        const store=tx.objectStore(storeName);
        items.forEach(i=>store.put(i));
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    // Settings helpers
    async function getSetting(key,def){
      try{
        const db=await openDB();
        return new Promise(resolve=>{
          const tx=db.transaction("settings","readonly");
          const req=tx.objectStore("settings").get(key);
          req.onsuccess=()=>resolve(req.result?req.result.value:def);
          req.onerror=()=>resolve(def);
        });
      }catch{return def;}
    }
    async function setSetting(key,value){
      await dbPut("settings",{key,value});
    }

    // Migrate from localStorage if needed
    async function migrateFromLS(){
      const old=localStorage.getItem("fangstlogg_data");
      if(!old)return;
      try{
        const catches=JSON.parse(old);
        if(Array.isArray(catches)&&catches.length>0){
          // Convert old single photo string to photos array
          const migrated=catches.map(c=>({
            ...c,
            photos:c.photo?[c.photo]:(c.photos||[]),
          }));
          delete migrated.photo;
          await dbPutAll("catches",migrated);
          // Migrate settings
          const prefs=JSON.parse(localStorage.getItem("fangstlogg_prefs")||"{}");
          const rivers=JSON.parse(localStorage.getItem("fangstlogg_rivers")||"[]");
          const theme=JSON.parse(localStorage.getItem("fangstlogg_theme")||'"forest"');
          await setSetting("prefs",prefs);
          await setSetting("rivers",rivers);
          await setSetting("theme",theme);
          // Clear old storage
          localStorage.removeItem("fangstlogg_data");
          localStorage.removeItem("fangstlogg_prefs");
          localStorage.removeItem("fangstlogg_rivers");
          localStorage.removeItem("fangstlogg_theme");
          console.log("Migrated",migrated.length,"catches from localStorage to IndexedDB");
        }
      }catch(e){console.error("Migration failed:",e);}
    }

    // ── Helpers ──
    function estimateWeight(cm){if(!cm||cm<=0)return null;return Math.round((0.95*Math.pow(cm,3))/100000*10)/10;}
    function parseNum(v){if(v===""||v===null||v===undefined)return undefined;const n=parseFloat(String(v).replace(",","."));return isNaN(n)?undefined:n;}
    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
    function fmtDate(iso){const d=new Date(iso);const m=["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];return`${d.getDate()}. ${m[d.getMonth()]} ${d.getFullYear()}`;}

    function resizeImage(file,maxW=1600){
      return new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            let w=img.width,h=img.height;
            if(w>maxW){h=h*(maxW/w);w=maxW;}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            resolve(canvas.toDataURL("image/jpeg",0.82));
          };
          img.src=ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function parseCSV(text){
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2)return[];
      const headers=lines[0].split(";").map(h=>h.trim().toLowerCase());
      return lines.slice(1).map(line=>{
        const vals=line.split(";").map(v=>v.trim());
        const obj={};headers.forEach((h,i)=>{obj[h]=vals[i]||"";});
        return{id:uid(),date:obj.dato||obj.date||new Date().toISOString().split("T")[0],time:obj.tid||obj.time||"",river:obj.elv||obj.river||"",beat:obj.beat||obj.sone||"",species:obj.art||obj.species||"Laks",length:parseNum(obj.lengde||obj.length),weight:parseNum(obj.vekt||obj.weight),equipment:obj.redskap||obj.equipment||"Flue",released:(obj.gjenutsatt||obj.released||"ja").toLowerCase()==="ja",description:obj.notat||obj.beskrivelse||obj.description||"",photos:[]};
      }).filter(c=>c.river);
    }

    function App(){
      const[catches,setCatches]=useState([]);
      const[prefs,setPrefs]=useState({lastRiver:"",lastEquipment:"Flue"});
      const[customRivers,setCustomRivers]=useState([]);
      const[themeKey,setThemeKey]=useState("forest");
      const[view,setView]=useState("list");
      const[selected,setSelected]=useState(null);
      const[editing,setEditing]=useState(null);
      const[loading,setLoading]=useState(true);
      const[fR,setFR]=useState("Alle");
      const[fS,setFS]=useState("Alle");
      const[fY,setFY]=useState("Alle");
      const[delModal,setDelModal]=useState(null);
      const t=THEMES[themeKey];const S=makeStyles(t);
      const allRivers=[...new Set([...DEFAULT_RIVERS,...customRivers])].sort((a,b)=>a.localeCompare(b,"nb"));

      useEffect(()=>{
        (async()=>{
          await migrateFromLS();
          const all=await dbGetAll("catches");
          setCatches(all);
          setPrefs(await getSetting("prefs",{lastRiver:"",lastEquipment:"Flue"}));
          setCustomRivers(await getSetting("rivers",[]));
          setThemeKey(await getSetting("theme","forest"));
          setLoading(false);
        })();
      },[]);

      const switchTheme=async(k)=>{setThemeKey(k);await setSetting("theme",k);};
      const savePrefs=async(p)=>{setPrefs(p);await setSetting("prefs",p);};
      const addCustomRiver=async(name)=>{if(!customRivers.includes(name)){const next=[...customRivers,name];setCustomRivers(next);await setSetting("rivers",next);}};

      const addCatch=async(c)=>{
        const item={...c,id:uid()};
        await dbPut("catches",item);
        setCatches(prev=>[item,...prev]);
        await savePrefs({lastRiver:c.river,lastEquipment:c.equipment});
        if(!DEFAULT_RIVERS.includes(c.river))await addCustomRiver(c.river);
        setView("list");
      };
      const updateCatch=async(c)=>{
        await dbPut("catches",c);
        setCatches(prev=>prev.map(x=>x.id===c.id?c:x));
        if(!DEFAULT_RIVERS.includes(c.river))await addCustomRiver(c.river);
        setSelected(c);setView("detail");
      };
      const deleteCatch=async(cid)=>{
        await dbDelete("catches",cid);
        setCatches(prev=>prev.filter(x=>x.id!==cid));
        setDelModal(null);setView("list");
      };

      // Export (JSON with photos)
      const exportData=()=>{
        const data=JSON.stringify(catches,null,2);
        const blob=new Blob([data],{type:"application/json"});
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=`fangstlogg-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);
      };
      const importRef=useRef();const csvRef=useRef();
      const importJSON=async(e)=>{
        const file=e.target.files?.[0];if(!file)return;
        const text=await file.text();
        try{
          const imp=JSON.parse(text);
          if(Array.isArray(imp)){
            // Normalize: support old "photo" field
            const normalized=imp.map(c=>({...c,photos:c.photos||( c.photo?[c.photo]:[]),photo:undefined}));
            const ids=new Set(catches.map(c=>c.id));
            const nw=normalized.filter(c=>!ids.has(c.id));
            if(nw.length>0){await dbPutAll("catches",nw);setCatches(prev=>[...nw,...prev]);}
            alert(`Importert ${nw.length} nye fangster`);
          }
        }catch{alert("Kunne ikke lese filen.");}
        e.target.value="";
      };
      const importCSV=async(e)=>{
        const file=e.target.files?.[0];if(!file)return;
        const text=await file.text();
        const parsed=parseCSV(text);
        if(parsed.length>0){await dbPutAll("catches",parsed);setCatches(prev=>[...parsed,...prev]);alert(`Importert ${parsed.length} fangster fra CSV`);}
        else alert("Ingen gyldige rader funnet.");
        e.target.value="";
      };

      const years=[...new Set(catches.map(c=>new Date(c.date).getFullYear()))].sort((a,b)=>b-a);
      const usedRivers=[...new Set(catches.map(c=>c.river))].sort();
      const filtered=catches.filter(c=>{
        if(fR!=="Alle"&&c.river!==fR)return false;
        if(fS!=="Alle"&&c.species!==fS)return false;
        if(fY!=="Alle"&&new Date(c.date).getFullYear()!==+fY)return false;
        return true;
      });

      if(loading)return <div style={S.center}>{I.fish(36,t.primary)}<p style={{marginTop:10,color:t.primary,fontFamily:t.font}}>Laster...</p></div>;
      const fp={fR,setFR,fS,setFS,fY,setFY,years,rivers:usedRivers};

      return(
        <div style={S.app}>
          {view==="list"&&<ListView catches={filtered} total={catches.length} fp={fp} S={S} t={t} themeKey={themeKey} switchTheme={switchTheme} onSelect={c=>{setSelected(c);setView("detail")}} onAdd={()=>setView("add")} onStats={()=>setView("stats")} onExport={exportData} onImportJSON={()=>importRef.current?.click()} onImportCSV={()=>csvRef.current?.click()}/>}
          {view==="stats"&&<StatsView catches={filtered} fp={fp} S={S} t={t} onBack={()=>setView("list")}/>}
          {view==="add"&&<FormView allRivers={allRivers} prefs={prefs} S={S} t={t} onSave={addCatch} onCancel={()=>setView("list")}/>}
          {view==="detail"&&selected&&<DetailView c={selected} S={S} t={t} onBack={()=>setView("list")} onEdit={()=>{setEditing({...selected});setView("edit")}} onDelete={()=>setDelModal(selected.id)}/>}
          {view==="edit"&&editing&&<FormView allRivers={allRivers} initial={editing} S={S} t={t} onSave={updateCatch} onCancel={()=>setView("detail")} isEdit/>}
          <input ref={importRef} type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
          <input ref={csvRef} type="file" accept=".csv,.txt" style={{display:"none"}} onChange={importCSV}/>
          {delModal&&<div style={S.overlay}><div style={S.modal}>
            <p style={{fontSize:16,fontWeight:600,margin:"0 0 6px",color:t.text}}>Slette fangst?</p>
            <p style={{fontSize:14,color:t.textMuted,margin:"0 0 20px"}}>Kan ikke angres.</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{...S.btnSec,flex:1}} onClick={()=>setDelModal(null)}>Avbryt</button>
              <button style={{...S.btnDng,flex:1}} onClick={()=>deleteCatch(delModal)}>Slett</button>
            </div>
          </div></div>}
        </div>
      );
    }

    // ── Shared components ──
    function Filters({fp,S,t}){
      return(<div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <select style={S.sel} value={fp.fR} onChange={e=>fp.setFR(e.target.value)}><option value="Alle">Alle elver</option>{fp.rivers.map(r=><option key={r}>{r}</option>)}</select>
        <select style={S.sel} value={fp.fY} onChange={e=>fp.setFY(e.target.value)}><option value="Alle">Alle år</option>{fp.years.map(y=><option key={y}>{y}</option>)}</select>
        <select style={S.sel} value={fp.fS} onChange={e=>fp.setFS(e.target.value)}><option value="Alle">Alle arter</option>{SPECIES.map(s=><option key={s}>{s}</option>)}</select>
      </div>);
    }

    function RiverInput({value,onChange,allRivers,S,t}){
      const[query,setQuery]=useState(value||"");const[open,setOpen]=useState(false);const wrapRef=useRef();
      useEffect(()=>{setQuery(value||"");},[value]);
      useEffect(()=>{const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};},[]);
      const q=query.toLowerCase().trim();const filtered=q?allRivers.filter(r=>r.toLowerCase().includes(q)):allRivers;const exactMatch=allRivers.some(r=>r.toLowerCase()===q);const showAdd=q&&!exactMatch&&q.length>=2;
      const select=r=>{setQuery(r);onChange(r);setOpen(false);};
      return(<div ref={wrapRef} style={{position:"relative"}}><div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:t.textMuted,pointerEvents:"none"}}>{I.search()}</div><input style={{...S.inp,paddingLeft:34,paddingRight:query?34:12}} placeholder="Søk eller skriv elvenavn..." value={query} onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>{query&&<button style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:t.textMuted,padding:4}} onClick={()=>{setQuery("");onChange("");setOpen(false);}}>{I.x()}</button>}</div>
        {open&&(filtered.length>0||showAdd)&&(<div style={S.dropdown}><div style={{maxHeight:200,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>{filtered.map(r=><div key={r} style={S.dropItem} onMouseDown={()=>select(r)} onTouchEnd={e=>{e.preventDefault();select(r);}}>{r}</div>)}{showAdd&&<div style={{...S.dropItem,color:t.primary,fontWeight:600}} onMouseDown={()=>select(query.trim())} onTouchEnd={e=>{e.preventDefault();select(query.trim());}}>+ Legg til «{query.trim()}»</div>}</div></div>)}
      </div>);
    }

    function NumInput({value,onChange,placeholder,S}){
      const[display,setDisplay]=useState(value!=null&&value!==""?String(value):"");const skip=useRef(false);
      useEffect(()=>{if(skip.current){skip.current=false;return;}setDisplay(value!=null&&value!==undefined&&value!==""?String(value):"");},[value]);
      const handleChange=e=>{let v=e.target.value.replace(/[^0-9.,]/g,"");const parts=v.split(/[.,]/);if(parts.length>2)v=parts[0]+"."+parts.slice(1).join("");setDisplay(v);skip.current=true;onChange(parseNum(v));};
      return <input style={S.inp} inputMode="decimal" placeholder={placeholder} value={display} onChange={handleChange}/>;
    }

    function Lbl({t:text,th}){return <label style={{display:"block",fontSize:12,fontWeight:600,color:th.textSec,marginBottom:2,marginTop:10}}>{text}</label>;}

    // ── ListView ──

            <button style={{...S.btnSec,display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"7px 14px"}} onClick={onImportJSON}>{I.upload()} JSON</button>
            <button style={{...S.btnSec,display:"flex",alignItems:"center",gap:5,fontSize:12,padding:"7px 14px"}} onClick={onImportCSV}>{I.upload()} CSV</button>

        </div>
      </div>);
    }

          <div style={{fontSize:13,color:t.textSec,marginBottom:5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.river}{c.beat?` — ${c.beat}`:""}</div>

    // ── DetailView ──
    function DetailView({c,S,t,onBack,onEdit,onDelete}){

        {photos.length===1&&<div style={{borderRadius:14,overflow:"hidden",marginBottom:14,aspectRatio:"3/4",cursor:"pointer"}} onClick={()=>setLightbox(0)}><img src={photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        {photos.length>1&&<div className="photo-scroll" style={{marginBottom:14}}>{photos.map((p,i)=>(<div key={i} style={{width:"80%",aspectRatio:"3/4",borderRadius:14,overflow:"hidden",cursor:"pointer"}} onClick={()=>setLightbox(i)}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>))}</div>}
        <h2 style={{fontFamily:t.titleFont,fontSize:24,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{c.species}</h2>

        {lightbox!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setLightbox(null)}>
          <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:"calc(12px + env(safe-area-inset-top))",right:16,background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",zIndex:201}}>{I.x()}</button>

          {photos.length>1&&lightbox>0&&<button onClick={e=>{e.stopPropagation();setLightbox(lightbox-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
          {photos.length>1&&lightbox<photos.length-1&&<button onClick={e=>{e.stopPropagation();setLightbox(lightbox+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",transform:"translateY(-50%) rotate(180deg)"}}>{I.back()}</button>}
          <img src={photos[lightbox]} alt="" style={{maxWidth:"100%",maxHeight:"90vh",objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>

    function SBox({v,l,t,color}){return <div style={{background:t.cardBg,borderRadius:12,padding:"14px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:20,fontWeight:700,color:color||t.primary}}>{v}</span><span style={{display:"block",fontSize:11,color:t.textMuted,marginTop:2}}>{l}</span></div>;}

    // ── StatsView ──
    function StatsView({catches,fp,S,t,onBack}){
      const n=catches.length;const big=catches.reduce((m,c)=>Math.max(m,c.weight||0),0);const avg=n>0?(catches.reduce((s,c)=>s+(c.weight||0),0)/n).toFixed(1):0;const cr=n>0?((catches.filter(c=>c.released).length/n)*100).toFixed(0):0;
      const specC={},eqC={},rivC={},moC={};const moN=["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
      catches.forEach(c=>{specC[c.species]=(specC[c.species]||0)+1;eqC[c.equipment]=(eqC[c.equipment]||0)+1;rivC[c.river]=(rivC[c.river]||0)+1;moC[new Date(c.date).getMonth()]=(moC[new Date(c.date).getMonth()]||0)+1;});
      const maxMo=Math.max(...Object.values(moC),1);

        {n>0&&<div style={S.sec}><p style={S.secT}>Per måned</p><div style={{display:"flex",gap:3,alignItems:"flex-end",height:100}}>{moN.map((m,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:"100%",minHeight:2,height:`${((moC[i]||0)/maxMo)*100}%`,background:`linear-gradient(${t.primary},${t.accent})`,borderRadius:"3px 3px 0 0",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>{moC[i]>0&&<span style={{fontSize:9,color:t.name==="Mørk"?"#0f1a17":"#fff",fontWeight:700,marginTop:2}}>{moC[i]}</span>}</div><span style={{fontSize:9,color:t.textMuted,marginTop:3}}>{m}</span></div>))}</div></div>}
        {Object.keys(specC).length>0&&<BDSec title="Art" d={specC} n={n} t={t} S={S}/>}
        {Object.keys(eqC).length>0&&<BDSec title="Redskap" d={eqC} n={n} t={t} S={S}/>}
        {Object.keys(rivC).length>0&&<BDSec title="Elv" d={rivC} n={n} t={t} S={S}/>}
        <div style={{height:30}}/>
      </div>);

    function BStat({v,l,t}){return <div style={{background:t.cardBg,borderRadius:14,padding:"16px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:22,fontWeight:700,color:t.primary,fontFamily:t.titleFont}}>{v}</span><span style={{display:"block",fontSize:11,color:t.textMuted,marginTop:3}}>{l}</span></div>;}
    function BDSec({title,d,n,t,S}){const sorted=Object.entries(d).sort((a,b)=>b[1]-a[1]);return <div style={S.sec}><p style={S.secT}>{title}</p>{sorted.map(([k,v],i)=>{const pct=((v/n)*100).toFixed(0);return(<div key={k} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:3}}><span style={{color:t.text}}>{k}</span><span style={{color:t.textMuted}}>{v} ({pct}%)</span></div><div style={{height:7,background:t.chipBg,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:t.primary,borderRadius:4,transition:"width .4s"}}/></div></div>);})}</div>;}

    // ── FormView with multi-photo ──
    function FormView({onSave,onCancel,initial,isEdit,prefs,allRivers,S,t}){
      const fileRef=useRef();
      const[form,setForm]=useState(()=>{

      });

      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onCancel}>{I.back()} Avbryt</button></div>

            <div className="photo-scroll" style={{marginBottom:8}}>

                </div>

            </div>

          <button onClick={()=>fileRef.current?.click()} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderRadius:12,border:`2px dashed ${t.inputBorder}`,background:t.primaryLight,cursor:"pointer",color:t.textSec,fontSize:14,fontFamily:t.font,width:"100%",justifyContent:"center"}}>
            {I.imgPlus()} {form.photos.length===0?"Legg til bilder":"Legg til flere bilder"}

        </div>

        <Lbl t="Elv *" th={t}/><RiverInput value={form.river} onChange={v=>set("river",v)} allRivers={allRivers} S={S} t={t}/>
        <Lbl t="Beat / Sone" th={t}/><input style={S.inp} placeholder="f.eks. Orton Estate" value={form.beat} onChange={e=>set("beat",e.target.value)}/>
        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8}}><div><Lbl t="Dato *" th={t}/><input style={{...S.inp,fontSize:14}} type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div><div><Lbl t="Klokkeslett" th={t}/><input style={{...S.inp,fontSize:14}} type="time" value={form.time} onChange={e=>set("time",e.target.value)}/></div></div>
        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lbl t="Lengde (cm)" th={t}/><NumInput placeholder="70" value={form.length} onChange={handleLength} S={S}/></div><div><Lbl t="Vekt (kg)" th={t}/><NumInput placeholder="3,3" value={form.weight} onChange={handleWeight} S={S}/></div></div>
        {estimatedWt&&!weightManual&&<p style={{fontSize:12,color:t.textSec,margin:"4px 0 0",fontStyle:"italic"}}>Estimert vekt: {estimatedWt} kg</p>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl t="Art *" th={t}/><select style={S.inp} value={form.species} onChange={e=>set("species",e.target.value)}>{SPECIES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div><Lbl t="Redskap" th={t}/><select style={S.inp} value={form.equipment} onChange={e=>set("equipment",e.target.value)}>{EQUIPMENT.map(eq=><option key={eq}>{eq}</option>)}</select></div>
        </div>
        <Lbl t="Gjenutsatt?" th={t}/><div style={{display:"flex",gap:8}}><button style={form.released?S.togOn:S.togOff} onClick={()=>set("released",true)}>Ja</button><button style={!form.released?S.togOn:S.togOff} onClick={()=>set("released",false)}>Nei</button></div>
        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
        <Lbl t="Notat" th={t}/><textarea style={{...S.inp,minHeight:70,resize:"vertical"}} placeholder="f.eks. Junction pool, tung strøm..." value={form.description} onChange={e=>set("description",e.target.value)}/>
        <button style={{...S.btnPriFull,opacity:valid?1:.45,marginTop:20}} disabled={!valid} onClick={submit}>{isEdit?"Lagre endringer":"Registrer fangst"}</button>
        <div style={{height:30}}/>
      </div>);
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));});}</script>
</body>
</html>
