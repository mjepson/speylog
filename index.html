    // ── ConditionsDisplay (DetailView) ──
    // Viser conditions som chips. Returnerer null hvis ingen forhold er satt.
    function ConditionsDisplay({conditions,L,t}){
      if(!conditions||typeof conditions!=="object")return null;
      const chips=[];
      const weatherIcons={sunny:I.sun(),partlyCloudy:I.cloudSun(),cloudy:I.cloud(),rain:I.cloudRain(),showers:I.cloudDrizzle()};
      const weatherLabels={sunny:L("cond_weather_sunny"),partlyCloudy:L("cond_weather_partly"),cloudy:L("cond_weather_cloudy"),rain:L("cond_weather_rain"),showers:L("cond_weather_showers")};
      const windLabels={calm:L("cond_wind_calm"),lightBreeze:L("cond_wind_light"),fresh:L("cond_wind_fresh"),strong:L("cond_wind_strong")};
      const windStrengths={calm:0,lightBreeze:1,fresh:2,strong:3};
      const levelLabels={low:L("cond_level_low"),medium:L("cond_level_medium"),high:L("cond_level_high")};
      const colorLabels={clear:L("cond_color_clear"),tinted:L("cond_color_tinted"),murky:L("cond_color_murky")};
      const m=(conditions.measured&&typeof conditions.measured==="object")?conditions.measured:{};
      if(conditions.weather&&weatherIcons[conditions.weather])chips.push({icon:weatherIcons[conditions.weather],label:weatherLabels[conditions.weather]});
      if(conditions.wind&&windStrengths[conditions.wind]!==undefined)chips.push({icon:<WindIcon strength={windStrengths[conditions.wind]}/>,label:windLabels[conditions.wind]});
      if(conditions.waterLevel)chips.push({icon:<WaterLevelIcon level={conditions.waterLevel}/>,label:levelLabels[conditions.waterLevel]});
      if(conditions.waterColor)chips.push({icon:<WaterColorIcon color={conditions.waterColor}/>,label:colorLabels[conditions.waterColor]});
      if(m.water_flow!=null)chips.push({icon:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="12" x2="19" y2="12"/><polyline points="13,6 19,12 13,18"/></svg>,label:`${m.water_flow} m³/s`});
      const airT=conditions.airTemp!=null?conditions.airTemp:(m.air_temp!=null?m.air_temp:null);
      const waterT=conditions.waterTemp!=null?conditions.waterTemp:(m.water_temp!=null?m.water_temp:null);
      if(airT!=null)chips.push({icon:I.thermo(),label:`${airT}°C ${L("cond_air_short")}`});
      if(waterT!=null)chips.push({icon:I.thermo(),label:`${waterT}°C ${L("cond_water_short")}`});
      if(chips.length===0)return null;
      return <div style={{background:t.cardBg,borderRadius:12,padding:14,border:`1px solid ${t.cardBorder}`,marginBottom:10}}>
        <p style={{fontSize:14,fontWeight:600,color:t.text,margin:"0 0 10px"}}>{L("cond_title")}</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {chips.map((c,i)=>(
            <span key={i} style={{display:"inline-flex",alignItems:"center",gap:6,background:t.chipBg,color:t.chipText,fontSize:13,fontWeight:500,padding:"6px 10px",borderRadius:8,lineHeight:1}}>
              <span style={{color:t.primary,display:"flex"}}>{React.cloneElement(c.icon,{width:16,height:16})}</span>
              {c.label}
            </span>
          ))}
        </div>
        {m.nve_station&&<p style={{fontSize:11,color:t.textMuted,margin:"8px 0 0"}}>{L("cond_measured_src")}: {m.nve_station} (NVE)</p>}
      </div>;
    }

    // ── LeaderboardView ──
    // Toppliste beregnet klient-side fra fangstene brukeren allerede ser
    // (egne + offentlige + gruppedelte) — private fangster lekker aldri inn, RLS urørt.
    function LeaderboardView({L,lang,catches,publicFeed,session,profile,myGroups,groupMembersByGroup,following,S,t,onBack,onSelect,onViewUser}){
      const swipeRef=useEdgeSwipeBack(onBack);
      useEffect(()=>{window.scrollTo(0,0);},[]);
      const[period,setPeriod]=useState("season");
      const[scope,setScope]=useState("all");
      const me=session.user.id;
      const now=new Date();
      // publicFeed kan inneholde egne offentlige fangster — egne kommer fra catches
      const merged=[...catches,...publicFeed.filter(c=>c.user_id!==me)];
      const inPeriod=c=>{
        const d=new Date(c.date);
        if(period==="season")return d.getFullYear()===now.getFullYear();
        if(period==="month")return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
        return true;
      };
      const scopeIds=(()=>{
        if(scope==="groups"){const s=new Set([me]);Object.values(groupMembersByGroup||{}).forEach(set=>set.forEach(id=>s.add(id)));return s;}
        if(scope==="following"){const s=new Set([me]);(following||[]).forEach(p=>s.add(p.id));return s;}
        return null;
      })();
      const pool=merged.filter(c=>inPeriod(c)&&(!scopeIds||scopeIds.has(c.user_id)));
      const userOf=c=>c.user_id===me
        ?{uid:me,name:profile?.display_name||profile?.username||"–",avatar:profile?.avatar_url}
        :{uid:c.user_id,name:c.profiles?.display_name||c.profiles?.username||"–",avatar:c.profiles?.avatar_url};
      const agg={};
      pool.forEach(c=>{
        const u=userOf(c);
        const a=agg[u.uid]||(agg[u.uid]={...u,count:0,best:null,bestLen:null,svidde:0,early:null,cold:null,species:new Set()});
        a.count++;
        const w=parseFloat(c.weight);
        if(!isNaN(w)&&w>0&&(!a.best||w>parseFloat(a.best.weight)))a.best=c;
        const len=parseFloat(c.length);
        if(!isNaN(len)&&len>0&&(!a.bestLen||len>parseFloat(a.bestLen.length)))a.bestLen=c;
        if(c.species==="Laks"&&!isNaN(w)&&w>0&&w<3)a.svidde++;
        if(c.time){const[h,mi]=c.time.slice(0,5).split(":").map(Number);const mins=h*60+mi;if(!a.early||mins<a.early.mins)a.early={mins,c};}
        const cond=c.conditions||{};
        const wt=cond.waterTemp!=null&&cond.waterTemp!==""?parseFloat(cond.waterTemp):(cond.measured&&cond.measured.water_temp!=null?parseFloat(cond.measured.water_temp):NaN);
        if(!isNaN(wt)&&(!a.cold||wt<a.cold.temp))a.cold={temp:wt,c};
        if(c.species)a.species.add(c.species);
      });
      const users=Object.values(agg);
      const fmt1=v=>(Math.round(v*10)/10).toLocaleString(lang==="en"?"en-GB":"nb-NO");
      const byCount=[...users].sort((a,b)=>b.count-a.count).slice(0,3);
      // Vekt rangerer pallen; lengde brukes bare hvis ingen i utvalget har vekt
      const hasWeight=users.some(u=>u.best);
      const byBig=hasWeight
        ?users.filter(u=>u.best).sort((a,b)=>parseFloat(b.best.weight)-parseFloat(a.best.weight)).slice(0,3)
        :users.filter(u=>u.bestLen).sort((a,b)=>parseFloat(b.bestLen.length)-parseFloat(a.bestLen.length)).slice(0,3);
      const bigVal=u=>hasWeight?fmt1(parseFloat(u.best.weight))+" kg":fmt1(parseFloat(u.bestLen.length))+" cm";
      const bigCatch=u=>hasWeight?u.best:u.bestLen;
      const top=(arr,key,desc=true)=>arr.length?[...arr].sort((a,b)=>desc?key(b)-key(a):key(a)-key(b))[0]:null;
      const svidde=top(users.filter(u=>u.svidde>0),u=>u.svidde);
      const morning=top(users.filter(u=>u.early),u=>u.early.mins,false);
      const ice=top(users.filter(u=>u.cold),u=>u.cold.temp,false);
      const hunter=top(users.filter(u=>u.species.size>=2),u=>u.species.size);
      // Fylte pall-blokker med mørk tekst — egne nyanser for lys/mørk så kontrasten holder begge veier
      const medalSet=t.dark?[
        {bg:"#3a3115",border:"#6b5a1e",num:"#fbcf4d",val:"#e3c46a"},
        {bg:"#272e35",border:"#3d454d",num:"#c9d1da",val:"#aab3bd"},
        {bg:"#352519",border:"#5e4327",num:"#e0a36a",val:"#cc9060"}
      ]:[
        {bg:"#fbe7a8",border:"#e0b840",num:"#8a6206",val:"#8a6206"},
        {bg:"#dfe3e8",border:"#c2c9d1",num:"#566270",val:"#566270"},
        {bg:"#f0d6bb",border:"#cc9966",num:"#8a5523",val:"#8a5523"}
      ];
      const secT={fontSize:12,fontWeight:600,color:t.textMuted,letterSpacing:.6,textTransform:"uppercase",margin:"0 0 12px"};
      const Chip=({label,active,onClick})=>(
        <button onClick={onClick} style={{padding:"7px 13px",borderRadius:14,fontSize:12.5,fontWeight:600,fontFamily:t.font,border:"none",cursor:"pointer",background:active?t.primaryLight:t.chipBg,color:active?t.primary:t.chipText,WebkitTapHighlightColor:"transparent"}}>{label}</button>
      );
      const Podium=({entries,valueOf,onTapEntry})=>{
        const slots=[{e:entries[1],r:2},{e:entries[0],r:1},{e:entries[2],r:3}].filter(s=>s.e);
        return(<div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:10,marginBottom:24}}>
          {slots.map(s=>{
            const m=medalSet[s.r-1];const first=s.r===1;
            return(
            <div key={s.r} onClick={()=>{if(onTapEntry)onTapEntry(s.e);}} style={{flex:first?1.15:1,textAlign:"center",minWidth:0,cursor:onTapEntry?"pointer":"default"}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:6}}>
                <Avatar url={s.e.avatar} name={s.e.name} seed={s.e.uid} size={first?58:46} t={t}/>
              </div>
              <div style={{background:m.bg,border:`1px solid ${m.border}`,borderRadius:"12px 12px 0 0",padding:first?"12px 4px 18px":"9px 4px 13px"}}>
                <div style={{fontSize:first?26:21,fontWeight:800,color:m.num,lineHeight:1}}>{s.r}</div>
                <div style={{fontSize:first?13.5:12.5,fontWeight:first?700:600,color:t.text,margin:"4px 0 0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.e.name}</div>
                <div style={{fontSize:first?12.5:12,fontWeight:600,color:m.val,margin:"1px 0 0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{valueOf(s.e)}</div>
              </div>
            </div>);
          })}
        </div>);
      };
      const Award=({icon,title,desc,u,value,catchRef,gold})=>(
        <div onClick={()=>{if(catchRef&&onSelect)onSelect(catchRef);}} style={{background:t.cardBg,border:`1px solid ${gold?"#fbbf24":t.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:catchRef?"pointer":"default"}}>
          <div style={{width:38,height:38,borderRadius:19,background:t.chipBg,display:"flex",alignItems:"center",justifyContent:"center",color:gold?"#fbbf24":t.primary,flexShrink:0}}>{icon}</div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:14,fontWeight:600,color:t.text,margin:0}}>{title}</p>
            <p style={{fontSize:12,color:t.textSec,margin:0}}>{desc}</p>
          </div>
          <div style={{textAlign:"right",minWidth:0}}>
            <p style={{fontSize:13,fontWeight:600,color:t.text,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:110}}>{u.name}</p>
            <p style={{fontSize:12,color:gold?"#fbbf24":t.primary,fontWeight:600,margin:0,whiteSpace:"nowrap"}}>{value}</p>
          </div>
        </div>
      );
      const subtitle=period==="season"
        ?(lang==="en"?`Season ${now.getFullYear()}`:`Sesongen ${now.getFullYear()}`)
        :period==="month"
        ?now.toLocaleDateString(lang==="en"?"en-GB":"nb-NO",{month:"long",year:"numeric"})
        :L("lb_period_all");
      const hasAwards=svidde||morning||ice||hunter;
      return(<div ref={swipeRef} className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onBack}>{I.back()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{L("lb_title")}</h2>
        <p style={{fontSize:13.5,color:t.textSec,margin:"0 0 14px"}}>{subtitle}</p>
        <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
          <Chip label={L("lb_period_season")} active={period==="season"} onClick={()=>setPeriod("season")}/>
          <Chip label={L("lb_period_month")} active={period==="month"} onClick={()=>setPeriod("month")}/>
          <Chip label={L("lb_period_all")} active={period==="all"} onClick={()=>setPeriod("all")}/>
        </div>
        {((myGroups&&myGroups.length>0)||(following&&following.length>0))&&
        <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap"}}>
          <Chip label={L("lb_scope_all")} active={scope==="all"} onClick={()=>setScope("all")}/>
          {myGroups&&myGroups.length>0&&<Chip label={L("lb_scope_groups")} active={scope==="groups"} onClick={()=>setScope("groups")}/>}
          {following&&following.length>0&&<Chip label={L("lb_scope_following")} active={scope==="following"} onClick={()=>setScope("following")}/>}
        </div>}
        {pool.length===0&&<p style={{color:t.textMuted,fontSize:14,marginTop:24}}>{L("lb_empty")}</p>}
        {byCount.length>0&&<div style={{marginTop:10}}>
          <p style={secT}>{L("lb_most_catches")}</p>
          <Podium entries={byCount} valueOf={u=>trCatches(u.count,lang)} onTapEntry={u=>{if(u.uid!==me&&onViewUser)onViewUser(u.uid);}}/>
        </div>}
        {byBig.length>0&&<div>
          <p style={secT}>{L("lb_biggest")}</p>
          <Podium entries={byBig} valueOf={u=>bigVal(u)+(bigCatch(u).river?" · "+bigCatch(u).river:"")} onTapEntry={u=>{if(onSelect)onSelect(bigCatch(u));}}/>
        </div>}
        {hasAwards&&<p style={secT}>{L("lb_awards")}</p>}
        {svidde&&<Award gold icon={<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 18h20"/><path d="M3 14L2 6l6 4 4-7 4 7 6-4-1 8H3z"/></svg>} title={L("lb_award_svidde")} desc={L("lb_award_svidde_desc")} u={svidde} value={L("lb_svidde_n",svidde.svidde)}/>}
        {morning&&<Award icon={<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 18a5 5 0 00-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="8 6 12 2 16 6"/></svg>} title={L("lb_award_morning")} desc={L("lb_award_morning_desc")} u={morning} value={morning.early.c.time.slice(0,5)} catchRef={morning.early.c}/>}
        {ice&&<Award icon={<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><line x1="4" y1="7" x2="20" y2="17"/><line x1="20" y1="7" x2="4" y2="17"/><path d="M12 2l-2 3h4l-2-3z" fill="currentColor" stroke="none"/></svg>} title={L("lb_award_ice")} desc={L("lb_award_ice_desc")} u={ice} value={fmt1(ice.cold.temp)+" °C"} catchRef={ice.cold.c}/>}
        {hunter&&<Award icon={<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6.5 12c2.5-5 8-7 13.5-5-1 5-5.5 8.5-11 7.5"/><path d="M6.5 12L2 9v7l4.5-4z"/><path d="M6.5 12c1.5 3 4 5 7.5 5.5"/></svg>} title={L("lb_award_species")} desc={L("lb_award_species_desc")} u={hunter} value={L("lb_species_n",hunter.species.size)}/>}
      </div>);
    }

    // ── RiversView ──
    // Liste over elver med målestasjon: vannføring nå, trend siste døgn, lenke til Sildre.
    // Rekkefølgen kan endres med dra-og-slipp (håndtaket) og lagres i localStorage (fl_riverOrder).
    function RiversView({L,lang,catches,S,t,onBack}){
      const swipeRef=useEdgeSwipeBack(onBack);
      const[rows,setRows]=useState(null);
      const[err,setErr]=useState(false);
      const[addOpen,setAddOpen]=useState(false);
      const[newName,setNewName]=useState("");
      const[newUrl,setNewUrl]=useState("");
      const[addMsg,setAddMsg]=useState("");
      const[addOk,setAddOk]=useState("");
      const[fuzzyOk,setFuzzyOk]=useState(false);
      const[adding,setAdding]=useState(false);
      const[reloadKey,setReloadKey]=useState(0);
      const[dragState,setDragState]=useState(null);
      const dragRef=useRef(null);
      const rowsRef=useRef(null);
      const itemRefs=useRef([]);
      rowsRef.current=rows;
      useEffect(()=>{
        window.scrollTo(0,0);
        let cancelled=false;
        (async()=>{
          try{
            const {data,error}=await sb.functions.invoke("fetch-conditions",{body:{rivers:true}});
            if(cancelled)return;
            if(error||!data||data.error||!data.rivers){setErr(true);return;}
            const saved=lsGet("fl_riverOrder")||[];
            const mine=new Set(catches.map(c=>c.river));
            const sorted=[...data.rivers].sort((a,b)=>{
              const ai=saved.indexOf(a.river),bi=saved.indexOf(b.river);
              if(ai!==-1&&bi!==-1)return ai-bi;
              if(ai!==-1)return -1;
              if(bi!==-1)return 1;
              const am=mine.has(a.river)?0:1,bm=mine.has(b.river)?0:1;
              if(am!==bm)return am-bm;
              return a.river.localeCompare(b.river,"nb");
            });
            setRows(sorted);
          }catch(e){if(!cancelled)setErr(true);}
        })();
        return()=>{cancelled=true;};
      // eslint-disable-next-line react-hooks/exhaustive-deps
      },[reloadKey]);
      // Enkel redigeringsavstand for å fange near-duplikater som «Årdalselva»/«Årdalselven»
      const editDist=(a,b)=>{
        if(Math.abs(a.length-b.length)>3)return 99;
        const d=Array.from({length:a.length+1},(_,i)=>[i,...Array(b.length).fill(0)]);
        for(let j=0;j<=b.length;j++)d[0][j]=j;
        for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)
          d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
        return d[a.length][b.length];
      };
      const addRiver=async()=>{
        const name=newName.trim().replace(/\s+/g," ");
        const m=newUrl.trim().match(/sildre\.nve\.no\/[Ss]tation\/(\d+\.\d+\.\d+)/);
        if(!name){setAddMsg(L("rivers_add_need_name"));return;}
        if(!m){setAddMsg(L("rivers_add_invalid_url"));return;}
        setAdding(true);setAddMsg("");setAddOk("");
        // Dupsjekk mot alle registrerte elver — også ventende forslag
        const {data:existing,error:exErr}=await sb.from("river_stations").select("river_name,nve_station_id");
        if(exErr){setAdding(false);setAddMsg(L("error_prefix")+" "+exErr.message);return;}
        const lower=name.toLowerCase();
        if((existing||[]).some(r=>r.river_name.toLowerCase()===lower)){
          setAdding(false);setAddMsg(L("rivers_add_exists"));return;
        }
        const stationHit=(existing||[]).find(r=>r.nve_station_id===m[1]);
        if(stationHit){setAdding(false);setAddMsg(L("rivers_add_station_exists",stationHit.river_name));return;}
        const similar=(existing||[]).find(r=>{
          const e=r.river_name.toLowerCase();
          return e.startsWith(lower)||lower.startsWith(e)||(lower.length>5&&editDist(e,lower)<=2);
        });
        if(similar&&!fuzzyOk){
          setAdding(false);setFuzzyOk(true);setAddMsg(L("rivers_add_similar",similar.river_name));return;
        }
        const {data:{session:s}}=await sb.auth.getSession();
        const {error}=await sb.from("river_stations").insert({river_name:name,nve_station_id:m[1],submitted_by:s?.user?.id??null});
        setAdding(false);setFuzzyOk(false);
        if(error){
          setAddMsg(error.code==="23505"?L("rivers_add_exists"):L("error_prefix")+" "+error.message);
          return;
        }
        // Forslaget er ikke synlig før godkjenning — ingen reload, ingen localStorage
        setNewName("");setNewUrl("");setAddMsg("");setAddOk(L("rivers_add_submitted"));
      };
      const computeTarget=(index,delta,heights)=>{
        let ti=index,acc=0;
        if(delta>0){while(ti<heights.length-1&&delta>acc+heights[ti+1]/2){acc+=heights[ti+1];ti++;}}
        else{while(ti>0&&-delta>acc+heights[ti-1]/2){acc+=heights[ti-1];ti--;}}
        return ti;
      };
      const startDrag=(i,y)=>{
        const heights=itemRefs.current.map(el=>el?el.getBoundingClientRect().height+8:76);
        dragRef.current={index:i,startY:y,delta:0,heights};
        setDragState({index:i,delta:0});
      };
      const moveDrag=(y)=>{
        const d=dragRef.current;if(!d)return;
        d.delta=y-d.startY;
        setDragState({index:d.index,delta:d.delta});
      };
      const endDrag=()=>{
        const d=dragRef.current;
        dragRef.current=null;
        setDragState(null);
        if(!d||!rowsRef.current)return;
        const target=computeTarget(d.index,d.delta,d.heights);
        if(target!==d.index){
          const next=[...rowsRef.current];
          const[moved]=next.splice(d.index,1);
          next.splice(target,0,moved);
          setRows(next);
          lsSet("fl_riverOrder",next.map(r=>r.river));
        }
      };
      useEffect(()=>{
        if(!dragState)return;
        const mm=e=>moveDrag(e.clientY);
        const mu=()=>endDrag();
        window.addEventListener("mousemove",mm);
        window.addEventListener("mouseup",mu);
        return()=>{window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",mu);};
      // eslint-disable-next-line react-hooks/exhaustive-deps
      },[dragState!==null]);
      const trend=(r)=>{
        if(r.flow==null||r.flow24==null||r.flow24<=0)return null;
        const pct=(r.flow-r.flow24)/r.flow24;
        if(pct>0.03)return{arrow:"\u2191",label:L("rivers_rising"),color:t.primary};
        if(pct<-0.03)return{arrow:"\u2193",label:L("rivers_falling"),color:t.textSec};
        return{arrow:"\u2192",label:L("rivers_stable"),color:t.textMuted};
      };
      const draggedH=dragRef.current?dragRef.current.heights[dragRef.current.index]:0;
      const target=dragState&&dragRef.current?computeTarget(dragState.index,dragState.delta,dragRef.current.heights):null;
      return(<div ref={swipeRef} className="safe-top safe-bottom" style={{...S.page,touchAction:"pan-y",willChange:"transform"}}>
        <div style={{...S.topBar,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button style={S.backBtn} onClick={onBack}>{I.back()}</button>
          <button style={S.circBtn} onClick={()=>{setAddOpen(o=>!o);setAddMsg("");}}>{I.plus()}</button>
        </div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{L("rivers_title")}</h2>
        <p style={{fontSize:13.5,color:t.textSec,margin:"0 0 16px"}}>{L("rivers_sub")}</p>
        {addOpen&&<div style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:16,marginBottom:14}}>
          <p style={{fontSize:14,fontWeight:600,color:t.text,margin:"0 0 10px"}}>{L("rivers_add_title")}</p>
          <input value={newName} onChange={e=>{setNewName(e.target.value);setFuzzyOk(false);setAddOk("");}} placeholder={L("rivers_add_name_ph")} style={{...S.inp,marginBottom:8}}/>
          <input value={newUrl} onChange={e=>{setNewUrl(e.target.value);setFuzzyOk(false);setAddOk("");}} placeholder="https://sildre.nve.no/station/33.8.0" inputMode="url" autoCapitalize="none" style={{...S.inp,marginBottom:10}}/>
          <p style={{fontSize:12,color:t.textMuted,margin:"0 0 10px",lineHeight:1.4}}>{L("rivers_add_hint")}</p>
          {addMsg&&<p style={{fontSize:13,color:t.danger||"#f87171",margin:"0 0 10px"}}>{addMsg}</p>}
          {addOk&&<p style={{fontSize:13,color:t.primary,fontWeight:600,margin:"0 0 10px"}}>{addOk}</p>}
          <button onClick={addRiver} disabled={adding} style={{...S.btnPriFull,opacity:adding?.6:1}}>{adding?"…":fuzzyOk?L("rivers_add_anyway"):L("rivers_add_save")}</button>
        </div>}
        {rows===null&&!err&&<div style={{display:"flex",justifyContent:"center",padding:40}}><div style={{width:32,height:32,borderRadius:16,border:`3px solid ${t.cardBorder}`,borderTopColor:t.primary,animation:"spin 0.8s linear infinite"}}/></div>}
        {err&&<p style={{color:t.textMuted,fontSize:14}}>{L("rivers_error")}</p>}
        {rows&&rows.map((r,i)=>{
          const tr=trend(r);
          const dragging=dragState&&dragState.index===i;
          let shift=0;
          if(dragState&&!dragging&&target!==null){
            if(dragState.index<i&&i<=target)shift=-draggedH;
            else if(target<=i&&i<dragState.index)shift=draggedH;
          }
          return(<a key={r.river} ref={el=>itemRefs.current[i]=el} href={`https://sildre.nve.no/station/${r.station_id}`} target="_blank" rel="noopener noreferrer" style={{display:"flex",alignItems:"center",gap:10,background:t.cardBg,border:`1px solid ${dragging?t.primary:t.cardBorder}`,borderRadius:12,padding:"14px 12px 14px 8px",marginBottom:8,textDecoration:"none",position:"relative",zIndex:dragging?5:0,transform:`translateY(${dragging?dragState.delta:shift}px)`,transition:dragging?"none":"transform .15s",boxShadow:dragging?"0 6px 18px rgba(0,0,0,.25)":"none"}}>
            <span
              onClick={e=>e.preventDefault()}
              onMouseDown={e=>{e.preventDefault();startDrag(i,e.clientY);}}
              onTouchStart={e=>{startDrag(i,e.touches[0].clientY);}}
              onTouchMove={e=>{moveDrag(e.touches[0].clientY);}}
              onTouchEnd={()=>endDrag()}
              style={{display:"flex",alignItems:"center",justifyContent:"center",width:32,alignSelf:"stretch",color:t.textMuted,cursor:"grab",touchAction:"none",flexShrink:0}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
            </span>
            <div style={{minWidth:0,flex:1}}>
              <p style={{fontSize:16,fontWeight:600,color:t.text,margin:0}}>{r.river}</p>
              <p style={{fontSize:12,color:t.textMuted,margin:"3px 0 0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.station_name||r.station_id}</p>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:14,flexShrink:0}}>
              {r.temp!=null&&<span style={{fontSize:13,color:t.textSec,fontWeight:500}}>{r.temp}°C</span>}
              <div style={{textAlign:"right",minWidth:74}}>
                <p style={{fontSize:18,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{r.flow!=null?r.flow:"\u2014"}<span style={{fontSize:11,fontWeight:500,color:t.textMuted}}> m³/s</span></p>
                {tr&&<p style={{fontSize:11,color:tr.color,margin:"2px 0 0",fontWeight:500}}>{tr.arrow} {tr.label}</p>}
              </div>
            </div>
          </a>);
        })}
        <div style={{height:30}}/>
      </div>);
    }

    // ── StatsView ──
    function StatsView({L,lang,catches,fp,S,t,onBack}){
      const swipeRef=useEdgeSwipeBack(onBack);
      useEffect(()=>{window.scrollTo(0,0);},[]);
      const filtered=catches.filter(c=>{
        if(fp.fR!=="Alle"&&c.river!==fp.fR)return false;
        if(fp.fS!=="Alle"&&c.species!==fp.fS)return false;
        if(fp.fY!=="Alle"&&new Date(c.date).getFullYear()!==+fp.fY)return false;
        return true;
      });
      const n=filtered.length;const big=filtered.reduce((m,c)=>Math.max(m,c.weight||0),0);const avg=n>0?(filtered.reduce((s,c)=>s+(c.weight||0),0)/n).toFixed(1):0;const cr=n>0?((filtered.filter(c=>c.released).length/n)*100).toFixed(0):0;
      const specC={},eqC={},rivC={},moC={};const moN=lang==="en"?["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]:["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
      filtered.forEach(c=>{specC[c.species]=(specC[c.species]||0)+1;eqC[c.equipment]=(eqC[c.equipment]||0)+1;rivC[c.river]=(rivC[c.river]||0)+1;moC[new Date(c.date).getMonth()]=(moC[new Date(c.date).getMonth()]||0)+1;});
      const maxMo=Math.max(...Object.values(moC),1);
      return(<div ref={swipeRef} className="safe-top safe-bottom" style={{...S.page,touchAction:"pan-y",willChange:"transform"}}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onBack}>{I.back()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{L("stats_title")}</h2>
        <Filters fp={fp} S={S} t={t}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}><BStat v={n} l={L("stats_catches")} t={t}/><BStat v={big||"—"} l={L("stats_biggest")} t={t}/><BStat v={avg>0?avg:"—"} l={L("stats_avg")} t={t}/><BStat v={`${cr}%`} l={L("stats_released")} t={t}/></div>
        {n>0&&<div style={S.sec}><p style={S.secT}>{L("stats_per_month")}</p><div style={{display:"flex",gap:3,alignItems:"flex-end",height:100}}>{moN.map((m,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:"100%",minHeight:2,height:`${((moC[i]||0)/maxMo)*100}%`,background:`linear-gradient(${t.primary},${t.accent})`,borderRadius:"3px 3px 0 0",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>{moC[i]>0&&<span style={{fontSize:9,color:t.name==="Mørk"?"#0f1a17":"#fff",fontWeight:700,marginTop:2}}>{moC[i]}</span>}</div><span style={{fontSize:10,color:t.textMuted,marginTop:3}}>{m}</span></div>))}</div></div>}
        {Object.keys(specC).length>0&&<BDSec title={L("stats_species")} d={specC} n={n} t={t} S={S} mapKey={k=>trSpecies(k,lang)}/>}
        {Object.keys(eqC).length>0&&<BDSec title={L("stats_equipment")} d={eqC} n={n} t={t} S={S} mapKey={k=>trEquipment(k,lang)}/>}
        {Object.keys(rivC).length>0&&<BDSec title={L("stats_river")} d={rivC} n={n} t={t} S={S}/>}
        <div style={{height:30}}/>
      </div>);
    }
    function BStat({v,l,t}){return <div style={{background:t.cardBg,borderRadius:14,padding:"16px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:24,fontWeight:700,color:t.primary,fontFamily:t.titleFont}}>{v}</span><span style={{display:"block",fontSize:12,color:t.textMuted,marginTop:3}}>{l}</span></div>;}
    function BDSec({title,d,n,t,S,mapKey}){const sorted=Object.entries(d).sort((a,b)=>b[1]-a[1]);return <div style={S.sec}><p style={S.secT}>{title}</p>{sorted.map(([k,v],i)=>{const pct=((v/n)*100).toFixed(0);const displayK=mapKey?mapKey(k):k;return(<div key={k} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:3}}><span style={{color:t.text}}>{displayK}</span><span style={{color:t.textMuted}}>{v} ({pct}%)</span></div><div style={{height:7,background:t.chipBg,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:t.primary,borderRadius:4,transition:"width .4s"}}/></div></div>);})}</div>;}

    // ── ConditionsSection ──
    // Sammenleggbar seksjon for vær/vannforhold. Lagrer som JSON-objekt på catch.conditions.
    // Husker siste valg (untatt temp) i localStorage som `fl_lastConditions`.
    const LAST_COND_KEY="fl_lastConditions";

    function WindIcon({strength}){
      const lines=[{y:12,len:6,show:strength>=0},{y:8,len:10,show:strength>=1},{y:16,len:14,show:strength>=2},{y:4,len:18,show:strength>=3}];
      return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">{lines.map((l,i)=>l.show&&<line key={i} x1="3" y1={l.y} x2={3+l.len} y2={l.y}/>)}</svg>;
    }
    function WaterLevelIcon({level}){
      const fillH=level==="low"?6:level==="medium"?12:18;
      return <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" strokeWidth="2"/><rect x="4" y={3+(18-fillH)} width="16" height={fillH} fill="currentColor" rx="2" opacity="0.7"/></svg>;
    }
    function WaterColorIcon({color}){
      const op=color==="clear"?0.15:color==="tinted"?0.5:0.95;
      return <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="9" opacity={op}/><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" strokeWidth="2"/></svg>;
    }
    function CondChip({selected,onClick,icon,label,t}){
      return <button type="button" onClick={onClick} aria-pressed={selected} style={{
        display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,
        padding:"8px 4px",minHeight:60,borderRadius:10,
        border:selected?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,
        background:selected?t.primaryLight:t.inputBg,
        color:selected?t.primary:t.textSec,
        cursor:"pointer",transition:"all .15s ease",
        fontFamily:t.font,fontSize:11,fontWeight:500,
        WebkitTapHighlightColor:"transparent"
      }}>
        <span style={{display:"flex",alignItems:"center",justifyContent:"center"}}>{icon}</span>
        <span style={{lineHeight:1}}>{label}</span>
      </button>;
    }
    function CondRow({label,cols,children,t}){
      return <div style={{marginBottom:14}}>
        <div style={{fontFamily:t.font,fontSize:12,fontWeight:500,color:t.textSec,marginBottom:6,letterSpacing:.2}}>{label}</div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:6}}>{children}</div>
      </div>;
    }
    function CondTemp({label,value,onChange,t}){
      return <div style={{flex:1}}>
        <div style={{fontFamily:t.font,fontSize:12,fontWeight:500,color:t.textSec,marginBottom:6}}>{label}</div>
        <div style={{position:"relative"}}>
          <input type="number" inputMode="decimal" step="0.1" value={value??""} onChange={e=>onChange(e.target.value===""?null:parseFloat(e.target.value))} placeholder="–"
            style={{width:"100%",padding:"11px 36px 11px 12px",borderRadius:11,border:`1px solid ${t.inputBorder}`,background:t.inputBg,color:t.text,fontFamily:t.font,fontSize:16,outline:"none",boxSizing:"border-box"}}/>
          <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:t.textMuted,fontFamily:t.font,fontSize:14,pointerEvents:"none"}}>°C</span>
        </div>
      </div>;
    }
    function ConditionsSection({value,onChange,L,t,river,date,time}){
      const[expanded,setExpanded]=useState(false);
      const[preview,setPreview]=useState(null);
      const cond=value||{};
      // Live forhåndsvisning av måledata (NVE/Frost) når elv+dato er satt
      useEffect(()=>{
        if(!expanded||!river||!date){setPreview(null);return;}
        let cancelled=false;
        const h=setTimeout(async()=>{
          try{
            const ts=new Date(`${date}T${time||"12:00"}`).toISOString();
            const {data,error}=await sb.functions.invoke("fetch-conditions",{body:{river,timestamp:ts}});
            if(cancelled)return;
            if(error||!data||data.error||(data.water_flow==null&&data.water_temp==null&&data.air_temp==null)){setPreview(null);return;}
            setPreview(data);
          }catch(e){if(!cancelled)setPreview(null);}
        },600);
        return()=>{cancelled=true;clearTimeout(h);};
      },[expanded,river,date,time]);
      useEffect(()=>{
        if(expanded&&Object.keys(cond).length===0){
          try{
            const last=localStorage.getItem(LAST_COND_KEY);
            if(last){
              const parsed=JSON.parse(last);
              const{airTemp,waterTemp,...rest}=parsed;
              if(Object.keys(rest).length>0)onChange(rest);
            }
          }catch(e){}
        }
      // eslint-disable-next-line react-hooks/exhaustive-deps
      },[expanded]);
      const update=(k,v)=>{
        const next={...cond};
        if(next[k]===v)delete next[k];else next[k]=v;
        onChange(next);
        try{
          const store={...next};delete store.airTemp;delete store.waterTemp;
          localStorage.setItem(LAST_COND_KEY,JSON.stringify(store));
        }catch(e){}
      };
      const setTemp=(k,v)=>{
        const next={...cond};
        if(v===null)delete next[k];else next[k]=v;
        onChange(next);
      };
      const filled=Object.values(cond).filter(v=>v!==null&&v!==undefined&&v!=="").length;
      const weatherOpts=[
        {key:"sunny",icon:I.sun(),label:L("cond_weather_sunny")},
        {key:"partlyCloudy",icon:I.cloudSun(),label:L("cond_weather_partly")},
        {key:"cloudy",icon:I.cloud(),label:L("cond_weather_cloudy")},
        {key:"rain",icon:I.cloudRain(),label:L("cond_weather_rain")},
        {key:"showers",icon:I.cloudDrizzle(),label:L("cond_weather_showers")},
      ];
      const windOpts=[
        {key:"calm",strength:0,label:L("cond_wind_calm")},
        {key:"lightBreeze",strength:1,label:L("cond_wind_light")},
        {key:"fresh",strength:2,label:L("cond_wind_fresh")},
        {key:"strong",strength:3,label:L("cond_wind_strong")},
      ];
      const levelOpts=[
        {key:"low",label:L("cond_level_low")},
        {key:"medium",label:L("cond_level_medium")},
        {key:"high",label:L("cond_level_high")},
      ];
      const colorOpts=[
        {key:"clear",label:L("cond_color_clear")},
        {key:"tinted",label:L("cond_color_tinted")},
        {key:"murky",label:L("cond_color_murky")},
      ];
      return <div style={{marginTop:8,borderRadius:12,border:`1px solid ${t.cardBorder}`,background:t.cardBg,overflow:"hidden"}}>
        <button type="button" onClick={()=>setExpanded(!expanded)} aria-expanded={expanded} style={{
          width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"14px 16px",background:"transparent",border:"none",color:t.text,
          cursor:"pointer",fontFamily:t.font,WebkitTapHighlightColor:"transparent"
        }}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16,fontWeight:500}}>{L("cond_title")}</span>
            {filled>0
              ? <span style={{fontSize:12,fontWeight:600,color:t.primary,background:t.primaryLight,padding:"2px 8px",borderRadius:10}}>{filled}</span>
              : <span style={{fontSize:12,color:t.textMuted,fontWeight:400}}>{L("cond_optional")}</span>}
          </div>
          <span style={{color:t.textSec,display:"flex"}}>{expanded?I.chevUp():I.chevDown()}</span>
        </button>
        {expanded&&<div style={{padding:"4px 16px 16px 16px"}}>
          {preview&&<div style={{display:"flex",flexDirection:"column",gap:4,background:t.primaryLight,borderRadius:10,padding:"10px 12px",margin:"6px 0 10px"}}>
            <span style={{fontSize:12,fontWeight:600,color:t.primary}}>{L("cond_auto_title")}</span>
            <span style={{fontSize:13,color:t.chipText,fontWeight:500}}>
              {[preview.water_flow!=null?`${Math.round(preview.water_flow*10)/10} m³/s`:null,
                preview.water_temp!=null?`${Math.round(preview.water_temp*10)/10}°C ${L("cond_water_short")}`:null,
                preview.air_temp!=null?`${Math.round(preview.air_temp*10)/10}°C ${L("cond_air_short")}`:null].filter(Boolean).join("  ·  ")}
            </span>
            {preview.nve_station&&<span style={{fontSize:11,color:t.textMuted}}>{preview.nve_station} (NVE)</span>}
          </div>}
          <CondRow label={L("cond_weather")} cols={5} t={t}>
            {weatherOpts.map(o=><CondChip key={o.key} selected={cond.weather===o.key} onClick={()=>update("weather",o.key)} icon={o.icon} label={o.label} t={t}/>)}
          </CondRow>
          <CondRow label={L("cond_wind")} cols={4} t={t}>
            {windOpts.map(o=><CondChip key={o.key} selected={cond.wind===o.key} onClick={()=>update("wind",o.key)} icon={<WindIcon strength={o.strength}/>} label={o.label} t={t}/>)}
          </CondRow>
          <CondRow label={L("cond_water_level")} cols={3} t={t}>
            {levelOpts.map(o=><CondChip key={o.key} selected={cond.waterLevel===o.key} onClick={()=>update("waterLevel",o.key)} icon={<WaterLevelIcon level={o.key}/>} label={o.label} t={t}/>)}
          </CondRow>
          <CondRow label={L("cond_water_color")} cols={3} t={t}>
            {colorOpts.map(o=><CondChip key={o.key} selected={cond.waterColor===o.key} onClick={()=>update("waterColor",o.key)} icon={<WaterColorIcon color={o.key}/>} label={o.label} t={t}/>)}
          </CondRow>
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <CondTemp label={L("cond_air_temp")} value={cond.airTemp} onChange={v=>setTemp("airTemp",v)} t={t}/>
            <CondTemp label={L("cond_water_temp")} value={cond.waterTemp} onChange={v=>setTemp("waterTemp",v)} t={t}/>
          </div>
        </div>}
      </div>;
    }

    // ── FormView ──
    function FormView({L,lang,onSave,onCancel,initial,initialGroupIds,isEdit,prefs,profile,myGroups,allRivers,allFlies,S,t}){
      const fileRef=useRef();
      useEffect(()=>{window.scrollTo(0,0);},[]);
      const[form,setForm]=useState(()=>{
        const allGroupIds=(myGroups||[]).map(g=>g.id);
        if(initial){
          // Migrer gamle fangster uten visibility-felt
          const vis=initial.visibility||(initial.is_public?"public":"private");
          // Hvis vi får inn initialGroupIds (ved redigering), bruk dem; ellers default til alle grupper
          const selected=initialGroupIds&&initialGroupIds.length>0?initialGroupIds:allGroupIds;
          return{...initial,photos:initial.photos||[],visibility:vis,selectedGroupIds:selected,fly_pattern:initial.fly_pattern||"",conditions:initial.conditions||{}};
        }
        const defaultVis=profile?.default_visibility||(profile?.default_public?"public":"private");
        return{river:prefs?.lastRiver||"",beat:"",date:new Date().toISOString().split("T")[0],time:"",length:"",weight:"",equipment:prefs?.lastEquipment||"Flue",fly_pattern:"",species:"Laks",released:true,photos:[],description:"",visibility:defaultVis,selectedGroupIds:allGroupIds,conditions:{}};
      });
      const[newPhotoFiles,setNewPhotoFiles]=useState([]);
      const[newPhotoPreviews,setNewPhotoPreviews]=useState([]);
      const[weightManual,setWeightManual]=useState(false);
      const[estimatedWt,setEstimatedWt]=useState(null);
      const[saving,setSaving]=useState(false);

      const set=(k,v)=>setForm(f=>({...f,[k]:v}));
      const handleLength=val=>{set("length",val);if(val&&!weightManual){const est=estimateWeight(val);setEstimatedWt(est);if(est)set("weight",est);}if(!val&&val!==0){setEstimatedWt(null);if(!weightManual)set("weight",null);}};
      const handleWeight=val=>{set("weight",val);setWeightManual(true);};

      const handlePhotos=async(e)=>{
        const files=Array.from(e.target.files||[]);
        const blobs=await Promise.all(files.map(f=>resizeImage(f)));
        const previews=blobs.map(b=>URL.createObjectURL(b));
        setNewPhotoFiles(prev=>[...prev,...blobs]);
        setNewPhotoPreviews(prev=>[...prev,...previews]);
        e.target.value="";
      };

      const removeExistingPhoto=idx=>set("photos",form.photos.filter((_,i)=>i!==idx));
      const removeNewPhoto=idx=>{
        URL.revokeObjectURL(newPhotoPreviews[idx]);
        setNewPhotoFiles(prev=>prev.filter((_,i)=>i!==idx));
        setNewPhotoPreviews(prev=>prev.filter((_,i)=>i!==idx));
      };

      const valid=form.river&&form.date&&form.species&&(form.visibility!=="groups"||(form.selectedGroupIds&&form.selectedGroupIds.length>0));
      const submit=async()=>{setSaving(true);await onSave(form,newPhotoFiles);setSaving(false);};

      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onCancel}>{I.xLarge()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:24,fontWeight:700,color:t.text,margin:"0 0 14px"}}>{isEdit?L("form_edit"):L("form_new")}</h2>

        <div style={{marginBottom:10}}>
          {(form.photos.length>0||newPhotoPreviews.length>0)&&(
            <div className="photo-scroll" style={{marginBottom:8}}>
              {form.photos.map((p,i)=>(<div key={"e"+i} style={{position:"relative",width:140,height:105,borderRadius:12,overflow:"hidden",flexShrink:0}}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>removeExistingPhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:12,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.x()}</button></div>))}
              {newPhotoPreviews.map((p,i)=>(<div key={"n"+i} style={{position:"relative",width:140,height:105,borderRadius:12,overflow:"hidden",flexShrink:0}}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>removeNewPhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:12,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.x()}</button></div>))}
            </div>
          )}
          <button onClick={()=>fileRef.current?.click()} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderRadius:12,border:`2px dashed ${t.inputBorder}`,background:t.primaryLight,cursor:"pointer",color:t.textSec,fontSize:15,fontFamily:t.font,width:"100%",justifyContent:"center"}}>
            {I.imgPlus()} {(form.photos.length+newPhotoPreviews.length)===0?L("form_add_photos"):L("form_add_more_photos")}
          </button>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handlePhotos}/>
        </div>

        <Lbl t={L("form_river_label")} th={t}/><RiverInput value={form.river} onChange={v=>set("river",v)} allRivers={allRivers} placeholder={L("form_river_placeholder")} addLabel={L("form_add_river")} S={S} t={t}/>
        <Lbl t={L("form_beat_label")} th={t}/><input style={S.inp} placeholder={L("form_beat_placeholder")} value={form.beat||""} onChange={e=>set("beat",e.target.value)}/>
        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8}}><div><Lbl t={L("form_date")} th={t}/><DateTimeInput type="date" value={form.date} onChange={v=>set("date",v)} lang={lang} S={S} t={t}/></div><div><Lbl t={L("form_time")} th={t}/><DateTimeInput type="time" value={form.time||""} onChange={v=>set("time",v)} lang={lang} S={S} t={t}/></div></div>
        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lbl t={L("form_length")} th={t}/><NumInput placeholder="70" value={form.length} onChange={handleLength} S={S}/></div><div><Lbl t={L("form_weight")} th={t}/><NumInput placeholder="3,3" value={form.weight} onChange={handleWeight} S={S}/></div></div>
        {estimatedWt&&!weightManual&&<p style={{fontSize:13,color:t.textSec,margin:"4px 0 0",fontStyle:"italic"}}>{L("form_estimated_weight")} {estimatedWt} kg</p>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl t={L("form_species")} th={t}/><select style={S.inp} value={form.species} onChange={e=>set("species",e.target.value)}>{SPECIES.map((s,i)=><option key={s} value={s}>{L("species_options")[i]||s}</option>)}</select></div>
          <div><Lbl t={L("form_equipment")} th={t}/><select style={S.inp} value={form.equipment} onChange={e=>set("equipment",e.target.value)}>{EQUIPMENT.map((eq,i)=><option key={eq} value={eq}>{L("equipment_options")[i]||eq}</option>)}</select></div>
        </div>
        {form.equipment==="Flue"&&(<>
          <Lbl t={L("form_fly")} th={t}/>
          <RiverInput value={form.fly_pattern||""} onChange={v=>set("fly_pattern",v)} allRivers={allFlies||[]} placeholder={L("form_fly_placeholder")} addLabel={L("form_add_river")} S={S} t={t}/>
        </>)}
        <Lbl t={L("form_released_q")} th={t}/><div style={{display:"flex",gap:8}}><button style={form.released?S.togOn:S.togOff} onClick={()=>set("released",true)}>{L("form_yes")}</button><button style={!form.released?S.togOn:S.togOff} onClick={()=>set("released",false)}>{L("form_no")}</button></div>

        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>

        <Lbl t={L("form_visibility")} th={t}/>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {[
            {key:"private",icon:I.lock(),title:L("visibility_private"),desc:L("vis_private_desc")},
            {key:"groups",icon:<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>,title:L("visibility_groups_short"),desc:myGroups&&myGroups.length>0?L("vis_groups_desc_active",myGroups.length):L("vis_groups_desc_empty"),disabled:!myGroups||myGroups.length===0},
            {key:"public",icon:I.world(),title:L("visibility_public_short"),desc:L("vis_public_desc")},
          ].map(opt=>{
            const sel=form.visibility===opt.key;
            return (
              <button key={opt.key} disabled={opt.disabled} onClick={()=>set("visibility",opt.key)} style={{
                display:"flex",alignItems:"center",gap:10,
                padding:"10px 12px",borderRadius:10,
                border:sel?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,
                background:sel?t.primaryLight:t.cardBg,
                fontFamily:t.font,cursor:opt.disabled?"not-allowed":"pointer",
                opacity:opt.disabled?.45:1,
                textAlign:"left",width:"100%"
              }}>
                <div style={{color:sel?t.primary:t.textMuted,display:"flex"}}>{opt.icon}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:14,fontWeight:600,color:sel?t.primary:t.text,margin:0}}>{opt.title}</p>
                  <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0",lineHeight:1.3}}>{opt.desc}</p>
                </div>
              </button>
            );
          })}
        </div>

        {form.visibility==="groups"&&myGroups&&myGroups.length>0&&(
          <div style={{marginTop:8,padding:"10px 12px",background:t.chipBg,borderRadius:10,border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:12,fontWeight:600,color:t.textSec,margin:"0 0 8px",textTransform:"uppercase",letterSpacing:0.4}}>{L("vis_share_with")}</p>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {myGroups.map(g=>{
                const checked=(form.selectedGroupIds||[]).includes(g.id);
                return (
                  <button key={g.id} onClick={()=>{
                    const cur=form.selectedGroupIds||[];
                    const next=checked?cur.filter(x=>x!==g.id):[...cur,g.id];
                    set("selectedGroupIds",next);
                  }} style={{
                    display:"flex",alignItems:"center",gap:10,
                    padding:"8px 10px",borderRadius:8,
                    background:"transparent",border:"none",cursor:"pointer",
                    fontFamily:t.font,textAlign:"left",width:"100%"
                  }}>
                    <div style={{
                      width:20,height:20,borderRadius:5,flexShrink:0,
                      border:`2px solid ${checked?t.primary:t.inputBorder}`,
                      background:checked?t.primary:"transparent",
                      display:"flex",alignItems:"center",justifyContent:"center"
                    }}>
                      {checked&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={t.primaryInk} strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}
                    </div>
                    <span style={{fontSize:14,color:t.text,flex:1}}>{g.name}</span>
                    <span style={{fontSize:12,color:t.textMuted}}>{trMembers(g.member_count,lang)}</span>
                  </button>
                );
              })}
            </div>
            {(form.selectedGroupIds||[]).length===0&&(
              <p style={{fontSize:12,color:t.danger,margin:"8px 0 0"}}>{L("vis_pick_at_least_one")}</p>
            )}
          </div>
        )}

        <ConditionsSection value={form.conditions} onChange={v=>set("conditions",v)} L={L} t={t} river={form.river} date={form.date} time={form.time}/>

        <Lbl t={L("form_note")} th={t}/><textarea style={{...S.inp,minHeight:70,resize:"vertical"}} placeholder={L("form_note_placeholder")} value={form.description||""} onChange={e=>set("description",e.target.value)}/>
        <button style={{...S.btnPriFull,opacity:(valid&&!saving)?1:.45,marginTop:20}} disabled={!valid||saving} onClick={submit}>
          {saving?L("form_saving"):(isEdit?L("form_save_edit"):L("form_save"))}
        </button>
        <div style={{height:30}}/>
      </div>);
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));});}</script>

<script>
    // PWA iOS Banner Logic med språkstøtte 🌍
    function sjekkIosPWA() {
      const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
      const isStandalone = ('standalone' in window.navigator) && (window.navigator.standalone);

      if (isIos && !isStandalone) {
        const lastPrompt = localStorage.getItem('pwa_ios_prompt_timestamp');
        const now = Date.now();
        
        if (!lastPrompt || (now - lastPrompt > 24 * 60 * 60 * 1000)) {
          opprettInstallasjonsBanner();
        }
      }
    }

    function opprettInstallasjonsBanner() {
      // Sjekk om språket er satt i appen din, eller bruk telefonens eget språk
      const appLang = localStorage.getItem('lang') || navigator.language || 'no';
      const isEnglish = appLang.toLowerCase().startsWith('en');

      // Tekster på engelsk og norsk
      const text = {
        title: isEnglish ? "Install Speylog 🎣" : "Installer Speylog 🎣",
        desc: isEnglish 
          ? "To stay logged in, add the app to your home screen:" 
          : "For å slippe å logge inn på nytt, lagre appen på hjemskjermen din:",
        step1: isEnglish 
          ? "Tap the Share button in Safari" 
          : "Trykk på dele-knappen i Safari",
        step2: isEnglish 
          ? 'Scroll down and tap <strong style="color: #5ee6a0;">"Add to Home Screen"</strong> <span style="font-size: 16px;">+</span>.' 
          : 'Scroll ned og velg <strong style="color: #5ee6a0;">"Legg til på hjemskjerm"</strong> <span style="font-size: 16px;">+</span>.'
      };

      const banner = document.createElement('div');
      banner.id = 'pwa-ios-banner';
      
      banner.style.position = 'fixed';
      banner.style.bottom = 'calc(24px + env(safe-area-inset-bottom, 0px))';
      banner.style.left = '50%';
      banner.style.transform = 'translateX(-50%)';
      banner.style.width = 'calc(100% - 32px)';
      banner.style.maxWidth = '400px';
      banner.style.backgroundColor = '#162320'; 
      banner.style.color = '#e8f0ec'; 
      banner.style.border = '1px solid #2a4038'; 
      banner.style.padding = '18px';
      banner.style.borderRadius = '16px';
      banner.style.boxShadow = '0px 8px 32px rgba(0,0,0,0.5)';
      banner.style.zIndex = '99999';
      banner.style.fontFamily = '"DM Sans", -apple-system, sans-serif';

      banner.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600; font-size: 16px; color: #5ee6a0;">${text.title}</span>
            <button id="lukk-pwa-banner" style="background: none; border: none; color: #5f7d6e; font-size: 24px; cursor: pointer; padding: 0 4px; line-height: 1;">&times;</button>
          </div>
          <p style="margin: 0; font-size: 13px; color: #9bb5a8; line-height: 1.4;">
            ${text.desc}
          </p>
          <div style="background: #0f1a17; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; color: #e8f0ec;">
            <ol style="margin: 0; padding-left: 18px;">
              <li style="margin-bottom: 6px;">${text.step1} <span style="font-size: 15px; background: #1c2e28; padding: 2px 6px; border-radius: 4px;">⎋</span>.</li>
              <li>${text.step2}</li>
            </ol>
          </div>
        </div>
      `;

      document.body.appendChild(banner);

      document.getElementById('lukk-pwa-banner').addEventListener('click', () => {
        banner.remove();
        localStorage.setItem('pwa_ios_prompt_timestamp', Date.now().toString());
      });
    }

    window.addEventListener('load', sjekkIosPWA);
  </script>
</body>
</html>
