    function avatarColor(seed){
      const colors=["#1a5c3a","#2d6a4f","#52796f","#386641","#6a994e","#8b5cf6","#7c3aed","#0891b2","#0e7490","#b45309","#a16207","#be123c","#9f1239","#9333ea","#1e40af"];
      let h=0;
      const s=seed||"?";
      for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;
      return colors[h%colors.length];
    }

    function resizeImage(file,maxW=800){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            let w=img.width,h=img.height;
            if(w>maxW){h=h*(maxW/w);w=maxW;}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            canvas.toBlob(blob=>{if(blob)resolve(blob);else reject("Blob failed");},"image/jpeg",0.65);
          };
          img.onerror=reject;
          img.src=ev.target.result;
        };
        reader.onerror=reject;
        reader.readAsDataURL(file);
      });
    }

    // ── Generate share image (original photo ratio, scaled to ~1080px wide) ──
    async function generateShareImage(c,profileData,lang){
      const loadImg=async(url)=>{
        const res=await fetch(url,{mode:"cors"});
        const blob=await res.blob();
        const objUrl=URL.createObjectURL(blob);
        return new Promise((resolve,reject)=>{
          const img=new Image();
          img.onload=()=>{URL.revokeObjectURL(objUrl);resolve(img);};
          img.onerror=reject;
          img.src=objUrl;
        });
      };

      // Determine canvas size from photo's natural ratio
      let W=1080,H=1350; // fallback if no photo
      let bgImg=null;
      const photoUrl=(c.photos||[])[0];
      if(photoUrl){
        try{
          bgImg=await loadImg(photoUrl);
          // Scale to max 1080 on longest side, keep ratio
          const ratio=bgImg.width/bgImg.height;
          if(ratio>=1){
            W=1080;
            H=Math.round(1080/ratio);
          }else{
            H=1080;
            W=Math.round(1080*ratio);
          }
        }catch(e){
          // fallback to default
        }
      }

      const canvas=document.createElement("canvas");
      canvas.width=W;canvas.height=H;
      const ctx=canvas.getContext("2d");

      const drawCover=(img,x,y,w,h)=>{
        const iw=img.width,ih=img.height;
        const scale=Math.max(w/iw,h/ih);
        const sw=w/scale,sh=h/scale;
        const sx=(iw-sw)/2,sy=(ih-sh)/2;
        ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
      };

      const roundRect=(x,y,w,h,r)=>{
        ctx.beginPath();
        ctx.moveTo(x+r,y);
        ctx.arcTo(x+w,y,x+w,y+h,r);
        ctx.arcTo(x+w,y+h,x,y+h,r);
        ctx.arcTo(x,y+h,x,y,r);
        ctx.arcTo(x,y,x+w,y,r);
        ctx.closePath();
      };

      if(bgImg){
        // Draw at natural ratio (no cropping)
        ctx.drawImage(bgImg,0,0,W,H);
      }else{
        ctx.fillStyle="#1a5c3a";
        ctx.fillRect(0,0,W,H);
      }

      // Top gradient — height scales with canvas (≈19% of height)
      const topGradH=Math.round(H*0.19);
      const topGrad=ctx.createLinearGradient(0,0,0,topGradH);
      topGrad.addColorStop(0,"rgba(0,0,0,.6)");
      topGrad.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=topGrad;
      ctx.fillRect(0,0,W,topGradH);

      // Bottom gradient — height scales with canvas (≈37% of height)
      const botGradH=Math.round(H*0.37);
      const botGrad=ctx.createLinearGradient(0,H-botGradH,0,H);
      botGrad.addColorStop(0,"rgba(0,0,0,0)");
      botGrad.addColorStop(0.5,"rgba(0,0,0,.5)");
      botGrad.addColorStop(1,"rgba(0,0,0,.85)");
      ctx.fillStyle=botGrad;
      ctx.fillRect(0,H-botGradH,W,botGradH);

      // Scale text/elements based on canvas width (1080 = baseline)
      const sc=W/1080; // scale factor

      const topY=Math.round(90*sc);
      const avatarSize=Math.round(80*sc);
      const avatarX=Math.round(50*sc);
      let nameX=avatarX+avatarSize+Math.round(24*sc);
      const ownerName=profileData?.display_name||profileData?.username||"";
      const avatarUrl=profileData?.avatar_url;

      ctx.save();
      ctx.beginPath();
      ctx.arc(avatarX+avatarSize/2,topY+avatarSize/2,avatarSize/2,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      if(avatarUrl){
        try{
          const aImg=await loadImg(avatarUrl);
          drawCover(aImg,avatarX,topY,avatarSize,avatarSize);
        }catch(e){
          ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
          ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
          ctx.fillStyle="#fff";
          ctx.font=`bold ${Math.round(40*sc)}px -apple-system, system-ui, sans-serif`;
          ctx.textAlign="center";
          ctx.textBaseline="middle";
          ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
        }
      }else{
        ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
        ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
        ctx.fillStyle="#fff";
        ctx.font=`bold ${Math.round(40*sc)}px -apple-system, system-ui, sans-serif`;
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
      }
      ctx.restore();

      ctx.fillStyle="#fff";
      ctx.font=`600 ${Math.round(38*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="left";
      ctx.textBaseline="alphabetic";
      ctx.shadowColor="rgba(0,0,0,.6)";
      ctx.shadowBlur=8;
      ctx.fillText(ownerName,nameX,topY+Math.round(44*sc));

      ctx.font=`500 ${Math.round(30*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="right";
      ctx.fillText(fmtDate(c.date),W-Math.round(50*sc),topY+Math.round(44*sc));
      ctx.shadowBlur=0;

      const titleY=H-Math.round(180*sc);
      ctx.fillStyle="#fff";
      ctx.font=`700 ${Math.round(56*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="left";
      ctx.shadowColor="rgba(0,0,0,.7)";
      ctx.shadowBlur=10;
      const L=lang||"nb";const title=`${trSpecies(c.species,L)} · ${c.river}${c.beat?" · "+c.beat:""}`;
      let displayTitle=title;
      const maxTitleW=W-Math.round(100*sc);
      if(ctx.measureText(displayTitle).width>maxTitleW){
        while(ctx.measureText(displayTitle+"…").width>maxTitleW&&displayTitle.length>10){
          displayTitle=displayTitle.slice(0,-1);
        }
        displayTitle+="…";
      }
      ctx.fillText(displayTitle,Math.round(50*sc),titleY);
      ctx.shadowBlur=0;

      const chips=[];
      if(c.weight!=null)chips.push({text:`${c.weight} kg`,color:"#fff"});
      if(c.length!=null)chips.push({text:`${c.length} cm`,color:"#fff"});
      chips.push({text:trEquipment(c.equipment,L),color:"#fff"});
      chips.push({text:c.released?"C&R":STRINGS.detail_kept[L],color:c.released?"#a7f3d0":"#fecaca"});

      const chipY=H-Math.round(100*sc);
      const chipH=Math.round(54*sc);
      const chipPadding=Math.round(22*sc);
      const chipGap=Math.round(10*sc);
      ctx.font=`600 ${Math.round(26*sc)}px -apple-system, system-ui, sans-serif`;
      let chipX=Math.round(50*sc);
      chips.forEach(chip=>{
        const tw=ctx.measureText(chip.text).width;
        const cw=tw+chipPadding*2;
        ctx.fillStyle="rgba(255,255,255,.22)";
        roundRect(chipX,chipY,cw,chipH,Math.round(12*sc));
        ctx.fill();
        ctx.fillStyle=chip.color;
        ctx.textBaseline="middle";
        ctx.fillText(chip.text,chipX+chipPadding,chipY+chipH/2+2);
        chipX+=cw+chipGap;
      });

      return new Promise(resolve=>canvas.toBlob(b=>resolve(b),"image/jpeg",0.92));
    }

    async function shareCatch(c,profileData,lang){
      try{
        const blob=await generateShareImage(c,profileData,lang);
        if(!blob)throw new Error("Kunne ikke generere bilde");
        const file=new File([blob],`fangst-${c.id}.jpg`,{type:"image/jpeg"});
        const L=lang||"nb";
        const sp=trSpecies(c.species,L);
        const shareData={
          title:`${sp} · ${c.river}`,
          text:`${sp} · ${c.river}${c.beat?" · "+c.beat:""}`,
          files:[file],
        };
        if(navigator.canShare&&navigator.canShare(shareData)){
          await navigator.share(shareData);
        }else{
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=`fangst-${c.id}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        }
      }catch(e){
        if(e.name!=="AbortError"){
          const lang=detectLang();
          alert(STRINGS.share_failed[lang]+" "+(e.message||STRINGS.error_unknown[lang]));
        }
      }
    }

    // ── Avatar ──
    function Avatar({url,name,seed,size=32,t,onClick}){
      const initials=(name||"?").trim().charAt(0).toUpperCase()||"?";
      const bg=avatarColor(seed||name||"?");
      const style={width:size,height:size,borderRadius:size/2,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:bg,color:"#fff",fontSize:Math.round(size*0.42),fontWeight:600,fontFamily:t.font,overflow:"hidden",border:`1px solid ${t.cardBorder}`,cursor:onClick?"pointer":"default"};
      const inner=url?<img src={url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:initials;
      if(onClick)return <button onClick={onClick} style={{...style,padding:0}}>{inner}</button>;
      return <div style={style}>{inner}</div>;
    }

    // ── LazyImage (no longer lazy): loads all images eagerly, no fade-in ──
    // Low-traffic app — we prioritize instant display over bandwidth savings.
    function LazyImage({src,alt,style,onLoad}){
      return <div style={{...style,position:"relative",overflow:"hidden"}}>
        <img src={src} alt={alt||""} onLoad={onLoad} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      </div>;
    }

    // ── SwipeableImages ──
    function SwipeableImages({photos,onExpand,t,style}){
      const scrollRef=useRef();
      const[idx,setIdx]=useState(0);
      const handleScroll=()=>{
        if(!scrollRef.current)return;
        const w=scrollRef.current.offsetWidth;
        const i=Math.round(scrollRef.current.scrollLeft/w);
        if(i!==idx)setIdx(i);
      };
      return(<div style={{...style,overflow:"hidden"}}>
        <div ref={scrollRef} onScroll={handleScroll} style={{display:"flex",alignItems:"stretch",overflowX:"auto",overflowY:"hidden",scrollSnapType:"x mandatory",WebkitOverflowScrolling:"touch",width:"100%",height:"100%",scrollbarWidth:"none"}}>
          {photos.map((p,i)=>(
            <div key={i} style={{minWidth:"100%",width:"100%",scrollSnapAlign:"start",flexShrink:0}}>
              <img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            </div>
          ))}
        </div>
        {photos.length>1&&(
          <div style={{position:"absolute",bottom:110,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6,zIndex:4,pointerEvents:"none"}}>
            {photos.map((_,i)=>(
              <div key={i} style={{width:6,height:6,borderRadius:3,background:i===idx?"#fff":"rgba(255,255,255,.45)",boxShadow:"0 1px 2px rgba(0,0,0,.4)",transition:"background .2s"}}/>
            ))}
          </div>
        )}
        {onExpand&&(
          <button onClick={(e)=>{e.stopPropagation();onExpand(idx);}} style={{position:"absolute",top:"50%",right:12,transform:"translateY(-50%)",width:38,height:38,borderRadius:19,background:"rgba(0,0,0,.45)",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",backdropFilter:"blur(8px)",zIndex:4,opacity:.85}}>
            {I.expand()}
          </button>
        )}
      </div>);
    }

    // ══════════════════════════════════════
    // App Root
    // ══════════════════════════════════════
    function App(){
      const[session,setSession]=useState(null);
      const[loading,setLoading]=useState(true);
      const[themeKey,setThemeKey]=useState(lsGet("fl_theme")||"dark");
      const[lang,setLang]=useState(detectLang());
      const t=THEMES[themeKey];
      const S=makeStyles(t);
      const L=(key,...args)=>{
        const entry=STRINGS[key];
        if(!entry)return key;
        const val=entry[lang]||entry["nb"];
        if(typeof val==="function")return val(...args);
        return val;
      };

      useEffect(()=>{
        const bgColor=themeKey==="dark"?"#0f1a17":themeKey==="coastal"?"#faf8f4":"#f6f9f4";
        document.body.style.background=bgColor;
        document.documentElement.style.background=bgColor;
        const meta=document.querySelector('meta[name="theme-color"]');
        if(meta)meta.setAttribute("content",bgColor);
      },[themeKey]);

      useEffect(()=>{
        document.documentElement.lang=lang==="en"?"en":"no";
      },[lang]);

      useEffect(()=>{
        sb.auth.getSession().then(({data})=>{setSession(data.session);setLoading(false);});
        const {data:listener}=sb.auth.onAuthStateChange((_e,session)=>{setSession(session);});
        return()=>listener.subscription.unsubscribe();
      },[]);

      const switchTheme=(k)=>{setThemeKey(k);lsSet("fl_theme",k);};
      const switchLang=(l)=>{setLang(l);lsSet("fl_lang",l);};

      if(loading)return <div style={S.center}><div className="spinner"/></div>;
      if(!session)return <AuthView S={S} t={t} L={L} lang={lang}/>;
      return <MainApp session={session} S={S} t={t} L={L} lang={lang} themeKey={themeKey} switchTheme={switchTheme} switchLang={switchLang}/>;
    }

    // ══════════════════════════════════════
    // Auth View — OTP Code (works in PWA)
    // ══════════════════════════════════════
    function AuthView({S,t,L,lang}){
      const[email,setEmail]=useState("");
      const[displayName,setDisplayName]=useState("");
      const[code,setCode]=useState("");
      const[err,setErr]=useState("");
      const[busy,setBusy]=useState(false);
      const[step,setStep]=useState("email");

      const sendCode=async()=>{
        setErr("");setBusy(true);
        try{
          const {error}=await sb.auth.signInWithOtp({
            email,
            options:{
              data:displayName?{display_name:displayName}:undefined,
              shouldCreateUser:true,
            }
          });
          if(error)throw error;
          setStep("code");
        }catch(e){setErr(e.message||L("auth_something_wrong"));}
        setBusy(false);
      };

      const verifyCode=async()=>{
        setErr("");setBusy(true);
        try{
          const {error}=await sb.auth.verifyOtp({
            email,
            token:code.trim(),
            type:"email",
          });
          if(error)throw error;
        }catch(e){setErr(e.message||L("auth_wrong_code"));}
        setBusy(false);
      };

      if(step==="code"){
        return (
          <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
            <div style={{textAlign:"center",marginBottom:30}}>
              <AppLogo size={80} t={t}/>
              <h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>{L("auth_enter_code_title")}</h1>
            </div>
            <div style={{...S.sec,width:"100%",maxWidth:340}}>
              <p style={{fontSize:15,color:t.textSec,margin:"0 0 4px",textAlign:"center",lineHeight:1.5}}>{L("auth_we_sent")}</p>
              <p style={{fontSize:15,color:t.primary,fontWeight:600,margin:"0 0 16px",textAlign:"center"}}>{email}</p>
              <input
                style={{...S.inp,fontSize:24,textAlign:"center",letterSpacing:6,fontWeight:600,marginBottom:14}}
                inputMode="numeric"
                autoComplete="one-time-code"
                pattern="[0-9]*"
                maxLength={8}
                placeholder="00000000"
                value={code}
                onChange={e=>setCode(e.target.value.replace(/\D/g,""))}
                autoFocus
              />
              {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
              <button style={{...S.btnPriFull,opacity:(busy||code.length<6)?.6:1,marginBottom:8}} disabled={busy||code.length<6} onClick={verifyCode}>
                {busy?L("auth_checking"):L("auth_login")}
              </button>
              <button style={{...S.btnSec,fontSize:14,width:"100%"}} onClick={()=>{setStep("email");setCode("");setErr("");}}>{L("auth_use_other_email")}</button>
            </div>
          </div>
        );
      }

      const[slogan]=useState(()=>{
        const list=STRINGS.slogans[lang]||STRINGS.slogans.nb;
        return list[Math.floor(Math.random()*list.length)];
      });

      return (
        <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <AppLogo size={96} t={t}/>
            <h1 style={{fontFamily:t.titleFont,fontSize:32,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>{L("app_name")}</h1>
            <p style={{fontSize:16,color:t.text,margin:"6px 0 2px",fontWeight:500,fontStyle:"italic",maxWidth:300}}>{slogan}</p>
            <p style={{fontSize:13,color:t.textMuted,margin:0}}>{L("app_tagline")}</p>
            <p style={{fontSize:11,color:t.textMuted,margin:"6px 0 0",opacity:.6}}>v66</p>
          </div>
          <div style={{...S.sec,width:"100%",maxWidth:340}}>
            <p style={{fontSize:15,color:t.textSec,margin:"0 0 16px",textAlign:"center",lineHeight:1.5}}>{L("auth_intro")}</p>
            <label style={{fontSize:13,fontWeight:600,color:t.textSec}}>{L("auth_name_label")}</label>
            <input style={{...S.inp,marginTop:4,marginBottom:10}} placeholder="Magnus" value={displayName} onChange={e=>setDisplayName(e.target.value)}/>
            <label style={{fontSize:13,fontWeight:600,color:t.textSec}}>{L("auth_email_label")}</label>
            <input style={{...S.inp,marginTop:4,marginBottom:14}} type="email" inputMode="email" autoComplete="email" placeholder="navn@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
            {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
            <button style={{...S.btnPriFull,opacity:busy?.6:1}} disabled={busy||!email} onClick={sendCode}>
              {busy?L("auth_sending"):L("auth_send_code")}
            </button>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // Main App (authenticated)
    // ══════════════════════════════════════
    function MainApp({session,S,t,L,lang,themeKey,switchTheme,switchLang}){
      const[catches,setCatches]=useState([]);
      const[publicFeed,setPublicFeed]=useState([]);
      const[profile,setProfile]=useState(null);
      const[myGroups,setMyGroups]=useState([]);
      // groupMembersByGroup: { group_id: Set<user_id> } — for å filtrere feed lokalt
      const[groupMembersByGroup,setGroupMembersByGroup]=useState({});
      // catchGroupsMap: { catch_id: [group_id, ...] } — hvilke grupper hver fangst er delt med
      const[catchGroupsMap,setCatchGroupsMap]=useState({});
      const[customRivers,setCustomRivers]=useState(lsGet("fl_rivers")||[]);
      const[customFlies,setCustomFlies]=useState(lsGet("fl_flies")||[]);
      const[prefs,setPrefs]=useState(lsGet("fl_prefs")||{lastRiver:"",lastEquipment:"Flue"});
      const[view,setView]=useState("list");
      const[tab,setTab]=useState("mine");
      const[viewMode,setViewMode]=useState(lsGet("fl_viewMode")||"compact");
      const[selected,setSelected]=useState(null);
      const[editing,setEditing]=useState(null);
      const[loading,setLoading]=useState(true);
      const[listScrollY,setListScrollY]=useState(0);
      const[fR,setFR]=useState("Alle");
      const[fS,setFS]=useState("Alle");
      const[fY,setFY]=useState("Alle");
      const[hideOwnInFeed,setHideOwnInFeed]=useState(lsGet("fl_hideOwnInFeed")||false);
      const[feedFilter,setFeedFilter]=useState(lsGet("fl_feedFilter")||"all"); // 'all' | 'public' | group_id
      const[delModal,setDelModal]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const allRivers=[...new Set([...DEFAULT_RIVERS,...customRivers])].sort((a,b)=>a.localeCompare(b,"nb"));
      const allFlies=[...new Set([...DEFAULT_FLIES,...customFlies])].sort((a,b)=>a.localeCompare(b,"nb"));

      const loadCatches=async()=>{
        const {data:mine}=await sb.from("catches").select("*").eq("user_id",session.user.id).order("date",{ascending:false});
        setCatches(mine||[]);
        // Hent alt feed-innhold jeg har tilgang til (egne ekskludert via filter senere).
        // RLS sørger for at jeg kun ser: mine egne + visibility=public + visibility=groups med felles gruppe.
        const {data:pub}=await sb.from("catches").select("*, profiles(display_name, username, avatar_url)").in("visibility",["public","groups"]).order("date",{ascending:false}).limit(200);
        setPublicFeed(pub||[]);
        // Hent catch_groups for både egne og feed-fangster, så vi vet hvilke grupper hver fangst er delt med
        const allCatchIds=[...(mine||[]),...(pub||[])].map(c=>c.id);
        if(allCatchIds.length>0){
          const {data:cgRows}=await sb.from("catch_groups").select("catch_id, group_id").in("catch_id",allCatchIds);
          const map={};
          (cgRows||[]).forEach(r=>{
            if(!map[r.catch_id])map[r.catch_id]=[];
            map[r.catch_id].push(r.group_id);
          });
          setCatchGroupsMap(map);
        }else{
          setCatchGroupsMap({});
        }
        const {data:prof}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
        setProfile(prof||null);
        await loadMyGroups();
        setLoading(false);
      };

      const loadMyGroups=async()=>{
        // Hent grupper jeg er medlem av, med medlemstall
        const {data:memberships}=await sb.from("group_members").select("group_id, groups(id, name, created_by, created_at, invite_code)").eq("user_id",session.user.id);
        if(!memberships){setMyGroups([]);setGroupMembersByGroup({});return;}
        // Hent medlemstall og medlemslister for hver gruppe
        const groupIds=memberships.map(m=>m.group_id);
        let counts={};
        let membersByGroup={};
        if(groupIds.length>0){
          const {data:allMembers}=await sb.from("group_members").select("group_id, user_id").in("group_id",groupIds);
          (allMembers||[]).forEach(m=>{
            counts[m.group_id]=(counts[m.group_id]||0)+1;
            if(!membersByGroup[m.group_id])membersByGroup[m.group_id]=new Set();
            membersByGroup[m.group_id].add(m.user_id);
          });
        }
        const groups=memberships
          .filter(m=>m.groups)
          .map(m=>({...m.groups,member_count:counts[m.group_id]||0}));
        groups.sort((a,b)=>a.name.localeCompare(b.name,"nb"));
        setMyGroups(groups);
        setGroupMembersByGroup(membersByGroup);
      };

      const[inviteModal,setInviteModal]=useState(null); // {code, group} eller null
      useEffect(()=>{loadCatches();},[]);

      // Sjekk for ?invite=<kode> i URL ved app-start
      useEffect(()=>{
        const params=new URLSearchParams(window.location.search);
        const code=params.get("invite");
        if(!code)return;
        // Hent gruppe-info via RPC
        sb.rpc("get_group_by_invite",{p_invite_code:code}).then(({data,error})=>{
          if(error||!data||data.length===0){
            console.warn("Ugyldig invitasjonskode",error);
            // Rydd URL uansett
            window.history.replaceState({},document.title,window.location.pathname);
            return;
          }
          setInviteModal({code,group:data[0]});
        });
      },[]);

      const acceptInvite=async()=>{
        if(!inviteModal)return;
        const {error}=await sb.from("group_members").insert({
          group_id:inviteModal.group.id,
          user_id:session.user.id,
        });
        // Rydd URL
        window.history.replaceState({},document.title,window.location.pathname);
        if(error&&!error.message.includes("duplicate")){
          alert(L("group_join_failed")+" "+error.message);
        }
        setInviteModal(null);
        await loadMyGroups();
      };

      const declineInvite=()=>{
        window.history.replaceState({},document.title,window.location.pathname);
        setInviteModal(null);
      };

      const savePrefs=(p)=>{setPrefs(p);lsSet("fl_prefs",p);};
      const switchViewMode=(m)=>{setViewMode(m);lsSet("fl_viewMode",m);};
      const toggleHideOwnInFeed=()=>{const v=!hideOwnInFeed;setHideOwnInFeed(v);lsSet("fl_hideOwnInFeed",v);};
      const addCustomRiver=(name)=>{if(!customRivers.includes(name)){const next=[...customRivers,name];setCustomRivers(next);lsSet("fl_rivers",next);}};
      const addCustomFly=(name)=>{if(!customFlies.includes(name)&&!DEFAULT_FLIES.includes(name)){const next=[...customFlies,name];setCustomFlies(next);lsSet("fl_flies",next);}};

      const uploadPhotos=async(photoFiles)=>{
        const urls=[];
        for(const file of photoFiles){
          const ext="jpg";
          const filename=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
          const {error}=await sb.storage.from("catch-photos").upload(filename,file,UPLOAD_OPTS);
          if(error){console.error(error);continue;}
          const {data}=sb.storage.from("catch-photos").getPublicUrl(filename);
          urls.push(data.publicUrl);
        }
        return urls;
      };

      const addCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          user_id:session.user.id,
          visibility:form.visibility||"private",
          is_public:form.visibility==="public",
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          fly_pattern:form.equipment==="Flue"?(form.fly_pattern||null):null,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
        };
        const {data,error}=await sb.from("catches").insert(row).select().single();
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        // Lagre gruppe-koblinger hvis visibility=groups
        if(form.visibility==="groups"&&form.selectedGroupIds&&form.selectedGroupIds.length>0){
          const cgRows=form.selectedGroupIds.map(gid=>({catch_id:data.id,group_id:gid}));
          const {error:cgErr}=await sb.from("catch_groups").insert(cgRows);
          if(cgErr){console.error("catch_groups insert feilet",cgErr);alert(L("error_prefix")+" "+cgErr.message);}
          else{
            setCatchGroupsMap(prev=>({...prev,[data.id]:form.selectedGroupIds}));
          }
        }
        setCatches(prev=>[data,...prev]);
        savePrefs({lastRiver:form.river,lastEquipment:form.equipment});
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        if(form.equipment==="Flue"&&form.fly_pattern&&!DEFAULT_FLIES.includes(form.fly_pattern))addCustomFly(form.fly_pattern);
        setView("list");
      };

      const updateCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          visibility:form.visibility||"private",
          is_public:form.visibility==="public",
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          fly_pattern:form.equipment==="Flue"?(form.fly_pattern||null):null,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
        };
        const {data,error}=await sb.from("catches").update(row).eq("id",form.id).select().single();
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        // Synkroniser catch_groups: slett alle gamle, sett inn nye hvis groups-mode
        const {error:delErr}=await sb.from("catch_groups").delete().eq("catch_id",form.id);
        if(delErr)console.error("catch_groups delete feilet",delErr);
        if(form.visibility==="groups"&&form.selectedGroupIds&&form.selectedGroupIds.length>0){
          const cgRows=form.selectedGroupIds.map(gid=>({catch_id:form.id,group_id:gid}));
          const {error:cgErr}=await sb.from("catch_groups").insert(cgRows);
          if(cgErr){console.error("catch_groups insert feilet",cgErr);alert(L("error_prefix")+" "+cgErr.message);}
          else{
            setCatchGroupsMap(prev=>({...prev,[form.id]:form.selectedGroupIds}));
          }
        }else{
          setCatchGroupsMap(prev=>{const c={...prev};delete c[form.id];return c;});
        }
        setCatches(prev=>prev.map(x=>x.id===data.id?data:x));
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        if(form.equipment==="Flue"&&form.fly_pattern&&!DEFAULT_FLIES.includes(form.fly_pattern))addCustomFly(form.fly_pattern);
        setSelected(data);setView("detail");
      };

      const deleteCatch=async(id)=>{
        const {error}=await sb.from("catches").delete().eq("id",id);
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        setCatches(prev=>prev.filter(x=>x.id!==id));
        setDelModal(null);setView("list");
      };

      const signOut=async()=>{await sb.auth.signOut();};

      const years=[...new Set(catches.map(c=>new Date(c.date).getFullYear()))].sort((a,b)=>b-a);
      const usedRivers=[...new Set(catches.map(c=>c.river))].sort();
      const sourceList=tab==="mine"?catches:publicFeed;
      const filtered=sourceList.filter(c=>{
        if(tab==="feed"&&hideOwnInFeed&&c.user_id===session.user.id)return false;
        // Feed-filter: 'all' (default) = alt jeg har tilgang til
        //              'public' = bare visibility=public
        //              <group_id> = visibility=groups OG fangsten er eksplisitt koblet til denne gruppen
        if(tab==="feed"){
          const vis=c.visibility||(c.is_public?"public":"private");
          if(feedFilter==="public"){
            if(vis!=="public")return false;
          }else if(feedFilter!=="all"){
            // En spesifikk gruppe
            if(vis!=="groups")return false;
            const linkedGroups=catchGroupsMap[c.id]||[];
            if(!linkedGroups.includes(feedFilter))return false;
          }
        }
        if(fR!=="Alle"&&c.river!==fR)return false;
        if(fS!=="Alle"&&c.species!==fS)return false;
        if(fY!=="Alle"&&new Date(c.date).getFullYear()!==+fY)return false;
        return true;
      });

      if(loading)return <div style={S.center}><div className="spinner"/></div>;

      const fp={fR,setFR,fS,setFS,fY,setFY,years,rivers:usedRivers};

      return (
        <div style={S.app}>

    function Lightbox({photos,startIndex,onClose}){
      const[idx,setIdx]=useState(startIndex||0);
      useEffect(()=>{
        const onKey=(e)=>{
          if(e.key==="Escape")onClose();
          if(e.key==="ArrowLeft"&&idx>0)setIdx(idx-1);
          if(e.key==="ArrowRight"&&idx<photos.length-1)setIdx(idx+1);
        };
        document.addEventListener("keydown",onKey);
        return()=>document.removeEventListener("keydown",onKey);
      },[idx,photos.length,onClose]);
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
        <button onClick={onClose} style={{position:"absolute",top:"calc(12px + env(safe-area-inset-top))",right:16,background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",zIndex:201}}>{I.x()}</button>
        {photos.length>1&&<div style={{position:"absolute",bottom:"calc(20px + env(safe-area-inset-bottom))",color:"#fff",fontSize:14,opacity:.7}}>{idx+1} / {photos.length}</div>}
        {photos.length>1&&idx>0&&<button onClick={e=>{e.stopPropagation();setIdx(idx-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
        {photos.length>1&&idx<photos.length-1&&<button onClick={e=>{e.stopPropagation();setIdx(idx+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%) rotate(180deg)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
        <img src={photos[idx]} alt="" style={{maxWidth:"100%",maxHeight:"90vh",objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>

    function RiverInput({value,onChange,allRivers,S,t,placeholder,addLabel}){
      const[query,setQuery]=useState(value||"");const[open,setOpen]=useState(false);const wrapRef=useRef();
      useEffect(()=>{setQuery(value||"");},[value]);
      useEffect(()=>{const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};},[]);
      const q=query.toLowerCase().trim();const filtered=q?allRivers.filter(r=>r.toLowerCase().includes(q)):allRivers;const exactMatch=allRivers.some(r=>r.toLowerCase()===q);const showAdd=q&&!exactMatch&&q.length>=2;
      const select=r=>{setQuery(r);onChange(r);setOpen(false);};
      return(<div ref={wrapRef} style={{position:"relative"}}><div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:t.textMuted,pointerEvents:"none"}}>{I.search()}</div><input style={{...S.inp,paddingLeft:34,paddingRight:query?34:12}} placeholder={placeholder||"Søk eller skriv elvenavn..."} value={query} onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>{query&&<button style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:t.textMuted,padding:4}} onClick={()=>{setQuery("");onChange("");setOpen(false);}}>{I.x()}</button>}</div>
        {open&&(filtered.length>0||showAdd)&&(<div style={S.dropdown}><div style={{maxHeight:200,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>{filtered.map(r=><div key={r} style={S.dropItem} onMouseDown={()=>select(r)} onTouchEnd={e=>{e.preventDefault();select(r);}}>{r}</div>)}{showAdd&&<div style={{...S.dropItem,color:t.primary,fontWeight:600}} onMouseDown={()=>select(query.trim())} onTouchEnd={e=>{e.preventDefault();select(query.trim());}}>+ {addLabel||"Legg til"} «{query.trim()}»</div>}</div></div>)}
      </div>);

    function NumInput({value,onChange,placeholder,S}){
      const[display,setDisplay]=useState(value!=null&&value!==""?String(value):"");const skip=useRef(false);
      useEffect(()=>{if(skip.current){skip.current=false;return;}setDisplay(value!=null&&value!==undefined&&value!==""?String(value):"");},[value]);
      const handleChange=e=>{let v=e.target.value.replace(/[^0-9.,]/g,"");const parts=v.split(/[.,]/);if(parts.length>2)v=parts[0]+"."+parts.slice(1).join("");setDisplay(v);skip.current=true;onChange(parseNum(v));};
      return <input style={S.inp} inputMode="decimal" placeholder={placeholder} value={display} onChange={handleChange}/>;
    }

    // ── ListView ──
    function ListView({L,lang,catches,total,fp,S,t,tab,setTab,viewMode,switchViewMode,hideOwnInFeed,toggleHideOwnInFeed,myGroups,feedFilter,setFeedFilter,session,profile,initialScrollY,onSelect,onAdd,onStats,onProfile,onRefresh,onExpandPhotos}){

      useEffect(()=>{
        if(initialScrollY>0){
          // Bruker rAF for å sikre at DOM er rendret før vi scroller
          requestAnimationFrame(()=>window.scrollTo(0,initialScrollY));
        }
      },[]);
      const[pullY,setPullY]=useState(0);
      const[refreshing,setRefreshing]=useState(false);
      const startY=useRef(0);
      const isPulling=useRef(false);
      const PULL_THRESHOLD=70;
      const MAX_PULL=120;

      const handleTouchStart=(e)=>{
        if(window.scrollY<=0&&!refreshing){
          startY.current=e.touches[0].clientY;
          isPulling.current=true;
        }
      };
      const handleTouchMove=(e)=>{
        if(!isPulling.current||refreshing)return;
        const diff=e.touches[0].clientY-startY.current;
        if(diff>0&&window.scrollY<=0){
          setPullY(Math.min(diff*0.5,MAX_PULL));
        }else{
          isPulling.current=false;
          setPullY(0);
        }
      };
      const handleTouchEnd=async()=>{
        if(!isPulling.current)return;
        isPulling.current=false;
        if(pullY>=PULL_THRESHOLD){
          setRefreshing(true);
          setPullY(50);
          try{await onRefresh();}catch(e){console.error(e);}
          setRefreshing(false);
          setPullY(0);
        }else{
          setPullY(0);
        }
      };

      const pullProgress=Math.min(pullY/PULL_THRESHOLD,1);

      return(<div className="safe-top safe-bottom" style={S.page} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
        {(pullY>0||refreshing)&&(

          </div>
        )}
        <div style={{transform:`translateY(${pullY}px)`,transition:isPulling.current?"none":"transform 0.2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:0}}>{L("app_name")}</h1><p style={{fontSize:14,color:t.textMuted,margin:"2px 0 0"}}>{tab==="mine"?trCatches(total,lang):L("tab_feed")}</p></div>

        <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>

            <button style={tab==="feed"?S.tabActive:S.tab} onClick={()=>setTab("feed")}>{L("tab_feed")}</button>
          </div>
          <button onClick={()=>setFilterModalOpen(true)} style={{position:"relative",width:42,height:42,borderRadius:11,background:hasActiveFilter?t.primaryLight:t.cardBg,color:hasActiveFilter?t.primary:t.primary,border:`1px solid ${hasActiveFilter?t.primary:t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {I.filter()}
            {hasActiveFilter&&<span style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:4,background:t.primary,boxShadow:`0 0 0 2px ${t.cardBg}`}}/>}
          </button>
          <button onClick={()=>switchViewMode(viewMode==="compact"?"large":"compact")} style={{width:42,height:42,borderRadius:11,background:t.cardBg,color:t.primary,border:`1px solid ${t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>

        {showWelcome&&(
          <div style={{...S.sec,background:t.primaryLight,border:`1px solid ${t.primary}`,padding:"16px 18px"}}>

        </div>

    function CatchCard({L,lang,c,S,t,showOwner,currentUserId,onClick}){
      const photos=c.photos||[];
      const thumb=photos.length>0?photos[0]:null;
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      const displayedName=isOwn?(ownerName?`${ownerName} ${L("you_suffix")}`:L("you")):ownerName;
      return(<div style={S.card} onClick={onClick}>
        {thumb?<LazyImage src={thumb} style={S.thumb}/>:<div style={S.thumbNone}>{I.fish(24,t.textMuted)}</div>}
        <div style={{flex:1,minWidth:0}}>
          {showOwner?(
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
              <Avatar url={avatarUrl} name={ownerName} seed={seed} size={26} t={t}/>
              <span style={{fontSize:14,fontWeight:600,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{displayedName}</span>
              <span style={{fontSize:12,color:t.textMuted,flexShrink:0}}>{fmtDateLang(c.date,lang)}</span>
            </div>
          ):(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:12,color:t.textMuted}}>{fmtDateLang(c.date,lang)}</span>
              {(()=>{
                const vis=c.visibility||(c.is_public?"public":"private");
                if(vis==="public")return <span style={{fontSize:11,color:t.primary,display:"inline-flex",alignItems:"center",gap:3}}>{I.world()} {L("visibility_public_short")}</span>;
                if(vis==="groups")return <span style={{fontSize:11,color:t.primary,display:"inline-flex",alignItems:"center",gap:3}}>● {L("visibility_groups_short")}</span>;
                return null;
              })()}
            </div>
          )}
          <div style={{fontSize:14,color:t.textSec,marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{trSpecies(c.species,lang)} · {c.river}{c.beat?` · ${c.beat}`:""}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {c.weight!=null&&<span style={S.chip}>{c.weight} kg</span>}
            {c.length!=null&&<span style={S.chip}>{c.length} cm</span>}
            <span style={S.chip}>{c.equipment==="Flue"&&c.fly_pattern?`${trEquipment(c.equipment,lang)} · ${c.fly_pattern}`:trEquipment(c.equipment,lang)}</span>
            <span style={{...S.chip,display:"inline-flex",alignItems:"center",gap:3,color:c.released?t.released:t.kept}}>{I.rel(c.released)}{c.released?"C&R":L("detail_kept")}</span>
            {photos.length>1&&<span style={S.chip}>{L("pictures_count",photos.length)}</span>}
          </div>
        </div>
      </div>);
    }

    function CatchCardLarge({L,lang,c,S,t,showOwner,currentUserId,onClick,onExpandPhotos}){
      const photos=c.photos||[];
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      const displayedName=isOwn?(ownerName?`${ownerName} ${L("you_suffix")}`:L("you")):ownerName;
      const hasPhotos=photos.length>0;

      const chips=(
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {c.weight!=null&&<span style={{...S.chip,background:"rgba(255,255,255,.22)",color:"#fff",backdropFilter:"blur(8px)",fontWeight:600}}>{c.weight} kg</span>}
          {c.length!=null&&<span style={{...S.chip,background:"rgba(255,255,255,.22)",color:"#fff",backdropFilter:"blur(8px)",fontWeight:600}}>{c.length} cm</span>}
          <span style={{...S.chip,background:"rgba(255,255,255,.22)",color:"#fff",backdropFilter:"blur(8px)",fontWeight:600}}>{c.equipment==="Flue"&&c.fly_pattern?`${trEquipment(c.equipment,lang)} · ${c.fly_pattern}`:trEquipment(c.equipment,lang)}</span>
          <span style={{...S.chip,display:"inline-flex",alignItems:"center",gap:3,background:"rgba(255,255,255,.22)",color:c.released?"#a7f3d0":"#fecaca",backdropFilter:"blur(8px)",fontWeight:600}}>{I.rel(c.released)}{c.released?"C&R":L("detail_kept")}</span>
        </div>
      );

      return(<div onClick={onClick} style={{position:"relative",borderRadius:16,overflow:"hidden",cursor:"pointer",aspectRatio:"3/4",background:t.cardBg,border:`1px solid ${t.cardBorder}`,boxShadow:t.shadow}}>
        {hasPhotos?(
          photos.length===1?(
            <img src={photos[0]} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
          ):(
            <SwipeableImages photos={photos} onExpand={onExpandPhotos} t={t} style={{position:"absolute",inset:0}}/>
          )
        ):(
          <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:t.chipBg}}>{I.fish(80,t.textMuted)}</div>
        )}
        <div style={{position:"absolute",top:0,left:0,right:0,padding:"12px 14px",background:hasPhotos?"linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0))":"transparent",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,pointerEvents:"none",zIndex:2}}>
          {showOwner?(
            <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1}}>
              <Avatar url={avatarUrl} name={ownerName} seed={seed} size={32} t={t}/>
              <span style={{fontSize:15,fontWeight:600,color:hasPhotos?"#fff":t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textShadow:hasPhotos?"0 1px 2px rgba(0,0,0,.5)":"none"}}>{displayedName}</span>
            </div>
          ):(
            (()=>{
              const vis=c.visibility||(c.is_public?"public":"private");
              if(vis==="public")return <span style={{fontSize:12,color:"#fff",display:"inline-flex",alignItems:"center",gap:4,background:"rgba(0,0,0,.45)",padding:"4px 10px",borderRadius:12,backdropFilter:"blur(8px)",fontWeight:500}}>{I.world()} {L("visibility_public_short")}</span>;
              if(vis==="groups")return <span style={{fontSize:12,color:"#fff",display:"inline-flex",alignItems:"center",gap:4,background:"rgba(0,0,0,.45)",padding:"4px 10px",borderRadius:12,backdropFilter:"blur(8px)",fontWeight:500}}>{L("visibility_groups_short")}</span>;
              return <div/>;
            })()
          )}
          <span style={{fontSize:13,color:hasPhotos?"#fff":t.textMuted,fontWeight:500,textShadow:hasPhotos?"0 1px 2px rgba(0,0,0,.5)":"none",flexShrink:0,marginLeft:"auto"}}>{fmtDateLang(c.date,lang)}</span>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"50px 14px 14px",background:hasPhotos?"linear-gradient(0deg,rgba(0,0,0,.78),rgba(0,0,0,.45) 60%,rgba(0,0,0,0))":"transparent",pointerEvents:"none",zIndex:2}}>
          <p style={{fontSize:17,fontWeight:700,color:hasPhotos?"#fff":t.text,margin:"0 0 8px",textShadow:hasPhotos?"0 1px 3px rgba(0,0,0,.6)":"none"}}>{trSpecies(c.species,lang)} · {c.river}{c.beat?` · ${c.beat}`:""}</p>
          {chips}
        </div>
      </div>);
    }

    // ── ProfileView ──
    function ProfileView({L,lang,switchLang,session,profile,catches,myGroups,onGroupsChange,S,t,themeKey,switchTheme,onBack,onUpdate,onSignOut}){
      const fileRef=useRef();
      const[displayName,setDisplayName]=useState(profile?.display_name||"");
      const[defaultVisibility,setDefaultVisibility]=useState(profile?.default_visibility||(profile?.default_public?"public":"private"));
      const[avatarUrl,setAvatarUrl]=useState(profile?.avatar_url||null);
      const[saving,setSaving]=useState(false);
      const[uploading,setUploading]=useState(false);
      const[msg,setMsg]=useState("");
      const[showCreateGroup,setShowCreateGroup]=useState(false);
      const[newGroupName,setNewGroupName]=useState("");
      const[creatingGroup,setCreatingGroup]=useState(false);
      const[shareGroup,setShareGroup]=useState(null); // gruppen som skal inviteres til
      const[leaveGroup,setLeaveGroup]=useState(null);
      const[profileAboutOpen,setProfileAboutOpen]=useState(false);
      const sendFeedback=()=>{
        const subject=encodeURIComponent(L("feedback_subject"));
        window.location.href=`mailto:magnus@jepson.no?subject=${subject}`;
      };
      const shareApp=async()=>{
        const url=window.location.origin;
        const text=L("share_app_text");
        if(navigator.share){
          try{await navigator.share({title:L("app_name"),text,url});}
          catch(e){if(e.name!=="AbortError")copyToClipboard(url);}
        }else{
          try{
            await navigator.clipboard.writeText(url);
            setMsg(L("share_app_copied"));
            setTimeout(()=>setMsg(""),2000);
          }catch(e){
            alert(url);
          }
        }
      };
      useEffect(()=>{window.scrollTo(0,0);},[]);

      const stats={
        total:catches.length,
        shared:catches.filter(c=>{
          const vis=c.visibility||(c.is_public?"public":"private");
          return vis!=="private";
        }).length,
        biggest:catches.reduce((max,c)=>(c.weight!=null&&c.weight>max?c.weight:max),0),
      };

      const showMsg=(m,isErr)=>{setMsg(m);setTimeout(()=>setMsg(""),isErr?4000:2000);};

      const saveName=async()=>{
        const name=displayName.trim();
        if(!name)return;
        setSaving(true);setMsg("");
        const {data,error}=await sb.from("profiles").update({display_name:name}).eq("id",session.user.id).select().single();
        setSaving(false);
        if(error){showMsg(L("error_prefix")+" "+error.message,true);return;}
        onUpdate(data);
        showMsg(L("profile_name_saved"));
      };

      const saveDefaultVisibility=async(val)=>{
        const prev=defaultVisibility;
        setDefaultVisibility(val);
        const {data,error}=await sb.from("profiles").update({
          default_visibility:val,
          default_public:val==="public",
        }).eq("id",session.user.id).select().single();
        if(error){showMsg(L("error_prefix")+" "+error.message,true);setDefaultVisibility(prev);return;}
        if(data)onUpdate(data);
      };

      const handleAvatar=async(e)=>{
        const file=e.target.files?.[0];
        if(!file)return;
        setUploading(true);setMsg("");
        try{
          const blob=await resizeImage(file,400);
          const filename=`${session.user.id}/${Date.now()}.jpg`;
          const {error:upErr}=await sb.storage.from("avatars").upload(filename,blob,{...UPLOAD_OPTS,upsert:false});
          if(upErr)throw upErr;
          const {data:urlData}=sb.storage.from("avatars").getPublicUrl(filename);
          const newUrl=urlData.publicUrl;
          if(profile?.avatar_url){
            const m=profile.avatar_url.match(/\/avatars\/(.+)$/);
            if(m&&m[1])await sb.storage.from("avatars").remove([m[1]]);
          }
          const {data,error}=await sb.from("profiles").update({avatar_url:newUrl}).eq("id",session.user.id).select().single();
          if(error)throw error;
          setAvatarUrl(newUrl);
          onUpdate(data);
          showMsg(L("profile_photo_updated"));
        }catch(err){
          showMsg(L("error_prefix")+" "+(err.message||L("error_unknown")),true);
        }
        setUploading(false);
        e.target.value="";
      };

      const createGroup=async()=>{
        const name=newGroupName.trim();
        if(!name)return;
        setCreatingGroup(true);
        try{
          const {data:group,error}=await sb.from("groups").insert({
            name,
            created_by:session.user.id,
          }).select().single();
          if(error)throw error;
          // Legg meg selv til som medlem
          const {error:memberErr}=await sb.from("group_members").insert({
            group_id:group.id,
            user_id:session.user.id,
          });
          if(memberErr)throw memberErr;
          await onGroupsChange();
          setNewGroupName("");
          setShowCreateGroup(false);
          // Vis invitasjons-modal med en gang så brukeren kan dele
          setShareGroup({...group,member_count:1});
        }catch(e){
          alert(L("group_create_failed")+" "+(e.message||L("error_unknown")));
        }
        setCreatingGroup(false);
      };

      const buildInviteUrl=(code)=>{
        const base=window.location.origin+window.location.pathname;
        return `${base}?invite=${code}`;
      };

      const shareInviteLink=async(group)=>{
        const url=buildInviteUrl(group.invite_code);
        const text=L("groups_invite_share_text",group.name);
        if(navigator.share){
          try{await navigator.share({title:group.name,text,url});}
          catch(e){if(e.name!=="AbortError")copyToClipboard(url);}
        }else{
          copyToClipboard(url);
        }
      };

      const copyToClipboard=async(text)=>{
        try{
          await navigator.clipboard.writeText(text);
          setMsg(L("groups_link_copied"));
          setTimeout(()=>setMsg(""),2000);
        }catch(e){
          alert(L("copy_failed")+" "+text);
        }
      };

      const doLeaveGroup=async(group)=>{
        const {error}=await sb.from("group_members").delete()
          .eq("group_id",group.id)
          .eq("user_id",session.user.id);
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        setLeaveGroup(null);
        await onGroupsChange();
      };

      const nameUnchanged=displayName.trim()===(profile?.display_name||"");

      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}>
          <button style={S.backBtn} onClick={onBack}>{I.back()}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"0 0 18px"}}>
          <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:0}}>{L("profile_title")}</h2>
          <button onClick={()=>setProfileAboutOpen(true)} style={{...S.smBtn,color:t.textMuted}}>{I.info()}</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:22}}>
          <div style={{position:"relative"}}>
            <Avatar url={avatarUrl} name={profile?.display_name||profile?.username} seed={profile?.username||session.user.id} size={96} t={t}/>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{position:"absolute",bottom:-2,right:-2,width:34,height:34,borderRadius:17,border:`2px solid ${t.cardBg}`,background:t.primary,color:t.name==="Mørk"?"#0f1a17":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,boxShadow:t.btnShadow}}>
              {uploading?<div className="spinner" style={{width:14,height:14,borderWidth:2}}/>:I.edit()}
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleAvatar} style={{display:"none"}}/>
          </div>
          <p style={{fontSize:20,fontWeight:600,color:t.text,margin:"12px 0 0"}}>{profile?.display_name||profile?.username||"—"}</p>
          <p style={{fontSize:14,color:t.textMuted,margin:"2px 0 0"}}>{session.user.email}</p>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.total}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_catches")}</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.shared}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_shared")}</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.biggest||"—"}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_biggest")}</p>
          </div>
        </div>

        <div style={S.sec}>
          <p style={S.secT}>{L("profile_display_name")}</p>
          <input value={displayName} onChange={e=>setDisplayName(e.target.value)} style={S.inp}/>
          <button onClick={saveName} disabled={saving||!displayName.trim()||nameUnchanged} style={{...S.btnPriFull,marginTop:10,opacity:(saving||!displayName.trim()||nameUnchanged)?.45:1}}>
            {saving?L("profile_saving"):L("profile_save_name")}
          </button>
          {profile?.username&&<p style={{fontSize:13,color:t.textMuted,margin:"10px 0 0"}}>{L("profile_username")} {profile.username}</p>}
        </div>

        <div style={S.sec}>
          <p style={S.secT}>{L("profile_default_visibility")}</p>
          <p style={{fontSize:12,color:t.textMuted,margin:"0 0 10px",lineHeight:1.4}}>{L("profile_default_visibility_desc")}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            {[
              {key:"private",label:L("visibility_private")},
              {key:"groups",label:L("visibility_groups_short"),disabled:myGroups.length===0},
              {key:"public",label:L("visibility_public_short")},
            ].map(opt=>{
              const sel=defaultVisibility===opt.key;
              return (
                <button key={opt.key} disabled={opt.disabled} onClick={()=>saveDefaultVisibility(opt.key)} style={{
                  padding:"10px 6px",borderRadius:10,
                  border:sel?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,
                  background:sel?t.primaryLight:t.cardBg,
                  fontSize:13,fontWeight:sel?600:500,
                  color:sel?t.primary:t.textSec,
                  fontFamily:t.font,
                  cursor:opt.disabled?"not-allowed":"pointer",
                  opacity:opt.disabled?.4:1
                }}>{opt.label}</button>
              );
            })}
          </div>
        </div>

        <div style={S.sec}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <p style={{...S.secT,marginBottom:0}}>{L("groups_title")}</p>
            <button onClick={()=>setShowCreateGroup(true)} style={{padding:"6px 12px",borderRadius:8,background:t.primaryLight,color:t.primary,border:"none",fontSize:13,fontWeight:600,fontFamily:t.font,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> {L("groups_new")}
            </button>
          </div>
          {myGroups.length===0?(
            <p style={{fontSize:13,color:t.textMuted,margin:0,lineHeight:1.5}}>{L("groups_empty")}</p>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {myGroups.map(g=>(
                <div key={g.id} style={{padding:"10px 12px",background:t.chipBg,borderRadius:10,display:"flex",alignItems:"center",gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:15,fontWeight:600,color:t.text,margin:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.name}</p>
                    <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{trMembers(g.member_count,lang)}{g.created_by===session.user.id?" · "+L("groups_admin_tag"):""}</p>
                  </div>
                  <button onClick={()=>shareInviteLink(g)} style={{padding:"6px 10px",borderRadius:8,background:t.cardBg,color:t.primary,border:`1px solid ${t.cardBorder}`,fontSize:12,fontWeight:600,fontFamily:t.font,cursor:"pointer",flexShrink:0}}>{L("groups_invite")}</button>
                  <button onClick={()=>setLeaveGroup(g)} style={{padding:6,borderRadius:8,background:"transparent",color:t.textMuted,border:"none",cursor:"pointer",flexShrink:0,display:"flex"}}>{I.trash()}</button>
                </div>
              ))}
            </div>
          )}
        </div>

        <div style={S.sec}>
          <p style={S.secT}>{L("profile_theme")}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {Object.entries(THEMES).map(([k,th])=>(
              <button key={k} onClick={()=>switchTheme(k)} style={{padding:"10px 8px",borderRadius:10,border:k===themeKey?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,background:k===themeKey?t.primaryLight:t.cardBg,fontSize:14,fontWeight:k===themeKey?600:500,color:k===themeKey?t.primary:t.textSec,fontFamily:t.font,cursor:"pointer"}}>{th.name}</button>
            ))}
          </div>
        </div>

        <div style={S.sec}>
          <p style={S.secT}>{L("profile_language")}</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {[{k:"nb",label:"Norsk"},{k:"en",label:"English"}].map(opt=>{
              const sel=lang===opt.k;
              return (
                <button key={opt.k} onClick={()=>switchLang(opt.k)} style={{padding:"10px 8px",borderRadius:10,border:sel?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,background:sel?t.primaryLight:t.cardBg,fontSize:14,fontWeight:sel?600:500,color:sel?t.primary:t.textSec,fontFamily:t.font,cursor:"pointer"}}>{opt.label}</button>
              );
            })}
          </div>
        </div>

        {msg&&<p style={{fontSize:14,color:msg.startsWith("Feil")?t.danger:t.primary,textAlign:"center",margin:"0 0 14px",fontWeight:500}}>{msg}</p>}

        <button onClick={shareApp} style={{...S.btnSec,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:6,marginBottom:8}}>{I.share()} {L("share_app")}</button>
        <button onClick={sendFeedback} style={{...S.btnSec,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}}>{I.mail()} {L("feedback")}</button>
        <button onClick={onSignOut} style={{...S.btnSec,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>{I.logout()} {L("profile_logout")}</button>
        <div style={{height:30}}/>

        {profileAboutOpen&&<AboutModal L={L} S={S} t={t} onClose={()=>setProfileAboutOpen(false)}/>}

        {showCreateGroup&&<div style={S.overlay}><div style={S.modal}>
          <p style={{fontSize:17,fontWeight:600,margin:"0 0 12px",color:t.text}}>{L("groups_create_title")}</p>
          <input style={{...S.inp,marginBottom:14}} placeholder={L("groups_name_placeholder")} maxLength={60} value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} autoFocus/>
          <div style={{display:"flex",gap:10}}>
            <button style={{...S.btnSec,flex:1}} disabled={creatingGroup} onClick={()=>{setShowCreateGroup(false);setNewGroupName("");}}>{L("cancel")}</button>
            <button style={{...S.btnPri,flex:1,opacity:(!newGroupName.trim()||creatingGroup)?.5:1}} disabled={!newGroupName.trim()||creatingGroup} onClick={createGroup}>{creatingGroup?L("groups_creating"):L("groups_create")}</button>
          </div>
        </div></div>}

        {shareGroup&&<div style={S.overlay}><div style={S.modal}>
          <p style={{fontSize:13,color:t.textMuted,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{L("groups_invite_to")}</p>
          <p style={{fontSize:19,fontWeight:700,margin:"0 0 14px",color:t.text}}>{shareGroup.name}</p>
          <p style={{fontSize:14,color:t.textSec,margin:"0 0 12px",lineHeight:1.5}}>{L("groups_share_link_intro")}</p>
          <div style={{padding:"10px 12px",background:t.chipBg,borderRadius:8,fontSize:12,color:t.textSec,wordBreak:"break-all",marginBottom:14,fontFamily:"monospace"}}>{buildInviteUrl(shareGroup.invite_code)}</div>
          <div style={{display:"flex",gap:10}}>
            <button style={{...S.btnSec,flex:1}} onClick={()=>setShareGroup(null)}>{L("groups_close")}</button>
            <button style={{...S.btnPri,flex:1}} onClick={()=>shareInviteLink(shareGroup)}>{L("groups_share")}</button>
          </div>
        </div></div>}

        {leaveGroup&&<div style={S.overlay}><div style={S.modal}>

    // ── StatsView ──
    function StatsView({L,lang,catches,fp,S,t,onBack}){
      useEffect(()=>{window.scrollTo(0,0);},[]);
      const filtered=catches.filter(c=>{
        if(fp.fR!=="Alle"&&c.river!==fp.fR)return false;
        if(fp.fS!=="Alle"&&c.species!==fp.fS)return false;
        if(fp.fY!=="Alle"&&new Date(c.date).getFullYear()!==+fp.fY)return false;
        return true;
      });
      const n=filtered.length;const big=filtered.reduce((m,c)=>Math.max(m,c.weight||0),0);const avg=n>0?(filtered.reduce((s,c)=>s+(c.weight||0),0)/n).toFixed(1):0;const cr=n>0?((filtered.filter(c=>c.released).length/n)*100).toFixed(0):0;
      const specC={},eqC={},rivC={},moC={};const moN=lang==="en"?["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]:["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
      filtered.forEach(c=>{specC[c.species]=(specC[c.species]||0)+1;eqC[c.equipment]=(eqC[c.equipment]||0)+1;rivC[c.river]=(rivC[c.river]||0)+1;moC[new Date(c.date).getMonth()]=(moC[new Date(c.date).getMonth()]||0)+1;});
      const maxMo=Math.max(...Object.values(moC),1);
      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onBack}>{I.back()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{L("stats_title")}</h2>
        <Filters fp={fp} S={S} t={t}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}><BStat v={n} l={L("stats_catches")} t={t}/><BStat v={big||"—"} l={L("stats_biggest")} t={t}/><BStat v={avg>0?avg:"—"} l={L("stats_avg")} t={t}/><BStat v={`${cr}%`} l={L("stats_released")} t={t}/></div>
        {n>0&&<div style={S.sec}><p style={S.secT}>{L("stats_per_month")}</p><div style={{display:"flex",gap:3,alignItems:"flex-end",height:100}}>{moN.map((m,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:"100%",minHeight:2,height:`${((moC[i]||0)/maxMo)*100}%`,background:`linear-gradient(${t.primary},${t.accent})`,borderRadius:"3px 3px 0 0",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>{moC[i]>0&&<span style={{fontSize:9,color:t.name==="Mørk"?"#0f1a17":"#fff",fontWeight:700,marginTop:2}}>{moC[i]}</span>}</div><span style={{fontSize:10,color:t.textMuted,marginTop:3}}>{m}</span></div>))}</div></div>}
        {Object.keys(specC).length>0&&<BDSec title={L("stats_species")} d={specC} n={n} t={t} S={S} mapKey={k=>trSpecies(k,lang)}/>}
        {Object.keys(eqC).length>0&&<BDSec title={L("stats_equipment")} d={eqC} n={n} t={t} S={S} mapKey={k=>trEquipment(k,lang)}/>}
        {Object.keys(rivC).length>0&&<BDSec title={L("stats_river")} d={rivC} n={n} t={t} S={S}/>}
        <div style={{height:30}}/>
      </div>);
    }
    function BStat({v,l,t}){return <div style={{background:t.cardBg,borderRadius:14,padding:"16px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:24,fontWeight:700,color:t.primary,fontFamily:t.titleFont}}>{v}</span><span style={{display:"block",fontSize:12,color:t.textMuted,marginTop:3}}>{l}</span></div>;}
    function BDSec({title,d,n,t,S,mapKey}){const sorted=Object.entries(d).sort((a,b)=>b[1]-a[1]);return <div style={S.sec}><p style={S.secT}>{title}</p>{sorted.map(([k,v],i)=>{const pct=((v/n)*100).toFixed(0);const displayK=mapKey?mapKey(k):k;return(<div key={k} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:3}}><span style={{color:t.text}}>{displayK}</span><span style={{color:t.textMuted}}>{v} ({pct}%)</span></div><div style={{height:7,background:t.chipBg,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:t.primary,borderRadius:4,transition:"width .4s"}}/></div></div>);})}</div>;}

        )}

        <Lbl t={L("form_note")} th={t}/><textarea style={{...S.inp,minHeight:70,resize:"vertical"}} placeholder={L("form_note_placeholder")} value={form.description||""} onChange={e=>set("description",e.target.value)}/>
        <button style={{...S.btnPriFull,opacity:(valid&&!saving)?1:.45,marginTop:20}} disabled={!valid||saving} onClick={submit}>
          {saving?L("form_saving"):(isEdit?L("form_save_edit"):L("form_save"))}
        </button>
        <div style={{height:30}}/>
      </div>);
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));});}</script>

<script>
    // PWA iOS Banner Logic med språkstøtte 🌍
    function sjekkIosPWA() {
      const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
      const isStandalone = ('standalone' in window.navigator) && (window.navigator.standalone);

      if (isIos && !isStandalone) {
        const lastPrompt = localStorage.getItem('pwa_ios_prompt_timestamp');
        const now = Date.now();
        
        if (!lastPrompt || (now - lastPrompt > 24 * 60 * 60 * 1000)) {
          opprettInstallasjonsBanner();
        }
      }
    }

    function opprettInstallasjonsBanner() {
      // Sjekk om språket er satt i appen din, eller bruk telefonens eget språk
      const appLang = localStorage.getItem('lang') || navigator.language || 'no';
      const isEnglish = appLang.toLowerCase().startsWith('en');

      // Tekster på engelsk og norsk
      const text = {
        title: isEnglish ? "Install Fangstlogg 🎣" : "Installer Fangstlogg 🎣",
        desc: isEnglish 
          ? "To stay logged in, add the app to your home screen:" 
          : "For å slippe å logge inn på nytt, lagre appen på hjemskjermen din:",
        step1: isEnglish 
          ? "Tap the Share button in Safari" 
          : "Trykk på dele-knappen i Safari",
        step2: isEnglish 
          ? 'Scroll down and tap <strong style="color: #5ee6a0;">"Add to Home Screen"</strong> <span style="font-size: 16px;">+</span>.' 
          : 'Scroll ned og velg <strong style="color: #5ee6a0;">"Legg til på hjemskjerm"</strong> <span style="font-size: 16px;">+</span>.'
      };

      const banner = document.createElement('div');
      banner.id = 'pwa-ios-banner';
      
      banner.style.position = 'fixed';
      banner.style.bottom = 'calc(24px + env(safe-area-inset-bottom, 0px))';
      banner.style.left = '50%';
      banner.style.transform = 'translateX(-50%)';
      banner.style.width = 'calc(100% - 32px)';
      banner.style.maxWidth = '400px';
      banner.style.backgroundColor = '#162320'; 
      banner.style.color = '#e8f0ec'; 
      banner.style.border = '1px solid #2a4038'; 
      banner.style.padding = '18px';
      banner.style.borderRadius = '16px';
      banner.style.boxShadow = '0px 8px 32px rgba(0,0,0,0.5)';
      banner.style.zIndex = '99999';
      banner.style.fontFamily = '"DM Sans", -apple-system, sans-serif';

      banner.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600; font-size: 16px; color: #5ee6a0;">${text.title}</span>
            <button id="lukk-pwa-banner" style="background: none; border: none; color: #5f7d6e; font-size: 24px; cursor: pointer; padding: 0 4px; line-height: 1;">&times;</button>
          </div>
          <p style="margin: 0; font-size: 13px; color: #9bb5a8; line-height: 1.4;">
            ${text.desc}
          </p>
          <div style="background: #0f1a17; padding: 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; color: #e8f0ec;">
            <ol style="margin: 0; padding-left: 18px;">
              <li style="margin-bottom: 6px;">${text.step1} <span style="font-size: 15px; background: #1c2e28; padding: 2px 6px; border-radius: 4px;">⎋</span>.</li>
              <li>${text.step2}</li>
            </ol>
          </div>
        </div>
      `;

      document.body.appendChild(banner);

      document.getElementById('lukk-pwa-banner').addEventListener('click', () => {
        banner.remove();
        localStorage.setItem('pwa_ios_prompt_timestamp', Date.now().toString());
      });
    }

    window.addEventListener('load', sjekkIosPWA);
  </script>
</body>
</html>
