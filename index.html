    // ── DateTimeInput ──
    // Vanlig div som viser formatert dato/tid, med en usynlig native input oppå
    // som åpner iOS/Android sin egen picker ved klikk. Sikrer identisk visning
    // på alle plattformer (iOS Safari overstyrer ellers padding/høyde på date-felt).
    function DateTimeInput({type,value,onChange,lang,S,t}){
      const inputRef=useRef();
      const display=(()=>{
        if(!value)return type==="date"?(lang==="en"?"Select date":"Velg dato"):(lang==="en"?"Select time":"Velg tid");
        if(type==="time")return value;
        // Format dato: "11 May 2026" / "11. mai 2026"
        const d=new Date(value+"T00:00:00");
        if(isNaN(d))return value;
        const months=lang==="en"
          ?["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
          :["jan","feb","mar","apr","mai","jun","jul","aug","sep","okt","nov","des"];
        return lang==="en"
          ?`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`
          :`${d.getDate()}. ${months[d.getMonth()]} ${d.getFullYear()}`;
      })();
      const hasValue=!!value;
      return(<div style={{position:"relative"}}>
        <div style={{
          ...S.inp,
          fontSize:15,
          cursor:"pointer",
          display:"flex",
          alignItems:"center",
          justifyContent:"space-between",
          color:hasValue?t.text:t.textMuted,
          height:46,
          padding:"0 12px",
          pointerEvents:"none",
        }}>
          <span>{display}</span>
          {type==="date"
            ?<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.5,flexShrink:0}}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            :<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{opacity:0.5,flexShrink:0}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          }
        </div>
        <input
          ref={inputRef}
          type={type}
          value={value||""}
          onChange={e=>onChange(e.target.value)}
          className="dt-native-input"
          style={{
            position:"absolute",
            inset:0,
            width:"100%",
            height:"100%",
            opacity:0,
            border:"none",
            background:"transparent",
            cursor:"pointer",
            fontSize:16,
          }}
        />
      </div>);
    }

    // ── ListView ──
    function ListView({L,lang,catches,total,fp,S,t,tab,setTab,viewMode,switchViewMode,hideOwnInFeed,toggleHideOwnInFeed,myGroups,following,feedFilter,setFeedFilter,feedNewCount,session,profile,initialScrollY,onSelect,onViewUser,onAdd,onStats,onRivers,onLeaderboard,onProfile,onRefresh,onExpandPhotos}){
      const sorted=[...catches].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const[filterModalOpen,setFilterModalOpen]=useState(false);
      const[welcomeDismissed,setWelcomeDismissed]=useState(lsGet("fl_dismissedWelcome")||false);
      const[aboutOpen,setAboutOpen]=useState(false);
      const dismissWelcome=()=>{setWelcomeDismissed(true);lsSet("fl_dismissedWelcome",true);};
      const showWelcome=total===0&&!welcomeDismissed&&tab==="mine";
      const hasActiveFilter=fp.fR!=="Alle"||fp.fS!=="Alle"||fp.fY!=="Alle"||(tab==="feed"&&hideOwnInFeed);
      useEffect(()=>{
        if(initialScrollY>0){
          // Bruker rAF for å sikre at DOM er rendret før vi scroller
          requestAnimationFrame(()=>window.scrollTo(0,initialScrollY));
        }
      },[]);
      const[pullY,setPullY]=useState(0);
      const[refreshing,setRefreshing]=useState(false);
      const startY=useRef(0);
      const isPulling=useRef(false);
      const PULL_THRESHOLD=70;
      const MAX_PULL=120;

      const handleTouchStart=(e)=>{
        if(window.scrollY<=0&&!refreshing){
          startY.current=e.touches[0].clientY;
          isPulling.current=true;
        }
      };
      const handleTouchMove=(e)=>{
        if(!isPulling.current||refreshing)return;
        const diff=e.touches[0].clientY-startY.current;
        if(diff>0&&window.scrollY<=0){
          setPullY(Math.min(diff*0.5,MAX_PULL));
        }else{
          isPulling.current=false;
          setPullY(0);
        }
      };
      const handleTouchEnd=async()=>{
        if(!isPulling.current)return;
        isPulling.current=false;
        if(pullY>=PULL_THRESHOLD){
          setRefreshing(true);
          setPullY(50);
          try{await onRefresh();}catch(e){console.error(e);}
          setRefreshing(false);
          setPullY(0);
        }else{
          setPullY(0);
        }
      };

      const pullProgress=Math.min(pullY/PULL_THRESHOLD,1);

      return(<div className="safe-top safe-bottom" style={S.page} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
        {(pullY>0||refreshing)&&(
          <div style={{position:"absolute",top:0,left:0,right:0,display:"flex",justifyContent:"center",alignItems:"center",height:pullY,pointerEvents:"none",zIndex:10}}>
            <div style={{width:32,height:32,borderRadius:16,border:`3px solid ${t.cardBorder}`,borderTopColor:t.primary,opacity:refreshing?1:pullProgress,transform:refreshing?"none":`rotate(${pullProgress*360}deg)`,animation:refreshing?"spin 0.8s linear infinite":"none"}}/>
          </div>
        )}
        <div style={{transform:`translateY(${pullY}px)`,transition:isPulling.current?"none":"transform 0.2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:0,gap:12}}>
          <div style={{minWidth:0,flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:9}}>
              <h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:800,letterSpacing:"-0.03em",color:t.text,margin:0}}>{L("app_name")}</h1>
            </div>
            <div style={{marginTop:3,fontSize:13.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              <span style={{color:t.textSec,fontWeight:600}}>{tab==="mine"?L("header_logbook"):L("header_feed_desc")}</span>
              <span style={{color:t.textMuted,fontFamily:t.mono,letterSpacing:"-0.03em"}}>{"  ·  "+trCatches(sorted.length,lang)}</span>
            </div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button style={S.circBtn} onClick={onRivers}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M2 7c2-1.8 4-1.8 6 0s4 1.8 6 0 4-1.8 6 0"/><path d="M2 12c2-1.8 4-1.8 6 0s4 1.8 6 0 4-1.8 6 0"/><path d="M2 17c2-1.8 4-1.8 6 0s4 1.8 6 0 4-1.8 6 0"/></svg></button>
            <button style={S.circPri} onClick={onAdd}>{I.plus()}</button>
            <Avatar url={profile?.avatar_url} name={profile?.display_name||profile?.username} seed={profile?.username||session.user.id} size={44} t={t} onClick={onProfile}/>
          </div>
        </div>
        <div className="spey-ruler" style={{height:7,marginTop:14,opacity:t.dark?.55:.7,"--tick":t.borderSoft,"--tickHi":t.primary}}/>
        <div style={{display:"flex",gap:8,marginBottom:14,marginTop:14,alignItems:"center"}}>
          <div style={{...S.tabBar,marginBottom:0,flex:1}}>
            <button style={tab==="mine"?S.tabActive:S.tab} onClick={()=>setTab("mine")}>{L("tab_mine")}</button>
            <button style={{...(tab==="feed"?S.tabActive:S.tab),position:"relative"}} onClick={()=>setTab("feed")}>
              {L("tab_feed")}
              {tab!=="feed"&&feedNewCount>0&&(
                <span style={{position:"absolute",top:4,right:8,minWidth:17,height:17,padding:"0 5px",borderRadius:9,background:t.primary,color:t.primaryInk,fontSize:11,fontWeight:700,lineHeight:"17px",textAlign:"center",boxShadow:`0 0 0 2px ${t.chipBg}`}}>{feedNewCount>9?"9+":feedNewCount}</span>
              )}
            </button>
          </div>
          <button onClick={onLeaderboard} style={{width:42,height:42,borderRadius:11,background:t.cardBg,color:t.primary,border:`1px solid ${t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {I.trophy()}
          </button>
          <button onClick={()=>setFilterModalOpen(true)} style={{position:"relative",width:42,height:42,borderRadius:11,background:hasActiveFilter?t.primaryLight:t.cardBg,color:hasActiveFilter?t.primary:t.primary,border:`1px solid ${hasActiveFilter?t.primary:t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {I.filter()}
            {hasActiveFilter&&<span style={{position:"absolute",top:6,right:6,width:7,height:7,borderRadius:4,background:t.primary,boxShadow:`0 0 0 2px ${t.cardBg}`}}/>}
          </button>
          <button onClick={()=>switchViewMode({compact:"large",large:"gallery",gallery:"compact"}[viewMode]||"large")} style={{width:42,height:42,borderRadius:11,background:t.cardBg,color:t.primary,border:`1px solid ${t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} title={viewMode}>
            {viewMode==="compact"?I.list():viewMode==="gallery"?I.gallery():I.grid()}
          </button>
        </div>
        {tab==="feed"&&(myGroups.length>0||(following&&following.length>0))&&(
          <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",paddingBottom:2}}>
            {[
              {key:"all",label:L("chip_all")},
              ...((following&&following.length>0)?[{key:"following",label:L("chip_following")}]:[]),
              ...myGroups.map(g=>({key:g.id,label:g.name})),
              {key:"public",label:L("chip_public")},
            ].map(chip=>{
              const sel=feedFilter===chip.key;
              return (
                <button key={chip.key} onClick={()=>setFeedFilter(chip.key)} style={{
                  padding:"6px 14px",borderRadius:16,
                  border:sel?`1.5px solid ${t.primary}`:`1px solid ${t.cardBorder}`,
                  background:sel?t.primaryLight:t.cardBg,
                  color:sel?t.primary:t.textSec,
                  fontSize:13,fontWeight:sel?600:500,fontFamily:t.font,
                  cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"
                }}>{chip.label}</button>
              );
            })}
          </div>
        )}
        {showWelcome&&(
          <div style={{...S.sec,background:t.primaryLight,border:`1px solid ${t.primary}`,padding:"16px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:6}}>
              <p style={{fontSize:17,fontWeight:700,color:t.text,margin:0,fontFamily:t.titleFont}}>{L("welcome_title")} 🎣</p>
              <button onClick={dismissWelcome} style={{background:"none",border:"none",cursor:"pointer",color:t.textMuted,padding:0,display:"flex",margin:-4}}>{I.x()}</button>
            </div>
            <p style={{fontSize:14,color:t.textSec,margin:"0 0 12px",lineHeight:1.5}}>{L("welcome_body")}</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setAboutOpen(true)} style={{...S.btnSec,flex:1,fontSize:14,padding:"9px 14px"}}>{L("welcome_learn_more")}</button>
              <button onClick={dismissWelcome} style={{...S.btnPri,flex:1,fontSize:14,padding:"9px 14px"}}>{L("welcome_dismiss")}</button>
            </div>
          </div>
        )}
        {sorted.length===0?(<div style={{textAlign:"center",padding:"50px 20px"}}>{I.fish(44,t.textMuted)}<p style={{marginTop:10,color:t.textMuted,fontSize:15}}>{tab==="mine"?(total===0?L("empty_no_catches_yet"):L("empty_no_results")):L("empty_no_feed")}</p></div>):viewMode==="compact"?(
          <div style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:16,padding:"2px 12px",boxShadow:t.shadow}}>
            {sorted.map((c,i)=><CatchCard key={c.id} L={L} lang={lang} c={c} S={S} t={t} showOwner={tab==="feed"} currentUserId={session.user.id} onClick={()=>onSelect(c)} onViewUser={onViewUser} last={i===sorted.length-1}/>)}
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:viewMode==="gallery"?16:14}}>
            {sorted.map(c=>viewMode==="gallery"
              ? <CatchCardGallery key={c.id} L={L} lang={lang} c={c} S={S} t={t} showOwner={tab==="feed"} currentUserId={session.user.id} onClick={()=>onSelect(c)} onViewUser={onViewUser} onExpandPhotos={(idx)=>onExpandPhotos(c,idx)}/>
              : <CatchCardLarge key={c.id} L={L} lang={lang} c={c} S={S} t={t} showOwner={tab==="feed"} currentUserId={session.user.id} onClick={()=>onSelect(c)} onViewUser={onViewUser} onExpandPhotos={(idx)=>onExpandPhotos(c,idx)}/>
            )}
          </div>
        )}
        <div style={{marginTop:30,textAlign:"center"}}>
          <p style={{fontSize:11,color:t.textMuted,opacity:.5,margin:0}}>v110</p>
        </div>
        </div>

        {filterModalOpen&&<div style={{...S.overlay,alignItems:"flex-end",padding:0,animation:"speyFadeIn .25s ease"}} onClick={()=>setFilterModalOpen(false)}>
          <div style={{...S.modal,maxWidth:"none",width:"100%",borderRadius:"22px 22px 0 0",padding:"10px 18px calc(20px + env(safe-area-inset-bottom))",maxHeight:"86vh",overflowY:"auto",boxShadow:"0 -10px 40px rgba(0,0,0,.4)",animation:"speySheetIn .32s cubic-bezier(.32,.72,.3,1)"}} onClick={e=>e.stopPropagation()}>
            <div style={{width:38,height:4,borderRadius:2,background:t.cardBorder,margin:"0 auto 14px"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontSize:20,fontWeight:700,margin:0,color:t.text,fontFamily:t.titleFont,letterSpacing:"-0.01em"}}>{L("filter_title")}</p>
              <button onClick={()=>setFilterModalOpen(false)} style={{background:t.cardElev,border:`1px solid ${t.cardBorder}`,color:t.textSec,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",width:32,height:32,borderRadius:16}}>{I.x()}</button>
            </div>
            <Lbl t={L("filter_river")} th={t}/>
            <select style={S.inp} value={fp.fR} onChange={e=>fp.setFR(e.target.value)}>
              <option value="Alle">{L("filter_all_rivers")}</option>
              {fp.rivers.map(r=><option key={r}>{r}</option>)}
            </select>
            <Lbl t={L("filter_year")} th={t}/>
            <select style={S.inp} value={fp.fY} onChange={e=>fp.setFY(e.target.value)}>
              <option value="Alle">{L("filter_all_years")}</option>
              {fp.years.map(y=><option key={y}>{y}</option>)}
            </select>
            <Lbl t={L("filter_species")} th={t}/>
            <select style={S.inp} value={fp.fS} onChange={e=>fp.setFS(e.target.value)}>
              <option value="Alle">{L("filter_all_species")}</option>
              {L("species_options").map((s,i)=><option key={i} value={SPECIES[i]}>{s}</option>)}
            </select>
            {tab==="feed"&&(
              <button onClick={toggleHideOwnInFeed} style={{
                display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,
                width:"100%",padding:"12px 14px",marginTop:16,borderRadius:10,
                border:`1px solid ${hideOwnInFeed?t.primary:t.inputBorder}`,
                background:hideOwnInFeed?t.primaryLight:t.cardBg,
                color:hideOwnInFeed?t.primary:t.textSec,
                fontSize:14,fontFamily:t.font,fontWeight:500,cursor:"pointer"
              }}>
                <span>{L("filter_hide_own")}</span>
                <span style={{
                  width:36,height:20,borderRadius:10,background:hideOwnInFeed?t.primary:t.inputBorder,
                  position:"relative",transition:"background .2s",flexShrink:0,display:"inline-block"
                }}>
                  <span style={{
                    position:"absolute",top:2,left:hideOwnInFeed?18:2,width:16,height:16,borderRadius:8,
                    background:"#fff",transition:"left .2s",boxShadow:"0 1px 2px rgba(0,0,0,.2)"
                  }}/>
                </span>
              </button>
            )}
            <div style={{display:"flex",gap:10,marginTop:18}}>
              <button style={{...S.btnSec,flex:1}} disabled={!hasActiveFilter} onClick={()=>{fp.setFR("Alle");fp.setFS("Alle");fp.setFY("Alle");if(tab==="feed"&&hideOwnInFeed)toggleHideOwnInFeed();}}>{L("filter_reset")}</button>
              <button style={{...S.btnPri,flex:1}} onClick={()=>setFilterModalOpen(false)}>{L("filter_done")}</button>
            </div>
          </div>
        </div>}
        {aboutOpen&&<AboutModal L={L} S={S} t={t} onClose={()=>setAboutOpen(false)}/>}
      </div>);
    }

    // ── Shared card helpers (redesign) ──
    const SPECIES_COLOR={"Sjøørret":"#9ab8d6","Brunørret":"#cf9f5e","Regnbueørret":"#d68aa6"};
    function speciesColor(sp,t){return SPECIES_COLOR[sp]||t.primary;}
    function flyLabel(c,lang){return c.equipment==="Flue"&&c.fly_pattern?`${trEquipment(c.equipment,lang)} · ${c.fly_pattern}`:trEquipment(c.equipment,lang);}
    function shortDate(iso,lang){const d=new Date(iso);return (lang==="en"?MONTHS_EN:MONTHS_NB)[d.getMonth()]+" "+d.getDate();}
    function catchTitle(c,lang){return `${trSpecies(c.species,lang)} · ${c.river}${c.beat?` · ${c.beat}`:""}`;}
    // metric chip — mono numerals; `onPhoto` switches to a translucent glass style
    function Metric({value,unit,t,onPhoto}){
      const base=onPhoto
        ?{background:"rgba(10,18,15,.42)",border:"1px solid rgba(255,255,255,.16)",color:"#fff",backdropFilter:"blur(8px)"}
        :{background:t.chipBg,border:`1px solid ${t.chipBorder}`,color:t.chipText};
      return <span style={{...base,display:"inline-flex",alignItems:"center",gap:5,padding:"4px 9px",borderRadius:8,whiteSpace:"nowrap",lineHeight:1.1}}>
        <span style={{fontFamily:t.mono,fontWeight:700,letterSpacing:"-0.03em",fontSize:12}}>{value}</span>
        <span style={{opacity:.62,fontWeight:600,fontSize:11}}>{unit}</span>
      </span>;
    }
    function TextChip({children,t,onPhoto}){
      const base=onPhoto
        ?{background:"rgba(10,18,15,.42)",border:"1px solid rgba(255,255,255,.16)",color:"#fff",backdropFilter:"blur(8px)"}
        :{background:t.chipBg,border:`1px solid ${t.chipBorder}`,color:t.chipText};
      return <span style={{...base,display:"inline-flex",alignItems:"center",fontSize:12.5,fontWeight:600,padding:"4px 9px",borderRadius:8,whiteSpace:"nowrap",lineHeight:1.1}}>{children}</span>;
    }
    function StatusTag({released,t,onPhoto,L}){
      const col=onPhoto?(released?"#aef4cd":"#ffc4b6"):(released?t.released:t.kept);
      return <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12.5,fontWeight:700,color:col,textShadow:onPhoto?"0 1px 2px rgba(0,0,0,.5)":"none"}}>{I.rel(released)}{released?"C&R":L("detail_kept")}</span>;
    }
    // visibility — plain (on card bg) vs glass (on photo)
    function VisInline({vis,t,L}){
      if(vis==="public")return <span style={{fontSize:12,fontWeight:600,color:t.textSec,display:"inline-flex",alignItems:"center",gap:5}}>{I.world()} {L("visibility_public_short")}</span>;
      if(vis==="groups")return <span style={{fontSize:12,fontWeight:600,color:t.textSec,display:"inline-flex",alignItems:"center",gap:5}}>{I.lock()} {L("visibility_groups_short")}</span>;
      return <span/>;
    }
    function VisGlass({vis,t,L}){
      const base={fontSize:11.5,color:"#fff",display:"inline-flex",alignItems:"center",gap:5,background:"rgba(10,18,15,.42)",border:"1px solid rgba(255,255,255,.16)",padding:"3px 9px",borderRadius:20,backdropFilter:"blur(8px)",fontWeight:600};
      if(vis==="public")return <span style={base}>{I.world()} {L("visibility_public_short")}</span>;
      if(vis==="groups")return <span style={base}>{I.lock()} {L("visibility_groups_short")}</span>;
      return <span/>;
    }

    function CatchCard({L,lang,c,S,t,showOwner,currentUserId,onClick,onViewUser,last}){
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const seed=c.profiles?.username||c.user_id;
      const avatarUrl=c.profiles?.avatar_url;
      const displayedName=isOwn?L("you"):ownerName;
      const hasSize=c.weight!=null||c.length!=null;
      return(<div onClick={onClick} className="spey-press" style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"11px 4px",borderBottom:last?"none":`1px solid ${t.borderSoft}`}}>
        <span style={{width:3,alignSelf:"stretch",minHeight:34,borderRadius:3,background:speciesColor(c.species,t),flexShrink:0}}/>
        {showOwner&&<Avatar url={avatarUrl} name={ownerName} seed={seed} size={30} t={t}/>}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14.5,fontWeight:700,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{catchTitle(c,lang)}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3,fontSize:12.5,color:t.textSec,fontFamily:t.mono,letterSpacing:"-0.02em",whiteSpace:"nowrap",overflow:"hidden"}}>
            {showOwner&&<span style={{color:t.textMuted,fontFamily:t.font,maxWidth:120,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{displayedName}</span>}
            {showOwner&&<span style={{color:t.textMuted,flexShrink:0}}>·</span>}
            {c.weight!=null&&<span style={{flexShrink:0}}>{c.weight} kg</span>}
            {c.length!=null&&<span style={{color:t.textMuted,flexShrink:0}}>{c.length} cm</span>}
            {!hasSize&&<span style={{color:t.textMuted,fontFamily:t.font,flexShrink:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{flyLabel(c,lang)}</span>}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
          <span style={{fontSize:12,color:t.textMuted,fontFamily:t.mono}}>{shortDate(c.date,lang)}</span>
          <StatusTag released={c.released} t={t} L={L}/>
        </div>
      </div>);
    }

    function CatchCardLarge({L,lang,c,S,t,showOwner,currentUserId,onClick,onViewUser,onExpandPhotos}){
      const photos=c.photos||[];
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      const displayedName=isOwn?L("you"):ownerName;
      const hasPhotos=photos.length>0;
      const vis=c.visibility||(c.is_public?"public":"private");

      // ── photo-less → flat logbook card (no empty photo box) ──
      if(!hasPhotos){
        return(<div onClick={onClick} className="spey-press" style={{position:"relative",overflow:"hidden",background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:18,padding:"14px 16px 15px",cursor:"pointer",boxShadow:t.shadow}}>
          <span style={{position:"absolute",left:0,top:14,bottom:14,width:3,borderRadius:"0 3px 3px 0",background:speciesColor(c.species,t)}}/>
          <div style={{position:"absolute",right:-6,bottom:-16,opacity:.55,transform:"rotate(-8deg)",pointerEvents:"none",color:t.borderSoft}}>{I.fish(92,t.borderSoft)}</div>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:11}}>
              {showOwner?<div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1}}><Avatar url={avatarUrl} name={ownerName} seed={seed} size={28} t={t}/><span style={{fontSize:14,fontWeight:600,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{displayedName}</span></div>:<VisInline vis={vis} t={t} L={L}/>}
              <span style={{marginLeft:"auto",fontSize:12.5,fontWeight:600,color:t.textMuted,fontFamily:t.mono,flexShrink:0}}>{shortDate(c.date,lang)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:12,minWidth:0}}>
              <span style={{width:9,height:9,borderRadius:5,background:speciesColor(c.species,t),flexShrink:0}}/>
              <span style={{flex:1,minWidth:0,fontSize:18,fontWeight:700,color:t.text,letterSpacing:"-0.015em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{catchTitle(c,lang)}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
              {c.weight!=null&&<Metric value={c.weight} unit="kg" t={t}/>}
              {c.length!=null&&<Metric value={c.length} unit="cm" t={t}/>}
              <TextChip t={t}>{flyLabel(c,lang)}</TextChip>
              <span style={{marginLeft:"auto"}}><StatusTag released={c.released} t={t} L={L}/></span>
            </div>
          </div>
        </div>);
      }

      // ── banner card (photo on top, metrics strip below) ──
      return(<div onClick={onClick} className="spey-press" style={{background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:18,overflow:"hidden",cursor:"pointer",boxShadow:t.shadow}}>
        <div style={{position:"relative",width:"100%",aspectRatio:"16/10",background:t.cardElev,overflow:"hidden"}}>
          {photos.length===1?<img src={photos[0]} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>:<SwipeableImages photos={photos} onExpand={onExpandPhotos} t={t} style={{position:"absolute",inset:0}}/>}
          <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,0) 55%,rgba(0,0,0,.66) 100%)"}}/>
          <div style={{position:"absolute",top:0,left:0,right:0,padding:"12px 13px",display:"flex",alignItems:"center",gap:8,zIndex:2}}>
            {showOwner?(()=>{const clickable=onViewUser&&c.user_id!==currentUserId;return <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1,pointerEvents:clickable?"auto":"none",cursor:clickable?"pointer":"default"}} onClick={clickable?(e)=>{e.stopPropagation();onViewUser(c.user_id);}:undefined}><Avatar url={avatarUrl} name={ownerName} seed={seed} size={30} t={t}/><span style={{fontSize:14.5,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textShadow:"0 1px 3px rgba(0,0,0,.55)"}}>{displayedName}</span></div>;})():<VisGlass vis={vis} t={t} L={L}/>}
            <span style={{marginLeft:"auto",fontSize:12.5,fontWeight:600,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,.55)",flexShrink:0,pointerEvents:"none"}}>{shortDate(c.date,lang)}</span>
          </div>
          {photos.length>1&&<span style={{position:"absolute",top:46,right:13,display:"inline-flex",alignItems:"center",gap:4,fontSize:11.5,fontWeight:600,color:"#fff",background:"rgba(10,18,15,.42)",border:"1px solid rgba(255,255,255,.16)",backdropFilter:"blur(8px)",padding:"3px 8px",borderRadius:20,pointerEvents:"none",zIndex:2}}>{I.photos(13)}{photos.length}</span>}
          <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"0 14px 12px",pointerEvents:"none",zIndex:2}}>
            <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
              <span style={{width:9,height:9,borderRadius:5,background:speciesColor(c.species,t),flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,.4)"}}/>
              <span style={{flex:1,minWidth:0,fontSize:19,fontWeight:700,color:"#fff",letterSpacing:"-0.015em",textShadow:"0 1px 4px rgba(0,0,0,.6)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{catchTitle(c,lang)}</span>
            </div>
          </div>
        </div>
        <div style={{padding:"11px 13px 13px",display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
          {c.weight!=null&&<Metric value={c.weight} unit="kg" t={t}/>}
          {c.length!=null&&<Metric value={c.length} unit="cm" t={t}/>}
          <TextChip t={t}>{flyLabel(c,lang)}</TextChip>
          <span style={{marginLeft:"auto"}}><StatusTag released={c.released} t={t} L={L}/></span>
        </div>
      </div>);
    }

    // ── CatchCardGallery — immersive full-bleed (4/5) ──
    function CatchCardGallery({L,lang,c,S,t,showOwner,currentUserId,onClick,onViewUser,onExpandPhotos}){
      const photos=c.photos||[];
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      const displayedName=isOwn?L("you"):ownerName;
      const hasPhotos=photos.length>0;
      const vis=c.visibility||(c.is_public?"public":"private");
      return(<div onClick={onClick} className="spey-press" style={{position:"relative",borderRadius:20,overflow:"hidden",cursor:"pointer",aspectRatio:"4/5",background:t.cardElev,border:`1px solid ${t.cardBorder}`,boxShadow:t.shadow}}>
        {hasPhotos?(
          photos.length===1?<img src={photos[0]} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>:<SwipeableImages photos={photos} onExpand={onExpandPhotos} t={t} style={{position:"absolute",inset:0}}/>
        ):(
          <div style={{position:"absolute",inset:0,background:`radial-gradient(120% 90% at 50% 0%, ${t.cardElev}, ${t.cardBg})`,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{transform:"rotate(-8deg)",marginTop:-40,opacity:.6}}>{I.fish(110,t.borderSoft)}</div>
          </div>
        )}
        <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,0) 46%,rgba(0,0,0,.5) 70%,rgba(0,0,0,.82) 100%)"}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,padding:"14px 15px",display:"flex",alignItems:"center",gap:8,zIndex:2}}>
          {showOwner?(()=>{const clickable=onViewUser&&c.user_id!==currentUserId;return <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1,pointerEvents:clickable?"auto":"none",cursor:clickable?"pointer":"default"}} onClick={clickable?(e)=>{e.stopPropagation();onViewUser(c.user_id);}:undefined}><Avatar url={avatarUrl} name={ownerName} seed={seed} size={34} t={t}/><span style={{fontSize:15,fontWeight:600,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",textShadow:"0 1px 3px rgba(0,0,0,.55)"}}>{displayedName}</span></div>;})():<VisGlass vis={vis} t={t} L={L}/>}
          <span style={{marginLeft:"auto",fontSize:13,fontWeight:600,color:"#fff",textShadow:"0 1px 3px rgba(0,0,0,.55)",flexShrink:0,pointerEvents:"none"}}>{shortDate(c.date,lang)}</span>
        </div>
        {photos.length>1&&<span style={{position:"absolute",top:54,right:15,display:"inline-flex",alignItems:"center",gap:4,fontSize:11.5,fontWeight:600,color:"#fff",background:"rgba(10,18,15,.42)",border:"1px solid rgba(255,255,255,.16)",backdropFilter:"blur(8px)",padding:"3px 8px",borderRadius:20,pointerEvents:"none",zIndex:2}}>{I.photos(13)}{photos.length}</span>}
        <div style={{position:"absolute",left:0,right:0,bottom:0,padding:"44px 15px 16px",pointerEvents:"none",zIndex:2}}>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:10,minWidth:0}}>
            <span style={{width:10,height:10,borderRadius:5,background:speciesColor(c.species,t),flexShrink:0,boxShadow:"0 1px 3px rgba(0,0,0,.4)"}}/>
            <span style={{flex:1,minWidth:0,fontSize:22,fontWeight:700,color:"#fff",letterSpacing:"-0.02em",textShadow:"0 1px 5px rgba(0,0,0,.6)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{catchTitle(c,lang)}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            {c.weight!=null&&<Metric value={c.weight} unit="kg" t={t} onPhoto/>}
            {c.length!=null&&<Metric value={c.length} unit="cm" t={t} onPhoto/>}
            <TextChip t={t} onPhoto>{flyLabel(c,lang)}</TextChip>
            <StatusTag released={c.released} t={t} L={L} onPhoto/>
          </div>
        </div>
      </div>);
    }

    // ── UserProfileView — annen brukers offentlige profil (bokmerke-følging) ──
    function UserProfileView({L,lang,userId,publicFeed,isFollowing,onFollow,onUnfollow,S,t,onBack,onSelect,onExpandPhotos}){
      const swipeRef=useEdgeSwipeBack(onBack);
      useEffect(()=>{window.scrollTo(0,0);},[]);
      // Kun OFFENTLIGE fangster fra denne brukeren. publicFeed inneholder
      // både public og groups; vi filtrerer hardt til public her.
      const theirCatches=(publicFeed||[]).filter(c=>c.user_id===userId&&(c.visibility==="public"||(c.visibility==null&&c.is_public)));
      const prof=theirCatches[0]?.profiles||null;
      const name=prof?.display_name||prof?.username||"";
      const avatarUrl=prof?.avatar_url;
      const seed=prof?.username||userId;
      const photos=theirCatches.filter(c=>(c.photos||[]).length>0);
      const biggest=theirCatches.reduce((max,c)=>(c.weight!=null&&c.weight>max?c.weight:max),0);
      return(<div ref={swipeRef} className="safe-top safe-bottom" style={{...S.app,minHeight:"100vh"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <button onClick={onBack} style={S.backBtn}>{I.back()}</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",gap:10,marginBottom:8}}>
          <Avatar url={avatarUrl} name={name} seed={seed} size={84} t={t}/>
          <div>
            <p style={{fontFamily:t.titleFont,fontSize:22,fontWeight:700,color:t.text,margin:0}}>{name||"—"}</p>
            {prof?.username&&<p style={{fontSize:13,color:t.textMuted,margin:"2px 0 0"}}>@{prof.username}</p>}
          </div>
          <div style={{display:"flex",gap:22,margin:"6px 0 2px"}}>
            <div style={{textAlign:"center"}}><p style={{fontSize:19,fontWeight:700,color:t.text,margin:0}}>{theirCatches.length}</p><p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("userprofile_catches")}</p></div>
            <div style={{textAlign:"center"}}><p style={{fontSize:19,fontWeight:700,color:t.text,margin:0}}>{biggest>0?biggest:"—"}</p><p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("userprofile_biggest")}</p></div>
          </div>
          <button onClick={isFollowing?onUnfollow:onFollow} style={isFollowing?{...S.btnSec,minWidth:160}:{...S.btnPriFull,minWidth:160,width:"auto"}}>
            {isFollowing?L("following"):L("follow")}
          </button>
          <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("userprofile_public_only")}</p>
        </div>

        {theirCatches.length===0?(
          <div style={{textAlign:"center",padding:"40px 20px"}}>{I.fish(40,t.textMuted)}<p style={{marginTop:10,color:t.textMuted,fontSize:14}}>{L("userprofile_no_public")}</p></div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
            {theirCatches.map(c=>{
              const thumb=(c.photos||[])[0];
              return(<div key={c.id} onClick={()=>onSelect(c)} style={{position:"relative",borderRadius:12,overflow:"hidden",cursor:"pointer",aspectRatio:"1",background:t.cardBg,border:`1px solid ${t.cardBorder}`}}>
                {thumb?<img src={thumb} alt="" style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",background:t.chipBg}}>{I.fish(32,t.textMuted)}</div>}
                <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"18px 8px 6px",background:"linear-gradient(0deg,rgba(0,0,0,.7),rgba(0,0,0,0))"}}>
                  <span style={{fontSize:12,color:"#fff",fontWeight:600,textShadow:"0 1px 2px rgba(0,0,0,.6)"}}>{trSpecies(c.species,lang)}{c.weight!=null?` · ${c.weight} kg`:""}</span>
                </div>
              </div>);
            })}
          </div>
        )}
        <div style={{height:30}}/>
      </div>);
    }

    // ── ProfileView ──
    function ProfileView({L,lang,switchLang,session,profile,catches,myGroups,onGroupsChange,following,onViewUser,S,t,themeKey,switchTheme,onBack,onStats,onUpdate,onSignOut}){
      const swipeRef=useEdgeSwipeBack(onBack);
      const fileRef=useRef();
      const[displayName,setDisplayName]=useState(profile?.display_name||"");
      const[editingName,setEditingName]=useState(false);
      const[defaultVisibility,setDefaultVisibility]=useState(profile?.default_visibility||(profile?.default_public?"public":"private"));
      const[avatarUrl,setAvatarUrl]=useState(profile?.avatar_url||null);
      const[saving,setSaving]=useState(false);
      const[uploading,setUploading]=useState(false);
      const[msg,setMsg]=useState("");
      const[showCreateGroup,setShowCreateGroup]=useState(false);
      const[newGroupName,setNewGroupName]=useState("");
      const[creatingGroup,setCreatingGroup]=useState(false);
      const[shareGroup,setShareGroup]=useState(null); // gruppen som skal inviteres til
      const[leaveGroup,setLeaveGroup]=useState(null);
      const[profileAboutOpen,setProfileAboutOpen]=useState(false);
      const sendFeedback=()=>{
        const subject=encodeURIComponent(L("feedback_subject"));
        window.location.href=`mailto:magnus@jepson.no?subject=${subject}`;
      };
      const shareApp=async()=>{
        const url=window.location.origin;
        const text=L("share_app_text");
        if(navigator.share){
          try{await navigator.share({title:L("app_name"),text,url});}
          catch(e){if(e.name!=="AbortError")copyToClipboard(url);}
        }else{
          try{
            await navigator.clipboard.writeText(url);
            setMsg(L("share_app_copied"));
            setTimeout(()=>setMsg(""),2000);
          }catch(e){
            alert(url);
          }
        }
      };
      useEffect(()=>{window.scrollTo(0,0);},[]);

      const stats={
        total:catches.length,
        shared:catches.filter(c=>{
          const vis=c.visibility||(c.is_public?"public":"private");
          return vis!=="private";
        }).length,
        biggest:catches.reduce((max,c)=>(c.weight!=null&&c.weight>max?c.weight:max),0),
      };

      const showMsg=(m,isErr)=>{setMsg(m);setTimeout(()=>setMsg(""),isErr?4000:2000);};

      const saveName=async()=>{
        const name=displayName.trim();
        if(!name)return;
        setSaving(true);setMsg("");
        const {data,error}=await sb.from("profiles").update({display_name:name,name_set:true}).eq("id",session.user.id).select().single();
        setSaving(false);
        if(error){showMsg(L("error_prefix")+" "+error.message,true);return;}
        onUpdate(data);
        setEditingName(false);
        showMsg(L("profile_name_saved"));
      };

      const saveDefaultVisibility=async(val)=>{
        const prev=defaultVisibility;
        setDefaultVisibility(val);
        const {data,error}=await sb.from("profiles").update({
          default_visibility:val,
          default_public:val==="public",
        }).eq("id",session.user.id).select().single();
        if(error){showMsg(L("error_prefix")+" "+error.message,true);setDefaultVisibility(prev);return;}
        if(data)onUpdate(data);
      };

      const handleAvatar=async(e)=>{
        const file=e.target.files?.[0];
        if(!file)return;
        setUploading(true);setMsg("");
        try{
          const blob=await resizeImage(file,400);
          const filename=`${session.user.id}/${Date.now()}.jpg`;
          const {error:upErr}=await sb.storage.from("avatars").upload(filename,blob,{...UPLOAD_OPTS,upsert:false});
          if(upErr)throw upErr;
          const {data:urlData}=sb.storage.from("avatars").getPublicUrl(filename);
          const newUrl=urlData.publicUrl;
          if(profile?.avatar_url){
            const m=profile.avatar_url.match(/\/avatars\/(.+)$/);
            if(m&&m[1])await sb.storage.from("avatars").remove([m[1]]);
          }
          const {data,error}=await sb.from("profiles").update({avatar_url:newUrl}).eq("id",session.user.id).select().single();
          if(error)throw error;
          setAvatarUrl(newUrl);
          onUpdate(data);
          showMsg(L("profile_photo_updated"));
        }catch(err){
          showMsg(L("error_prefix")+" "+(err.message||L("error_unknown")),true);
        }
        setUploading(false);
        e.target.value="";
      };

      const createGroup=async()=>{
        const name=newGroupName.trim();
        if(!name)return;
        setCreatingGroup(true);
        try{
          const {data:group,error}=await sb.from("groups").insert({
            name,
            created_by:session.user.id,
          }).select().single();
          if(error)throw error;
          // Legg meg selv til som medlem
          const {error:memberErr}=await sb.from("group_members").insert({
            group_id:group.id,
            user_id:session.user.id,
          });
          if(memberErr)throw memberErr;
          await onGroupsChange();
          setNewGroupName("");
          setShowCreateGroup(false);
          // Vis invitasjons-modal med en gang så brukeren kan dele
          setShareGroup({...group,member_count:1});
        }catch(e){
          alert(L("group_create_failed")+" "+(e.message||L("error_unknown")));
        }
        setCreatingGroup(false);
      };

      const buildInviteUrl=(code)=>{
        const base=window.location.origin+window.location.pathname;
        return `${base}?invite=${code}`;
      };

      const shareInviteLink=async(group)=>{
        const url=buildInviteUrl(group.invite_code);
        const text=L("groups_invite_share_text",group.name);
        if(navigator.share){
          try{await navigator.share({title:group.name,text,url});}
          catch(e){if(e.name!=="AbortError")copyToClipboard(url);}
        }else{
          copyToClipboard(url);
        }
      };

      const copyToClipboard=async(text)=>{
        try{
          await navigator.clipboard.writeText(text);
          setMsg(L("groups_link_copied"));
          setTimeout(()=>setMsg(""),2000);
        }catch(e){
          alert(L("copy_failed")+" "+text);
        }
      };

      const doLeaveGroup=async(group)=>{
        const {error}=await sb.from("group_members").delete()
          .eq("group_id",group.id)
          .eq("user_id",session.user.id);
        if(error){
          // Databasetriggeren blokkerer at oppretteren forlater en gruppe med
          // andre medlemmer, og kaster da en feil med "OWNER_CANNOT_LEAVE".
          if((error.message||"").includes("OWNER_CANNOT_LEAVE")){
            alert(L("groups_owner_cannot_leave"));
          }else{
            alert(L("error_prefix")+" "+error.message);
          }
          return;
        }
        setLeaveGroup(null);
        await onGroupsChange();
      };

      const nameUnchanged=displayName.trim()===(profile?.display_name||"");

      return(<div ref={swipeRef} className="safe-top safe-bottom" style={{...S.page,touchAction:"pan-y",willChange:"transform"}}>
        <div style={S.topBar}>
          <button style={S.backBtn} onClick={onBack}>{I.back()}</button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"0 0 18px"}}>
          <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:0}}>{L("profile_title")}</h2>
          <button onClick={()=>setProfileAboutOpen(true)} style={{...S.smBtn,color:t.textMuted}}>{I.info()}</button>
        </div>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:22}}>
          <div style={{position:"relative"}}>
            <Avatar url={avatarUrl} name={profile?.display_name||profile?.username} seed={profile?.username||session.user.id} size={96} t={t}/>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{position:"absolute",bottom:-2,right:-2,width:34,height:34,borderRadius:17,border:`2px solid ${t.cardBg}`,background:t.primary,color:t.name==="Mørk"?"#0f1a17":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,boxShadow:t.btnShadow}}>
              {uploading?<div className="spinner" style={{width:14,height:14,borderWidth:2}}/>:I.edit()}
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleAvatar} style={{display:"none"}}/>
          </div>
          {!editingName
            ? <div style={{display:"flex",alignItems:"center",gap:8,margin:"12px 0 0"}}>
                <p style={{fontSize:20,fontWeight:600,color:t.text,margin:0}}>{profile?.display_name||profile?.username||"—"}</p>
                <button onClick={()=>{setDisplayName(profile?.display_name||"");setEditingName(true);}} style={{background:"transparent",border:"none",color:t.textMuted,cursor:"pointer",display:"flex",padding:4,WebkitTapHighlightColor:"transparent"}}>{I.edit()}</button>
              </div>
            : <div style={{display:"flex",alignItems:"center",gap:8,margin:"12px 0 0",width:"100%",maxWidth:340}}>
                <input value={displayName} onChange={e=>setDisplayName(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter"&&displayName.trim()&&!nameUnchanged)saveName();if(e.key==="Escape")setEditingName(false);}} style={{...S.inp,flex:1,textAlign:"center"}}/>
                <button onClick={saveName} disabled={saving||!displayName.trim()||nameUnchanged} style={{width:42,height:42,borderRadius:11,border:"none",background:t.primary,color:t.name==="Mørk"?"#0f1a17":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,opacity:(saving||!displayName.trim()||nameUnchanged)?.45:1}}>
                  {saving?<div className="spinner" style={{width:14,height:14,borderWidth:2}}/>:I.checkSm(18)}
                </button>
                <button onClick={()=>setEditingName(false)} style={{width:42,height:42,borderRadius:11,border:`1px solid ${t.cardBorder}`,background:t.cardBg,color:t.textSec,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{I.x()}</button>
              </div>}
          <p style={{fontSize:14,color:t.textMuted,margin:"2px 0 0"}}>{session.user.email}</p>
          {profile?.username&&<p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_username")} {profile.username}</p>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.total}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_catches")}</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.shared}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_shared")}</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.biggest||"—"}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{L("profile_stat_biggest")}</p>
          </div>
        </div>

        <button onClick={onStats} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,background:t.cardBg,border:`1px solid ${t.cardBorder}`,borderRadius:12,padding:"14px 16px",marginBottom:session?.user?.email==="magnus@jepson.no"?8:18,cursor:"pointer",fontFamily:t.font,WebkitTapHighlightColor:"transparent"}}>
          <span style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{color:t.primary,display:"flex"}}>{I.chart()}</span>
            <span style={{fontSize:15,fontWeight:500,color:t.text}}>{L("profile_stats_link")}</span>
          </span>
          <span style={{color:t.textMuted,display:"flex",transform:"rotate(-90deg)"}}>{I.chevDown()}</span>
        </button>
        {session?.user?.email==="magnus@jepson.no"&&
