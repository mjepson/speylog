    // ── Edge-swipe-back hook (iOS-stil) ──
    // Sveip fra venstre kant for å gå tilbake. Gir visuell feedback
    // ved at siden gli'r til høyre. Avbrytes hvis brukeren scroller vertikalt.
    function useEdgeSwipeBack(onBack,enabled=true){
      const ref=useRef(null);
      useEffect(()=>{
        if(!enabled||!onBack)return;
        const el=ref.current;if(!el)return;
        const EDGE=24,TRIGGER=80,VEL=0.5,MAX_V=40;
        let active=false,startX=0,startY=0,curX=0,startTime=0,atEdge=false;
        const onStart=(e)=>{
          const t=e.touches[0];
          if(t.clientX<=EDGE){
            active=true;atEdge=true;startX=t.clientX;startY=t.clientY;curX=t.clientX;
            startTime=Date.now();el.style.transition="none";
          }
        };
        const onMove=(e)=>{
          if(!active||!atEdge)return;
          const t=e.touches[0];
          const dx=t.clientX-startX,dy=Math.abs(t.clientY-startY);
          if(dy>MAX_V&&dx<30){active=false;el.style.transform="";el.style.opacity="";return;}
          if(dx>0){
            curX=t.clientX;
            const tr=Math.min(dx,window.innerWidth);
            const op=Math.max(0.4,1-dx/window.innerWidth);
            el.style.transform=`translateX(${tr}px)`;
            el.style.opacity=String(op);
          }
        };
        const onEnd=()=>{
          if(!active||!atEdge){el.style.transform="";el.style.opacity="";active=false;atEdge=false;return;}
          const dx=curX-startX,dt=Date.now()-startTime,v=dx/Math.max(dt,1);
          const trigger=dx>TRIGGER||v>VEL;
          el.style.transition="transform .2s ease, opacity .2s ease";
          if(trigger){
            el.style.transform=`translateX(${window.innerWidth}px)`;
            el.style.opacity="0";
            setTimeout(()=>{
              if(el){el.style.transition="";el.style.transform="";el.style.opacity="";}
              onBack();
            },180);
          }else{
            el.style.transform="";el.style.opacity="";
          }
          active=false;atEdge=false;
        };
        el.addEventListener("touchstart",onStart,{passive:true});
        el.addEventListener("touchmove",onMove,{passive:true});
        el.addEventListener("touchend",onEnd,{passive:true});
        el.addEventListener("touchcancel",onEnd,{passive:true});
        return()=>{
          el.removeEventListener("touchstart",onStart);
          el.removeEventListener("touchmove",onMove);
          el.removeEventListener("touchend",onEnd);
          el.removeEventListener("touchcancel",onEnd);
        };
      },[onBack,enabled]);
      return ref;
    }

    function tr(key,lang){
      const entry=STRINGS[key];
      if(!entry)return key;
      return entry[lang]||entry["nb"]||key;
    }
    // Pluralisering av "fangst/fangster"
    function trCatches(n,lang){
      const word=n===1?tr("catch_count_one",lang):tr("catch_count_many",lang);
      return `${n} ${word}`;
    }
    function trMembers(n,lang){
      const word=n===1?tr("member_one",lang):tr("member_many",lang);
      return `${n} ${word}`;
    }
    // Mapper databaseverdi (alltid norsk) → oversatt visningsverdi
    function trSpecies(nbValue,lang){
      if(!nbValue)return nbValue;
      const idx=SPECIES.indexOf(nbValue);
      if(idx<0)return nbValue;
      return STRINGS.species_options[lang][idx]||nbValue;
    }
    function trEquipment(nbValue,lang){
      if(!nbValue)return nbValue;
      const idx=EQUIPMENT.indexOf(nbValue);
      if(idx<0)return nbValue;
      return STRINGS.equipment_options[lang][idx]||nbValue;
    }
    function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){console.error(e);}}

    function avatarColor(seed){
      const colors=["#1a5c3a","#2d6a4f","#52796f","#386641","#6a994e","#8b5cf6","#7c3aed","#0891b2","#0e7490","#b45309","#a16207","#be123c","#9f1239","#9333ea","#1e40af"];
      let h=0;
      const s=seed||"?";
      for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;
      return colors[h%colors.length];
    }

    function resizeImage(file,maxW=800){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            let w=img.width,h=img.height;
            if(w>maxW){h=h*(maxW/w);w=maxW;}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            canvas.toBlob(blob=>{if(blob)resolve(blob);else reject("Blob failed");},"image/jpeg",0.65);
          };
          img.onerror=reject;
          img.src=ev.target.result;
        };
        reader.onerror=reject;
        reader.readAsDataURL(file);
      });
    }

    // ── Generate share image (original photo ratio, scaled to ~1080px wide) ──
    async function generateShareImage(c,profileData,lang){
      const loadImg=async(url)=>{
        const res=await fetch(url,{mode:"cors"});
        const blob=await res.blob();
        const objUrl=URL.createObjectURL(blob);
        return new Promise((resolve,reject)=>{
          const img=new Image();
          img.onload=()=>{URL.revokeObjectURL(objUrl);resolve(img);};
          img.onerror=reject;
          img.src=objUrl;
        });
      };

      // Determine canvas size from photo's natural ratio
      let W=1080,H=1350; // fallback if no photo
      let bgImg=null;
      const photoUrl=(c.photos||[])[0];
      if(photoUrl){
        try{
          bgImg=await loadImg(photoUrl);
          // Scale to max 1080 on longest side, keep ratio
          const ratio=bgImg.width/bgImg.height;
          if(ratio>=1){
            W=1080;
            H=Math.round(1080/ratio);
          }else{
            H=1080;
            W=Math.round(1080*ratio);
          }
        }catch(e){
          // fallback to default
        }
      }

      const canvas=document.createElement("canvas");
      canvas.width=W;canvas.height=H;
      const ctx=canvas.getContext("2d");

      const drawCover=(img,x,y,w,h)=>{
        const iw=img.width,ih=img.height;
        const scale=Math.max(w/iw,h/ih);
        const sw=w/scale,sh=h/scale;
        const sx=(iw-sw)/2,sy=(ih-sh)/2;
        ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
      };

      const roundRect=(x,y,w,h,r)=>{
        ctx.beginPath();
        ctx.moveTo(x+r,y);
        ctx.arcTo(x+w,y,x+w,y+h,r);
        ctx.arcTo(x+w,y+h,x,y+h,r);
        ctx.arcTo(x,y+h,x,y,r);
        ctx.arcTo(x,y,x+w,y,r);
        ctx.closePath();
      };

      if(bgImg){
        // Draw at natural ratio (no cropping)
        ctx.drawImage(bgImg,0,0,W,H);
      }else{
        ctx.fillStyle="#1a5c3a";
        ctx.fillRect(0,0,W,H);
      }

      // Top gradient — height scales with canvas (≈19% of height)
      const topGradH=Math.round(H*0.19);
      const topGrad=ctx.createLinearGradient(0,0,0,topGradH);
      topGrad.addColorStop(0,"rgba(0,0,0,.6)");
      topGrad.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=topGrad;
      ctx.fillRect(0,0,W,topGradH);

      // Bottom gradient — height scales with canvas (≈37% of height)
      const botGradH=Math.round(H*0.37);
      const botGrad=ctx.createLinearGradient(0,H-botGradH,0,H);
      botGrad.addColorStop(0,"rgba(0,0,0,0)");
      botGrad.addColorStop(0.5,"rgba(0,0,0,.5)");
      botGrad.addColorStop(1,"rgba(0,0,0,.85)");
      ctx.fillStyle=botGrad;
      ctx.fillRect(0,H-botGradH,W,botGradH);

      // Scale text/elements based on canvas width (1080 = baseline)
      const sc=W/1080; // scale factor

      const topY=Math.round(90*sc);
      const avatarSize=Math.round(80*sc);
      const avatarX=Math.round(50*sc);
      let nameX=avatarX+avatarSize+Math.round(24*sc);
      const ownerName=profileData?.display_name||profileData?.username||"";
      const avatarUrl=profileData?.avatar_url;

      ctx.save();
      ctx.beginPath();
      ctx.arc(avatarX+avatarSize/2,topY+avatarSize/2,avatarSize/2,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      if(avatarUrl){
        try{
          const aImg=await loadImg(avatarUrl);
          drawCover(aImg,avatarX,topY,avatarSize,avatarSize);
        }catch(e){
          ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
          ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
          ctx.fillStyle="#fff";
          ctx.font=`bold ${Math.round(40*sc)}px -apple-system, system-ui, sans-serif`;
          ctx.textAlign="center";
          ctx.textBaseline="middle";
          ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
        }
      }else{
        ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
        ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
        ctx.fillStyle="#fff";
        ctx.font=`bold ${Math.round(40*sc)}px -apple-system, system-ui, sans-serif`;
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
      }
      ctx.restore();

      ctx.fillStyle="#fff";
      ctx.font=`600 ${Math.round(38*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="left";
      ctx.textBaseline="alphabetic";
      ctx.shadowColor="rgba(0,0,0,.6)";
      ctx.shadowBlur=8;
      ctx.fillText(ownerName,nameX,topY+Math.round(44*sc));

      ctx.font=`500 ${Math.round(30*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="right";
      ctx.fillText(fmtDate(c.date),W-Math.round(50*sc),topY+Math.round(44*sc));
      ctx.shadowBlur=0;

      const titleY=H-Math.round(180*sc);
      ctx.fillStyle="#fff";
      ctx.font=`700 ${Math.round(56*sc)}px -apple-system, system-ui, sans-serif`;
      ctx.textAlign="left";
      ctx.shadowColor="rgba(0,0,0,.7)";
      ctx.shadowBlur=10;
      const L=lang||"nb";const title=`${trSpecies(c.species,L)} · ${c.river}${c.beat?" · "+c.beat:""}`;
      let displayTitle=title;
      const maxTitleW=W-Math.round(100*sc);
      if(ctx.measureText(displayTitle).width>maxTitleW){
        while(ctx.measureText(displayTitle+"…").width>maxTitleW&&displayTitle.length>10){
          displayTitle=displayTitle.slice(0,-1);
        }
        displayTitle+="…";
      }
      ctx.fillText(displayTitle,Math.round(50*sc),titleY);
      ctx.shadowBlur=0;

      const chips=[];
      if(c.weight!=null)chips.push({text:`${c.weight} kg`,color:"#fff"});
      if(c.length!=null)chips.push({text:`${c.length} cm`,color:"#fff"});
      chips.push({text:trEquipment(c.equipment,L),color:"#fff"});
      chips.push({text:c.released?"C&R":STRINGS.detail_kept[L],color:c.released?"#a7f3d0":"#fecaca"});

      const chipY=H-Math.round(100*sc);
      const chipH=Math.round(54*sc);
      const chipPadding=Math.round(22*sc);
      const chipGap=Math.round(10*sc);
      ctx.font=`600 ${Math.round(26*sc)}px -apple-system, system-ui, sans-serif`;
      let chipX=Math.round(50*sc);
      chips.forEach(chip=>{
        const tw=ctx.measureText(chip.text).width;
        const cw=tw+chipPadding*2;
        ctx.fillStyle="rgba(255,255,255,.22)";
        roundRect(chipX,chipY,cw,chipH,Math.round(12*sc));
        ctx.fill();
        ctx.fillStyle=chip.color;
        ctx.textBaseline="middle";
        ctx.fillText(chip.text,chipX+chipPadding,chipY+chipH/2+2);
        chipX+=cw+chipGap;
      });

      return new Promise(resolve=>canvas.toBlob(b=>resolve(b),"image/jpeg",0.92));
    }

    async function shareCatch(c,profileData,lang){
      try{
        const blob=await generateShareImage(c,profileData,lang);
        if(!blob)throw new Error("Kunne ikke generere bilde");
        const file=new File([blob],`fangst-${c.id}.jpg`,{type:"image/jpeg"});
        const L=lang||"nb";
        const sp=trSpecies(c.species,L);
        const shareData={
          title:`${sp} · ${c.river}`,
          text:`${sp} · ${c.river}${c.beat?" · "+c.beat:""}`,
          files:[file],
        };
        if(navigator.canShare&&navigator.canShare(shareData)){
          await navigator.share(shareData);
        }else{
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=`fangst-${c.id}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        }
      }catch(e){
        if(e.name!=="AbortError"){
          const lang=detectLang();
          alert(STRINGS.share_failed[lang]+" "+(e.message||STRINGS.error_unknown[lang]));
        }
      }
    }

    // ── NameCaptureView — ber nye brukere om navn etter innlogging ──
    function NameCaptureView({L,t,S,session,onSaved,onSkip,onSignOut}){
      const[name,setName]=useState("");
      const[busy,setBusy]=useState(false);
      const[err,setErr]=useState("");
      const submit=async()=>{
        const n=name.trim();
        if(!n)return;
        setBusy(true);setErr("");
        try{
          // Profilraden finnes alltid (databasetriggeren handle_new_user lager
          // den ved registrering, med username satt fra e-posten). Vi gjør derfor
          // en ren update av display_name — det rører ikke username og kan ikke
          // bryte NOT NULL-begrensningen. Samme mønster som "Lagre navn".
          const {data,error}=await sb.from("profiles").update({display_name:n,name_set:true}).eq("id",session.user.id).select().single();
          if(error)throw error;
          setBusy(false);
          onSaved(data);
        }catch(e){
          setErr(e.message||L("auth_something_wrong"));
          setBusy(false);
        }
      };
      return (
        <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <AppLogo size={80} t={t}/>
            <h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>{L("auth_name_step_title")}</h1>
            <p style={{fontSize:14,color:t.textMuted,margin:0}}>{L("auth_name_step_intro")}</p>
          </div>
          <div style={{...S.sec,width:"100%",maxWidth:340}}>
            <input style={{...S.inp,marginBottom:14}} placeholder={L("auth_name_placeholder")} value={name} onChange={e=>setName(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter")submit();}}/>
            {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
            <button style={{...S.btnPriFull,opacity:(busy||!name.trim())?.6:1}} disabled={busy||!name.trim()} onClick={submit}>
              {busy?L("auth_sending"):L("auth_continue")}
            </button>
            <button style={{...S.btnSec,fontSize:14,width:"100%",marginTop:8}} onClick={onSkip}>{L("auth_skip")}</button>
            <button style={{...S.btnSec,fontSize:14,width:"100%",marginTop:8}} onClick={onSignOut}>{L("auth_use_other_email")}</button>
          </div>
        </div>
      );
    }

    // ── Avatar ──
    function Avatar({url,name,seed,size=32,t,onClick}){
      const initials=(name||"?").trim().charAt(0).toUpperCase()||"?";
      const bg=avatarColor(seed||name||"?");
      const style={width:size,height:size,borderRadius:size/2,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:bg,color:"#fff",fontSize:Math.round(size*0.42),fontWeight:600,fontFamily:t.font,overflow:"hidden",border:`1px solid ${t.cardBorder}`,cursor:onClick?"pointer":"default"};
      const inner=url?<img src={url} alt="" decoding="sync" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:initials;
      if(onClick)return <button onClick={onClick} style={{...style,padding:0}}>{inner}</button>;
      return <div style={style}>{inner}</div>;
    }

    // ── LazyImage (no longer lazy): loads all images eagerly, no fade-in ──
    // Low-traffic app — we prioritize instant display over bandwidth savings.
    function LazyImage({src,alt,style,onLoad}){
      return <div style={{...style,position:"relative",overflow:"hidden"}}>
        <img src={src} alt={alt||""} onLoad={onLoad} style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
      </div>;
    }

    // ── SwipeableImages ──
    function SwipeableImages({photos,onExpand,t,style}){
      const scrollRef=useRef();
      const[idx,setIdx]=useState(0);
      const handleScroll=()=>{
        if(!scrollRef.current)return;
        const w=scrollRef.current.offsetWidth;
        const i=Math.round(scrollRef.current.scrollLeft/w);
        if(i!==idx)setIdx(i);
      };
      return(<div style={{...style,overflow:"hidden"}}>
        <div ref={scrollRef} onScroll={handleScroll} style={{display:"flex",alignItems:"stretch",overflowX:"auto",overflowY:"hidden",scrollSnapType:"x mandatory",WebkitOverflowScrolling:"touch",width:"100%",height:"100%",scrollbarWidth:"none"}}>
          {photos.map((p,i)=>(
            <div key={i} style={{minWidth:"100%",width:"100%",scrollSnapAlign:"start",flexShrink:0}}>
              <img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
            </div>
          ))}
        </div>
        {photos.length>1&&(
          <div style={{position:"absolute",bottom:110,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6,zIndex:4,pointerEvents:"none"}}>
            {photos.map((_,i)=>(
              <div key={i} style={{width:6,height:6,borderRadius:3,background:i===idx?"#fff":"rgba(255,255,255,.45)",boxShadow:"0 1px 2px rgba(0,0,0,.4)",transition:"background .2s"}}/>
            ))}
          </div>
        )}
        {onExpand&&(
          <button onClick={(e)=>{e.stopPropagation();onExpand(idx);}} style={{position:"absolute",top:"50%",right:12,transform:"translateY(-50%)",width:38,height:38,borderRadius:19,background:"rgba(0,0,0,.45)",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",backdropFilter:"blur(8px)",zIndex:4,opacity:.85}}>
            {I.expand()}
          </button>
        )}
      </div>);
    }

    // ══════════════════════════════════════
    // App Root
    // ══════════════════════════════════════
    function App(){
      const[session,setSession]=useState(null);
      const[loading,setLoading]=useState(true);
      const[themeKey,setThemeKey]=useState(()=>{const s=lsGet("fl_theme");return THEMES[s]?s:"dark";});
      const[lang,setLang]=useState(detectLang());
      const t=THEMES[themeKey]||THEMES.dark;
      const S=makeStyles(t);
      const L=(key,...args)=>{
        const entry=STRINGS[key];
        if(!entry)return key;
        const val=entry[lang]||entry["nb"];
        if(typeof val==="function")return val(...args);
        return val;
      };

      useEffect(()=>{
        const bgColor=(THEMES[themeKey]||THEMES.dark).solidBg;
        document.body.style.background=bgColor;
        document.documentElement.style.background=bgColor;
        const meta=document.querySelector('meta[name="theme-color"]');
        if(meta)meta.setAttribute("content",bgColor);
      },[themeKey]);

      useEffect(()=>{
        document.documentElement.lang=lang==="en"?"en":"no";
      },[lang]);

      useEffect(()=>{
        console.log("[DEBUG] App mounted, getting session...");
        sb.auth.getSession().then(({data,error})=>{
          if(error)console.error("[DEBUG] getSession error:",error);
          console.log("[DEBUG] Initial session:",data.session?"YES (user="+data.session.user?.id+")":"NO");
          setSession(data.session);
          setLoading(false);
        });
        const {data:listener}=sb.auth.onAuthStateChange((event,session)=>{
          console.log("[DEBUG] Auth state change:",event,session?"session=YES (user="+session.user?.id+")":"session=NO");
          setSession(session);
        });
        return()=>listener.subscription.unsubscribe();
      },[]);

      const switchTheme=(k)=>{setThemeKey(k);lsSet("fl_theme",k);};
      const switchLang=(l)=>{setLang(l);lsSet("fl_lang",l);};

      if(loading)return <div style={S.center}><div className="spinner"/></div>;
      if(!session)return <AuthView S={S} t={t} L={L} lang={lang}/>;
      return <MainApp session={session} S={S} t={t} L={L} lang={lang} themeKey={themeKey} switchTheme={switchTheme} switchLang={switchLang}/>;
    }

    // ══════════════════════════════════════
    // Auth View — OTP Code (works in PWA)
    // ══════════════════════════════════════
    function AuthView({S,t,L,lang}){
      const[email,setEmail]=useState("");
      const[code,setCode]=useState("");
      const[err,setErr]=useState("");
      const[busy,setBusy]=useState(false);
      const[step,setStep]=useState("email");
      // VIKTIG: slogan-hooken må stå FØR enhver tidlig return for at hooks-rekkefølgen
      // skal være stabil mellom renders. Tidligere lå den nederst i komponenten,
      // noe som forårsaket React error #300 ved bytte til kode-skjermen.
      const[slogan]=useState(()=>{
        const list=STRINGS.slogans[lang]||STRINGS.slogans.nb;
        return list[Math.floor(Math.random()*list.length)];
      });

      const sendCode=async()=>{
        setErr("");setBusy(true);
        try{
          const {error}=await sb.auth.signInWithOtp({
            email,
            options:{
              shouldCreateUser:true,
            }
          });
          if(error)throw error;
          setStep("code");
        }catch(e){setErr(e.message||L("auth_something_wrong"));}
        setBusy(false);
      };

      const verifyCode=async()=>{
        setErr("");setBusy(true);
        try{
          console.log("[DEBUG] verifyOtp: sending...");
          const {data,error}=await sb.auth.verifyOtp({
            email,
            token:code.trim(),
            type:"email",
          });
          console.log("[DEBUG] verifyOtp response: data=",data,"error=",error);
          if(error)throw error;
        }catch(e){
          console.error("[DEBUG] verifyOtp threw:",e);
          setErr(e.message||L("auth_wrong_code"));
        }
        setBusy(false);
      };

      if(step==="code"){
        return (
          <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
            <div style={{textAlign:"center",marginBottom:30}}>
              <AppLogo size={80} t={t}/>
              <h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>{L("auth_enter_code_title")}</h1>
            </div>
            <div style={{...S.sec,width:"100%",maxWidth:340}}>
              <p style={{fontSize:15,color:t.textSec,margin:"0 0 4px",textAlign:"center",lineHeight:1.5}}>{L("auth_we_sent")}</p>
              <p style={{fontSize:15,color:t.primary,fontWeight:600,margin:"0 0 16px",textAlign:"center"}}>{email}</p>
              <input
                style={{...S.inp,fontSize:24,textAlign:"center",letterSpacing:6,fontWeight:600,marginBottom:14}}
                inputMode="numeric"
                autoComplete="one-time-code"
                pattern="[0-9]*"
                maxLength={8}
                placeholder="00000000"
                value={code}
                onChange={e=>setCode(e.target.value.replace(/\D/g,""))}
                autoFocus
              />
              {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
              <button style={{...S.btnPriFull,opacity:(busy||code.length<6)?.6:1,marginBottom:8}} disabled={busy||code.length<6} onClick={verifyCode}>
                {busy?L("auth_checking"):L("auth_login")}
              </button>
              <button style={{...S.btnSec,fontSize:14,width:"100%"}} onClick={()=>{setStep("email");setCode("");setErr("");}}>{L("auth_use_other_email")}</button>
            </div>
          </div>
        );
      }

      return (
        <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <AppLogo size={96} t={t}/>
            <h1 style={{fontFamily:t.titleFont,fontSize:32,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>{L("app_name")}</h1>
            <p style={{fontSize:16,color:t.text,margin:"6px 0 2px",fontWeight:500,fontStyle:"italic",maxWidth:300}}>{slogan}</p>
            <p style={{fontSize:13,color:t.textMuted,margin:0}}>{L("app_tagline")}</p>
          </div>
          <div style={{...S.sec,width:"100%",maxWidth:340}}>
            <p style={{fontSize:15,color:t.textSec,margin:"0 0 16px",textAlign:"center",lineHeight:1.5}}>{L("auth_intro")}</p>
            <label style={{fontSize:13,fontWeight:600,color:t.textSec}}>{L("auth_email_label")}</label>
            <input style={{...S.inp,marginTop:4,marginBottom:14}} type="email" inputMode="email" autoComplete="email" placeholder="navn@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
            {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
            <button style={{...S.btnPriFull,opacity:busy?.6:1}} disabled={busy||!email} onClick={sendCode}>
              {busy?L("auth_sending"):L("auth_send_code")}
            </button>
          </div>
          <a href="https://speylog.com" style={{marginTop:24,fontSize:13,color:t.textMuted,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:6}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            speylog.com
          </a>
          <p style={{fontSize:11,color:t.textMuted,margin:"10px 0 0",opacity:.5}}>v110</p>
        </div>
      );
    }

    // ══════════════════════════════════════
    // Main App (authenticated)
    // ══════════════════════════════════════
    function MainApp({session,S,t,L,lang,themeKey,switchTheme,switchLang}){
      const[catches,setCatches]=useState([]);
      const[publicFeed,setPublicFeed]=useState([]);
      const[profile,setProfile]=useState(null);
      const[myGroups,setMyGroups]=useState([]);
      // groupMembersByGroup: { group_id: Set<user_id> } — for å filtrere feed lokalt
      const[groupMembersByGroup,setGroupMembersByGroup]=useState({});
      // catchGroupsMap: { catch_id: [group_id, ...] } — hvilke grupper hver fangst er delt med
      const[catchGroupsMap,setCatchGroupsMap]=useState({});
      const[following,setFollowing]=useState([]); // array av profil-objekter jeg følger
      const[viewUserId,setViewUserId]=useState(null); // hvilken brukerprofil som vises i userProfile-view
      const[nameSkipped,setNameSkipped]=useState(false); // brukeren valgte å hoppe over navnesteget denne økten
      const[customRivers,setCustomRivers]=useState(lsGet("fl_rivers")||[]);
      const[customFlies,setCustomFlies]=useState(lsGet("fl_flies")||[]);
      const[prefs,setPrefs]=useState(lsGet("fl_prefs")||{lastRiver:"",lastEquipment:"Flue"});
      const[view,setView]=useState("list");
      const[tab,setTab]=useState("mine");
      const[viewMode,setViewMode]=useState(lsGet("fl_viewMode")||"compact");
      const[selected,setSelected]=useState(null);
      const[editing,setEditing]=useState(null);
      const[loading,setLoading]=useState(true);
      const[listScrollY,setListScrollY]=useState(0);
      const[fR,setFR]=useState("Alle");
      const[fS,setFS]=useState("Alle");
      const[fY,setFY]=useState("Alle");
      const[hideOwnInFeed,setHideOwnInFeed]=useState(lsGet("fl_hideOwnInFeed")||false);
      const[feedFilter,setFeedFilter]=useState(lsGet("fl_feedFilter")||"all"); // 'all' | 'public' | 'following' | group_id
      const[feedLastSeen,setFeedLastSeen]=useState(lsGet("fl_feedLastSeen")||null);
      const[delModal,setDelModal]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const[dbRivers,setDbRivers]=useState([]);
      useEffect(()=>{
        let cancelled=false;
        (async()=>{
          const {data}=await sb.from("river_stations").select("river_name").eq("verified",true);
          if(!cancelled&&data)setDbRivers(data.map(r=>r.river_name));
        })();
        return()=>{cancelled=true;};
      },[]);
      const allRivers=[...new Set([...DEFAULT_RIVERS,...dbRivers,...customRivers])].sort((a,b)=>a.localeCompare(b,"nb"));
      const allFlies=[...new Set([...DEFAULT_FLIES,...customFlies])].sort((a,b)=>a.localeCompare(b,"nb"));

      const loadCatches=async()=>{
        console.log("[DEBUG] loadCatches: start, user_id=",session.user.id);
        try{
          console.log("[DEBUG] Fetching own catches...");
          const {data:mine,error:mineErr}=await sb.from("catches").select("*").eq("user_id",session.user.id).order("date",{ascending:false});
          if(mineErr){console.error("[DEBUG] catches (mine) error:",mineErr);}
          console.log("[DEBUG] Own catches:",mine?.length||0);
          setCatches(mine||[]);

          console.log("[DEBUG] Fetching public feed...");
          const {data:pub,error:pubErr}=await sb.from("catches").select("*, profiles(display_name, username, avatar_url)").in("visibility",["public","groups"]).order("date",{ascending:false}).limit(200);
          if(pubErr){console.error("[DEBUG] catches (feed) error:",pubErr);}
          console.log("[DEBUG] Feed catches:",pub?.length||0);
          setPublicFeed(pub||[]);

          const allCatchIds=[...(mine||[]),...(pub||[])].map(c=>c.id);
          if(allCatchIds.length>0){
            console.log("[DEBUG] Fetching catch_groups...");
            const {data:cgRows,error:cgErr}=await sb.from("catch_groups").select("catch_id, group_id").in("catch_id",allCatchIds);
            if(cgErr){console.error("[DEBUG] catch_groups error:",cgErr);}
            const map={};
            (cgRows||[]).forEach(r=>{
              if(!map[r.catch_id])map[r.catch_id]=[];
              map[r.catch_id].push(r.group_id);
            });
            setCatchGroupsMap(map);
          }else{
            setCatchGroupsMap({});
          }

          console.log("[DEBUG] Fetching profile...");
          // Bruk maybeSingle() i stedet for single() — single() kaster feil hvis raden ikke finnes,
          // som er vanlig for helt nye brukere. maybeSingle() returnerer null i stedet.
          const {data:prof,error:profErr}=await sb.from("profiles").select("*").eq("id",session.user.id).maybeSingle();
          if(profErr){console.error("[DEBUG] profile error:",profErr);}
          console.log("[DEBUG] Profile:",prof);
          setProfile(prof||null);

          console.log("[DEBUG] Loading groups...");
          await loadMyGroups();
          console.log("[DEBUG] Loading following...");
          await loadFollowing();
          console.log("[DEBUG] loadCatches: complete");
        }catch(err){
          console.error("[DEBUG] loadCatches CRASHED:",err);
          console.error("[DEBUG] Error name:",err?.name);
          console.error("[DEBUG] Error message:",err?.message);
          console.error("[DEBUG] Error stack:",err?.stack);
        }finally{
          // VIKTIG: setLoading(false) MÅ alltid kjøres, ellers står appen fast på spinner / tom skjerm.
          setLoading(false);
        }
      };

      const loadMyGroups=async()=>{
        // Hent grupper jeg er medlem av, med medlemstall
        const {data:memberships}=await sb.from("group_members").select("group_id, groups(id, name, created_by, created_at, invite_code)").eq("user_id",session.user.id);
        if(!memberships){setMyGroups([]);setGroupMembersByGroup({});return;}
        // Hent medlemstall og medlemslister for hver gruppe
        const groupIds=memberships.map(m=>m.group_id);
        let counts={};
        let membersByGroup={};
        if(groupIds.length>0){
          const {data:allMembers}=await sb.from("group_members").select("group_id, user_id").in("group_id",groupIds);
          (allMembers||[]).forEach(m=>{
            counts[m.group_id]=(counts[m.group_id]||0)+1;
            if(!membersByGroup[m.group_id])membersByGroup[m.group_id]=new Set();
            membersByGroup[m.group_id].add(m.user_id);
          });
        }
        const groups=memberships
          .filter(m=>m.groups)
          .map(m=>({...m.groups,member_count:counts[m.group_id]||0}));
        groups.sort((a,b)=>a.name.localeCompare(b.name,"nb"));
        setMyGroups(groups);
        setGroupMembersByGroup(membersByGroup);
      };

      // ── Følging (bokmerke) ──
      const loadFollowing=async()=>{
        const {data:rows,error}=await sb.from("follows").select("following_id").eq("follower_id",session.user.id);
        if(error){console.error("[DEBUG] follows load error:",error);setFollowing([]);return;}
        const ids=(rows||[]).map(r=>r.following_id);
        if(ids.length===0){setFollowing([]);return;}
        const {data:profs,error:pErr}=await sb.from("profiles").select("id, display_name, username, avatar_url").in("id",ids);
        if(pErr){console.error("[DEBUG] following profiles error:",pErr);setFollowing([]);return;}
        const sorted=(profs||[]).sort((a,b)=>(a.display_name||a.username||"").localeCompare(b.display_name||b.username||"","nb"));
        setFollowing(sorted);
      };

      const followUser=async(userId)=>{
        if(userId===session.user.id)return;
        const {error}=await sb.from("follows").insert({follower_id:session.user.id,following_id:userId});
        if(error&&!error.message.includes("duplicate")){console.error("follow failed",error);return;}
        await loadFollowing();
      };

      const unfollowUser=async(userId)=>{
        const {error}=await sb.from("follows").delete().eq("follower_id",session.user.id).eq("following_id",userId);
        if(error){console.error("unfollow failed",error);return;}
        await loadFollowing();
      };

      const isFollowing=(userId)=>following.some(p=>p.id===userId);

      // Hvis feedFilter peker på noe som ikke lenger finnes (f.eks. 'following'
      // etter at man har sluttet å følge alle, eller en gruppe man har forlatt),
      // fall tilbake til 'all' så feeden ikke blir stille uten markert chip.
      useEffect(()=>{
        if(feedFilter==="all"||feedFilter==="public")return;
        if(feedFilter==="following"){
          if(!following||following.length===0){setFeedFilter("all");lsSet("fl_feedFilter","all");}
          return;
        }
        // ellers er det en gruppe-id
        if(!myGroups.some(g=>g.id===feedFilter)){setFeedFilter("all");lsSet("fl_feedFilter","all");}
      },[feedFilter,following,myGroups]);

      // Antall nye fangster i feeden siden sist brukeren åpnet Felles-fanen.
      // Bruker created_at hvis den finnes (når raden ble lagret), ellers date.
      // Egne fangster teller ikke — du vet at de er der.
      // feedLastSeen===null (helt ny bruker / aldri besøkt Felles) => ingen badge,
      // så man ikke møtes av «42 nye» på første åpning.
      const feedNewCount=(()=>{
        if(!feedLastSeen)return 0;
        const seen=new Date(feedLastSeen).getTime();
        return publicFeed.filter(c=>{
          if(c.user_id===session.user.id)return false;
          const ts=new Date(c.created_at||c.date).getTime();
          return ts>seen;
        }).length;
      })();

      // Når brukeren går til Felles-fanen: marker alt som sett (nullstiller badge).
      useEffect(()=>{
        if(tab==="feed"){
          const now=new Date().toISOString();
          setFeedLastSeen(now);
          lsSet("fl_feedLastSeen",now);
        }
      },[tab]);

      const[inviteModal,setInviteModal]=useState(null); // {code, group} eller null
      useEffect(()=>{loadCatches();},[]);

      // Sjekk for ?invite=<kode> i URL ved app-start
      useEffect(()=>{
        const params=new URLSearchParams(window.location.search);
        const code=params.get("invite");
        if(!code)return;
        // Hent gruppe-info via RPC
        sb.rpc("get_group_by_invite",{p_invite_code:code}).then(({data,error})=>{
          if(error||!data||data.length===0){
            console.warn("Ugyldig invitasjonskode",error);
            // Rydd URL uansett
            window.history.replaceState({},document.title,window.location.pathname);
            return;
          }
          setInviteModal({code,group:data[0]});
        });
      },[]);

      const acceptInvite=async()=>{
        if(!inviteModal)return;
        const {error}=await sb.from("group_members").insert({
          group_id:inviteModal.group.id,
          user_id:session.user.id,
        });
        // Rydd URL
        window.history.replaceState({},document.title,window.location.pathname);
        if(error&&!error.message.includes("duplicate")){
          alert(L("group_join_failed")+" "+error.message);
        }
        setInviteModal(null);
        await loadMyGroups();
      };

      const declineInvite=()=>{
        window.history.replaceState({},document.title,window.location.pathname);
        setInviteModal(null);
      };

      const savePrefs=(p)=>{setPrefs(p);lsSet("fl_prefs",p);};
      const switchViewMode=(m)=>{setViewMode(m);lsSet("fl_viewMode",m);};
      const toggleHideOwnInFeed=()=>{const v=!hideOwnInFeed;setHideOwnInFeed(v);lsSet("fl_hideOwnInFeed",v);};
      const addCustomRiver=(name)=>{if(!customRivers.includes(name)){const next=[...customRivers,name];setCustomRivers(next);lsSet("fl_rivers",next);}};
      const addCustomFly=(name)=>{if(!customFlies.includes(name)&&!DEFAULT_FLIES.includes(name)){const next=[...customFlies,name];setCustomFlies(next);lsSet("fl_flies",next);}};

      const uploadPhotos=async(photoFiles)=>{
        const urls=[];
        for(const file of photoFiles){
          const ext="jpg";
          const filename=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
          const {error}=await sb.storage.from("catch-photos").upload(filename,file,UPLOAD_OPTS);
          if(error){console.error(error);continue;}
          const {data}=sb.storage.from("catch-photos").getPublicUrl(filename);
          urls.push(data.publicUrl);
        }
        return urls;
      };

      const addCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          user_id:session.user.id,
          visibility:form.visibility||"private",
          is_public:form.visibility==="public",
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          fly_pattern:form.equipment==="Flue"?(form.fly_pattern||null):null,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
          conditions:(form.conditions&&Object.keys(form.conditions).length>0)?form.conditions:null,
        };
        const {data,error}=await sb.from("catches").insert(row).select().single();
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        // Lagre gruppe-koblinger hvis visibility=groups
        if(form.visibility==="groups"&&form.selectedGroupIds&&form.selectedGroupIds.length>0){
          const cgRows=form.selectedGroupIds.map(gid=>({catch_id:data.id,group_id:gid}));
          const {error:cgErr}=await sb.from("catch_groups").insert(cgRows);
          if(cgErr){console.error("catch_groups insert feilet",cgErr);alert(L("error_prefix")+" "+cgErr.message);}
          else{
            setCatchGroupsMap(prev=>({...prev,[data.id]:form.selectedGroupIds}));
          }
        }
        setCatches(prev=>[data,...prev]);
        enrichConditions(data);
        savePrefs({lastRiver:form.river,lastEquipment:form.equipment});
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        if(form.equipment==="Flue"&&form.fly_pattern&&!DEFAULT_FLIES.includes(form.fly_pattern))addCustomFly(form.fly_pattern);
        setView("list");
      };

      // Henter måledata (NVE/Frost) via Edge Function og skriver til conditions.measured.
      // Kjøres asynkront etter lagring — blokkerer aldri, og rører aldri manuelle felt.
      const enrichConditions=async(catchRow)=>{
        try{
          if(!catchRow||!catchRow.date||!catchRow.river)return;
          const ts=new Date(`${catchRow.date}T${catchRow.time||"12:00"}`).toISOString();
          const {data,error}=await sb.functions.invoke("fetch-conditions",{body:{river:catchRow.river,timestamp:ts}});
          if(error||!data||data.error)return;
          const r1=v=>Math.round(v*10)/10;
          const measured={};
          if(data.water_flow!=null)measured.water_flow=r1(data.water_flow);
          if(data.water_temp!=null)measured.water_temp=r1(data.water_temp);
          if(data.air_temp!=null)measured.air_temp=r1(data.air_temp);
          if(Object.keys(measured).length===0)return;
          if(data.nve_station)measured.nve_station=data.nve_station;
          measured.fetched_at=data.fetched_at;
          const conditions={...(catchRow.conditions||{}),measured};
          const {data:upd,error:updErr}=await sb.from("catches").update({conditions}).eq("id",catchRow.id).select().single();
          if(updErr||!upd)return;
          setCatches(prev=>prev.map(x=>x.id===upd.id?upd:x));
          setSelected(prev=>prev&&prev.id===upd.id?upd:prev);
        }catch(e){console.error("enrichConditions",e);}
      };

      const updateCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          visibility:form.visibility||"private",
          is_public:form.visibility==="public",
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          fly_pattern:form.equipment==="Flue"?(form.fly_pattern||null):null,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
          conditions:(form.conditions&&Object.keys(form.conditions).length>0)?form.conditions:null,
        };
        const {data,error}=await sb.from("catches").update(row).eq("id",form.id).select().single();
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        // Synkroniser catch_groups: slett alle gamle, sett inn nye hvis groups-mode
        const {error:delErr}=await sb.from("catch_groups").delete().eq("catch_id",form.id);
        if(delErr)console.error("catch_groups delete feilet",delErr);
        if(form.visibility==="groups"&&form.selectedGroupIds&&form.selectedGroupIds.length>0){
          const cgRows=form.selectedGroupIds.map(gid=>({catch_id:form.id,group_id:gid}));
          const {error:cgErr}=await sb.from("catch_groups").insert(cgRows);
          if(cgErr){console.error("catch_groups insert feilet",cgErr);alert(L("error_prefix")+" "+cgErr.message);}
          else{
            setCatchGroupsMap(prev=>({...prev,[form.id]:form.selectedGroupIds}));
          }
        }else{
          setCatchGroupsMap(prev=>{const c={...prev};delete c[form.id];return c;});
        }
        setCatches(prev=>prev.map(x=>x.id===data.id?data:x));
        enrichConditions(data);
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        if(form.equipment==="Flue"&&form.fly_pattern&&!DEFAULT_FLIES.includes(form.fly_pattern))addCustomFly(form.fly_pattern);
        setSelected(data);setView("detail");
      };

      const deleteCatch=async(id)=>{
        const {error}=await sb.from("catches").delete().eq("id",id);
        if(error){alert(L("error_prefix")+" "+error.message);return;}
        setCatches(prev=>prev.filter(x=>x.id!==id));
        setDelModal(null);setView("list");
      };

      const signOut=async()=>{await sb.auth.signOut();};

      const years=[...new Set(catches.map(c=>new Date(c.date).getFullYear()))].sort((a,b)=>b-a);
      const usedRivers=[...new Set(catches.map(c=>c.river))].sort();
      const sourceList=tab==="mine"?catches:publicFeed;
      const filtered=sourceList.filter(c=>{
        if(tab==="feed"&&hideOwnInFeed&&c.user_id===session.user.id)return false;
        // Feed-filter: 'all' (default) = alt jeg har tilgang til
        //              'public' = bare visibility=public
        //              <group_id> = visibility=groups OG fangsten er eksplisitt koblet til denne gruppen
        if(tab==="feed"){
          const vis=c.visibility||(c.is_public?"public":"private");
          if(feedFilter==="public"){
            if(vis!=="public")return false;
          }else if(feedFilter==="following"){
            // Kun offentlige fangster fra dem jeg følger (bokmerke-filter, ingen ny tilgang)
            if(vis!=="public")return false;
            if(!following.some(p=>p.id===c.user_id))return false;
          }else if(feedFilter!=="all"){
            // En spesifikk gruppe
            if(vis!=="groups")return false;
            const linkedGroups=catchGroupsMap[c.id]||[];
            if(!linkedGroups.includes(feedFilter))return false;
          }
        }
        if(fR!=="Alle"&&c.river!==fR)return false;
        if(fS!=="Alle"&&c.species!==fS)return false;
        if(fY!=="Alle"&&new Date(c.date).getFullYear()!==+fY)return false;
        return true;
      });

      if(loading)return <div style={S.center}><div className="spinner"/></div>;

      // Be om navn ved innlogging hvis brukeren ikke har bekreftet et navn ennå.
      // Vi sjekker name_set-flagget i databasen (settes når brukeren aktivt lagrer
      // et navn) i stedet for å gjette ut fra om navnet ligner e-posten — det
      // unngår falske treff når navnet tilfeldigvis er likt e-postprefikset.
      // nameSkipped lar brukeren hoppe over for resten av økten.
      if((!profile||!profile.name_set)&&!nameSkipped){
        return <NameCaptureView L={L} t={t} S={S} session={session} onSaved={(p)=>{setProfile(p);setNameSkipped(true);}} onSkip={()=>setNameSkipped(true)} onSignOut={signOut}/>;
      }

      const fp={fR,setFR,fS,setFS,fY,setFY,years,rivers:usedRivers};

      return (
        <div style={S.app}>
          {view==="list"&&<ListView L={L} lang={lang} catches={filtered} total={catches.length} fp={fp} S={S} t={t} tab={tab} setTab={setTab} viewMode={viewMode} switchViewMode={switchViewMode} hideOwnInFeed={hideOwnInFeed} toggleHideOwnInFeed={toggleHideOwnInFeed} myGroups={myGroups} following={following} feedFilter={feedFilter} setFeedFilter={(v)=>{setFeedFilter(v);lsSet("fl_feedFilter",v);}} feedNewCount={feedNewCount} session={session} profile={profile} initialScrollY={listScrollY} onSelect={c=>{setListScrollY(window.scrollY);setSelected(c);setView("detail")}} onViewUser={(uid)=>{if(uid&&uid!==session.user.id){setViewUserId(uid);setView("userProfile");}}} onAdd={()=>setView("add")} onStats={()=>setView("stats")} onRivers={()=>setView("rivers")} onLeaderboard={()=>setView("leaderboard")} onProfile={()=>setView("profile")} onRefresh={loadCatches} onExpandPhotos={(c,startIdx)=>setLightbox({photos:c.photos,index:startIdx||0})}/>}
          {view==="stats"&&<StatsView L={L} lang={lang} catches={catches} fp={fp} S={S} t={t} onBack={()=>setView("profile")}/>}
          {view==="rivers"&&<RiversView L={L} lang={lang} catches={catches} S={S} t={t} onBack={()=>setView("list")}/>}
          {view==="leaderboard"&&<LeaderboardView L={L} lang={lang} catches={catches} publicFeed={publicFeed} session={session} profile={profile} myGroups={myGroups} groupMembersByGroup={groupMembersByGroup} following={following} S={S} t={t} onBack={()=>setView("list")} onSelect={c=>{setSelected(c);setView("detail")}} onViewUser={(uid)=>{if(uid&&uid!==session.user.id){setViewUserId(uid);setView("userProfile");}}}/>}
          {view==="profile"&&<ProfileView L={L} lang={lang} switchLang={switchLang} session={session} profile={profile} catches={catches} myGroups={myGroups} onGroupsChange={loadMyGroups} following={following} onStats={()=>setView("stats")} onViewUser={(uid)=>{if(uid&&uid!==session.user.id){setViewUserId(uid);setView("userProfile");}}} S={S} t={t} themeKey={themeKey} switchTheme={switchTheme} onBack={()=>setView("list")} onUpdate={(p)=>setProfile(p)} onSignOut={signOut}/>}
          {view==="userProfile"&&viewUserId&&<UserProfileView L={L} lang={lang} userId={viewUserId} publicFeed={publicFeed} isFollowing={isFollowing(viewUserId)} onFollow={()=>followUser(viewUserId)} onUnfollow={()=>unfollowUser(viewUserId)} S={S} t={t} onBack={()=>setView(tab==="mine"?"list":"list")} onSelect={c=>{setSelected(c);setView("detail")}} onExpandPhotos={(c,startIdx)=>setLightbox({photos:c.photos,index:startIdx||0})}/>}
          {view==="add"&&<FormView L={L} lang={lang} allRivers={allRivers} allFlies={allFlies} prefs={prefs} profile={profile} myGroups={myGroups} S={S} t={t} onSave={addCatch} onCancel={()=>setView("list")}/>}
          {view==="detail"&&selected&&<DetailView L={L} lang={lang} c={selected} session={session} profile={profile} myGroups={myGroups} catchGroupIds={catchGroupsMap[selected.id]||[]} isFollowing={isFollowing(selected.user_id)} onFollow={()=>followUser(selected.user_id)} onUnfollow={()=>unfollowUser(selected.user_id)} onViewUser={(uid)=>{if(uid&&uid!==session.user.id){setViewUserId(uid);setView("userProfile");}}} S={S} t={t} onBack={()=>setView("list")} onEdit={()=>{setEditing({...selected});setView("edit")}} onDelete={()=>setDelModal(selected.id)}/>}
          {view==="edit"&&editing&&<FormView L={L} lang={lang} allRivers={allRivers} allFlies={allFlies} initial={editing} initialGroupIds={catchGroupsMap[editing.id]||[]} profile={profile} myGroups={myGroups} S={S} t={t} onSave={updateCatch} onCancel={()=>setView("detail")} isEdit/>}
          {delModal&&<div style={S.overlay}><div style={S.modal}>
            <p style={{fontSize:17,fontWeight:600,margin:"0 0 6px",color:t.text}}>{L("delete_catch_title")}</p>
            <p style={{fontSize:14,color:t.textMuted,margin:"0 0 20px"}}>{L("delete_warn")}</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{...S.btnSec,flex:1}} onClick={()=>setDelModal(null)}>{L("cancel")}</button>
              <button style={{...S.btnDng,flex:1}} onClick={()=>deleteCatch(delModal)}>{L("delete")}</button>
            </div>
          </div></div>}

          {inviteModal&&<div style={S.overlay}><div style={S.modal}>
            <p style={{fontSize:13,color:t.textMuted,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:0.5,fontWeight:600}}>{L("groups_invitation")}</p>
            <p style={{fontSize:19,fontWeight:700,margin:"0 0 4px",color:t.text}}>{inviteModal.group.name}</p>
            <p style={{fontSize:14,color:t.textMuted,margin:"0 0 18px"}}>{trMembers(inviteModal.group.member_count,lang)}</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{...S.btnSec,flex:1}} onClick={declineInvite}>{L("groups_decline")}</button>
              <button style={{...S.btnPri,flex:1}} onClick={acceptInvite}>{L("groups_join")}</button>
            </div>
          </div></div>}

          {lightbox&&<Lightbox photos={lightbox.photos} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
        </div>
      );
    }

    function Lightbox({photos,startIndex,onClose}){
      const[idx,setIdx]=useState(startIndex||0);
      useEffect(()=>{
        const onKey=(e)=>{
          if(e.key==="Escape")onClose();
          if(e.key==="ArrowLeft"&&idx>0)setIdx(idx-1);
          if(e.key==="ArrowRight"&&idx<photos.length-1)setIdx(idx+1);
        };
        document.addEventListener("keydown",onKey);
        return()=>document.removeEventListener("keydown",onKey);
      },[idx,photos.length,onClose]);
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>

        {photos.length>1&&<div style={{position:"absolute",bottom:"calc(20px + env(safe-area-inset-bottom))",color:"#fff",fontSize:14,opacity:.7}}>{idx+1} / {photos.length}</div>}
        {photos.length>1&&idx>0&&<button onClick={e=>{e.stopPropagation();setIdx(idx-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
        {photos.length>1&&idx<photos.length-1&&<button onClick={e=>{e.stopPropagation();setIdx(idx+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%) rotate(180deg)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
        <img src={photos[idx]} alt="" style={{maxWidth:"100%",maxHeight:"90vh",objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>
      </div>;

    function RiverInput({value,onChange,allRivers,S,t,placeholder,addLabel}){

      useEffect(()=>{const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};},[]);
      const q=query.toLowerCase().trim();const filtered=q?allRivers.filter(r=>r.toLowerCase().includes(q)):allRivers;const exactMatch=allRivers.some(r=>r.toLowerCase()===q);const showAdd=q&&!exactMatch&&q.length>=2;
