    function resizeImage(file,maxW=1600){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=ev=>{
          const img=new Image();
          img.onload=()=>{
            const canvas=document.createElement("canvas");
            let w=img.width,h=img.height;
            if(w>maxW){h=h*(maxW/w);w=maxW;}
            canvas.width=w;canvas.height=h;
            canvas.getContext("2d").drawImage(img,0,0,w,h);
            canvas.toBlob(blob=>{if(blob)resolve(blob);else reject("Blob failed");},"image/jpeg",0.82);
          };
          img.onerror=reject;
          img.src=ev.target.result;
        };
        reader.onerror=reject;
        reader.readAsDataURL(file);
      });
    }

    // ── Generate share image (1080x1350, Instagram 4:5) ──
    async function generateShareImage(c,profileData){
      const W=1080,H=1350;
      const canvas=document.createElement("canvas");
      canvas.width=W;canvas.height=H;
      const ctx=canvas.getContext("2d");

      // Helper: load image via fetch to avoid CORS-tainted canvas
      const loadImg=async(url)=>{
        const res=await fetch(url,{mode:"cors"});
        const blob=await res.blob();
        const objUrl=URL.createObjectURL(blob);
        return new Promise((resolve,reject)=>{
          const img=new Image();
          img.onload=()=>{URL.revokeObjectURL(objUrl);resolve(img);};
          img.onerror=reject;
          img.src=objUrl;
        });
      };

      // Helper: cover-fit image into rect
      const drawCover=(img,x,y,w,h)=>{
        const iw=img.width,ih=img.height;
        const scale=Math.max(w/iw,h/ih);
        const sw=w/scale,sh=h/scale;
        const sx=(iw-sw)/2,sy=(ih-sh)/2;
        ctx.drawImage(img,sx,sy,sw,sh,x,y,w,h);
      };

      // Helper: rounded rect
      const roundRect=(x,y,w,h,r)=>{
        ctx.beginPath();
        ctx.moveTo(x+r,y);
        ctx.arcTo(x+w,y,x+w,y+h,r);
        ctx.arcTo(x+w,y+h,x,y+h,r);
        ctx.arcTo(x,y+h,x,y,r);
        ctx.arcTo(x,y,x+w,y,r);
        ctx.closePath();
      };

      // 1. Draw main photo
      const photoUrl=(c.photos||[])[0];
      if(photoUrl){
        try{
          const img=await loadImg(photoUrl);
          drawCover(img,0,0,W,H);
        }catch(e){
          // Fallback: green background
          ctx.fillStyle="#1a5c3a";
          ctx.fillRect(0,0,W,H);
        }
      }else{
        ctx.fillStyle="#1a5c3a";
        ctx.fillRect(0,0,W,H);
      }

      // 2. Top gradient
      const topGrad=ctx.createLinearGradient(0,0,0,260);
      topGrad.addColorStop(0,"rgba(0,0,0,.6)");
      topGrad.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=topGrad;
      ctx.fillRect(0,0,W,260);

      // 3. Bottom gradient
      const botGrad=ctx.createLinearGradient(0,H-500,0,H);
      botGrad.addColorStop(0,"rgba(0,0,0,0)");
      botGrad.addColorStop(0.5,"rgba(0,0,0,.5)");
      botGrad.addColorStop(1,"rgba(0,0,0,.85)");
      ctx.fillStyle=botGrad;
      ctx.fillRect(0,H-500,W,500);

      // 4. Top: avatar + name + date
      const topY=90;
      const avatarSize=80;
      const avatarX=50;
      let nameX=avatarX+avatarSize+24;
      const ownerName=profileData?.display_name||profileData?.username||"";
      const avatarUrl=profileData?.avatar_url;

      // Draw avatar (image or initials)
      ctx.save();
      ctx.beginPath();
      ctx.arc(avatarX+avatarSize/2,topY+avatarSize/2,avatarSize/2,0,Math.PI*2);
      ctx.closePath();
      ctx.clip();
      if(avatarUrl){
        try{
          const aImg=await loadImg(avatarUrl);
          drawCover(aImg,avatarX,topY,avatarSize,avatarSize);
        }catch(e){
          ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
          ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
          ctx.fillStyle="#fff";
          ctx.font="bold 40px -apple-system, system-ui, sans-serif";
          ctx.textAlign="center";
          ctx.textBaseline="middle";
          ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
        }
      }else{
        ctx.fillStyle=avatarColor(profileData?.username||ownerName||"?");
        ctx.fillRect(avatarX,topY,avatarSize,avatarSize);
        ctx.fillStyle="#fff";
        ctx.font="bold 40px -apple-system, system-ui, sans-serif";
        ctx.textAlign="center";
        ctx.textBaseline="middle";
        ctx.fillText((ownerName||"?").charAt(0).toUpperCase(),avatarX+avatarSize/2,topY+avatarSize/2);
      }
      ctx.restore();

      // Name
      ctx.fillStyle="#fff";
      ctx.font="600 38px -apple-system, system-ui, sans-serif";
      ctx.textAlign="left";
      ctx.textBaseline="alphabetic";
      ctx.shadowColor="rgba(0,0,0,.6)";
      ctx.shadowBlur=8;
      ctx.fillText(ownerName,nameX,topY+44);

      // Date (right side)
      ctx.font="500 30px -apple-system, system-ui, sans-serif";
      ctx.textAlign="right";
      ctx.fillText(fmtDate(c.date),W-50,topY+44);
      ctx.shadowBlur=0;

      // 5. Bottom: title + chips
      const titleY=H-180;
      ctx.fillStyle="#fff";
      ctx.font="700 56px -apple-system, system-ui, sans-serif";
      ctx.textAlign="left";
      ctx.shadowColor="rgba(0,0,0,.7)";
      ctx.shadowBlur=10;
      const title=`${c.species} · ${c.river}${c.beat?" · "+c.beat:""}`;
      // Truncate if too long
      let displayTitle=title;
      if(ctx.measureText(displayTitle).width>W-100){
        while(ctx.measureText(displayTitle+"…").width>W-100&&displayTitle.length>10){
          displayTitle=displayTitle.slice(0,-1);
        }
        displayTitle+="…";
      }
      ctx.fillText(displayTitle,50,titleY);
      ctx.shadowBlur=0;

      // Chips
      const chips=[];
      if(c.weight!=null)chips.push({text:`${c.weight} kg`,color:"#fff"});
      if(c.length!=null)chips.push({text:`${c.length} cm`,color:"#fff"});
      chips.push({text:c.equipment,color:"#fff"});
      chips.push({text:c.released?"C&R":"Avlivet",color:c.released?"#a7f3d0":"#fecaca"});

      const chipY=H-100;
      const chipH=54;
      const chipPadding=22;
      const chipGap=10;
      ctx.font="600 26px -apple-system, system-ui, sans-serif";
      let chipX=50;
      chips.forEach(chip=>{
        const tw=ctx.measureText(chip.text).width;
        const cw=tw+chipPadding*2;
        ctx.fillStyle="rgba(255,255,255,.22)";
        roundRect(chipX,chipY,cw,chipH,12);
        ctx.fill();
        ctx.fillStyle=chip.color;
        ctx.textBaseline="middle";
        ctx.fillText(chip.text,chipX+chipPadding,chipY+chipH/2+2);
        chipX+=cw+chipGap;
      });

      return new Promise(resolve=>canvas.toBlob(b=>resolve(b),"image/jpeg",0.92));
    }

    async function shareCatch(c,profileData){
      try{
        const blob=await generateShareImage(c,profileData);
        if(!blob)throw new Error("Kunne ikke generere bilde");
        const file=new File([blob],`fangst-${c.id}.jpg`,{type:"image/jpeg"});
        const shareData={
          title:`${c.species} · ${c.river}`,
          text:`${c.species} · ${c.river}${c.beat?" · "+c.beat:""}`,
          files:[file],
        };
        if(navigator.canShare&&navigator.canShare(shareData)){
          await navigator.share(shareData);
        }else{
          // Fallback: download
          const url=URL.createObjectURL(blob);
          const a=document.createElement("a");
          a.href=url;
          a.download=`fangst-${c.id}.jpg`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        }
      }catch(e){
        if(e.name!=="AbortError"){
          alert("Kunne ikke dele: "+(e.message||"ukjent feil"));
        }
      }
    }

    // ── Avatar ──
    function Avatar({url,name,seed,size=32,t,onClick}){
      const initials=(name||"?").trim().charAt(0).toUpperCase()||"?";
      const bg=avatarColor(seed||name||"?");
      const style={width:size,height:size,borderRadius:size/2,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",background:bg,color:"#fff",fontSize:Math.round(size*0.42),fontWeight:600,fontFamily:t.font,overflow:"hidden",border:`1px solid ${t.cardBorder}`,cursor:onClick?"pointer":"default"};
      const inner=url?<img src={url} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:initials;
      if(onClick)return <button onClick={onClick} style={{...style,padding:0}}>{inner}</button>;
      return <div style={style}>{inner}</div>;
    }

    // ── LazyImage: only loads when near viewport ──
    function LazyImage({src,alt,style,onLoad}){
      const ref=useRef();
      const[shouldLoad,setShouldLoad]=useState(false);
      const[loaded,setLoaded]=useState(false);
      useEffect(()=>{
        if(!ref.current||shouldLoad)return;
        const obs=new IntersectionObserver((entries)=>{
          entries.forEach(e=>{if(e.isIntersecting){setShouldLoad(true);obs.disconnect();}});
        },{rootMargin:"200px"});
        obs.observe(ref.current);
        return()=>obs.disconnect();
      },[shouldLoad]);
      return <div ref={ref} style={{...style,position:"relative",overflow:"hidden"}}>
        {shouldLoad&&<img src={src} alt={alt||""} loading="lazy" onLoad={()=>{setLoaded(true);onLoad&&onLoad();}} style={{width:"100%",height:"100%",objectFit:"cover",opacity:loaded?1:0,transition:"opacity .2s"}}/>}
      </div>;
    }

    // ── SwipeableImages: scroll-snap horizontal carousel with dot indicators ──
    function SwipeableImages({photos,onExpand,t,style}){
      const scrollRef=useRef();
      const[idx,setIdx]=useState(0);
      const handleScroll=()=>{
        if(!scrollRef.current)return;
        const w=scrollRef.current.offsetWidth;
        const i=Math.round(scrollRef.current.scrollLeft/w);
        if(i!==idx)setIdx(i);
      };
      return(<div style={{...style,overflow:"hidden"}}>
        <div ref={scrollRef} onScroll={handleScroll} style={{display:"flex",overflowX:"auto",overflowY:"hidden",scrollSnapType:"x mandatory",WebkitOverflowScrolling:"touch",width:"100%",height:"100%",scrollbarWidth:"none"}}>
          {photos.map((p,i)=>(
            <div key={i} style={{width:"100%",height:"100%",scrollSnapAlign:"start",flexShrink:0,position:"relative"}}>
              <LazyImage src={p} style={{position:"absolute",inset:0}}/>
            </div>
          ))}
        </div>
        {photos.length>1&&(
          <div style={{position:"absolute",bottom:110,left:"50%",transform:"translateX(-50%)",display:"flex",gap:6,zIndex:4,pointerEvents:"none"}}>
            {photos.map((_,i)=>(
              <div key={i} style={{width:6,height:6,borderRadius:3,background:i===idx?"#fff":"rgba(255,255,255,.45)",boxShadow:"0 1px 2px rgba(0,0,0,.4)",transition:"background .2s"}}/>
            ))}
          </div>
        )}
        {onExpand&&(
          <button onClick={(e)=>{e.stopPropagation();onExpand(idx);}} style={{position:"absolute",top:"50%",right:12,transform:"translateY(-50%)",width:38,height:38,borderRadius:19,background:"rgba(0,0,0,.45)",border:"none",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",backdropFilter:"blur(8px)",zIndex:4,opacity:.85}}>
            {I.expand()}
          </button>
        )}
      </div>);
    }

    // ══════════════════════════════════════
    // App Root
    // ══════════════════════════════════════
    function App(){
      const[session,setSession]=useState(null);
      const[loading,setLoading]=useState(true);
      const[themeKey,setThemeKey]=useState(lsGet("fl_theme")||"dark");
      const t=THEMES[themeKey];
      const S=makeStyles(t);

      useEffect(()=>{
        // Body-bakgrunn matches temaet (synes på sidene utenfor 480px-containeren)
        const bgColor=themeKey==="dark"?"#0f1a17":themeKey==="coastal"?"#faf8f4":"#f6f9f4";
        document.body.style.background=bgColor;
        document.documentElement.style.background=bgColor;
        // theme-color meta for browser-chrome
        const meta=document.querySelector('meta[name="theme-color"]');
        if(meta)meta.setAttribute("content",bgColor);
      },[themeKey]);

      useEffect(()=>{
        sb.auth.getSession().then(({data})=>{setSession(data.session);setLoading(false);});
        const {data:listener}=sb.auth.onAuthStateChange((_e,session)=>{setSession(session);});
        return()=>listener.subscription.unsubscribe();
      },[]);

      const switchTheme=(k)=>{setThemeKey(k);lsSet("fl_theme",k);};

      if(loading)return <div style={S.center}><div className="spinner"/></div>;
      if(!session)return <AuthView S={S} t={t}/>;
      return <MainApp session={session} S={S} t={t} themeKey={themeKey} switchTheme={switchTheme}/>;
    }

    // ══════════════════════════════════════
    // Auth View — OTP Code (works in PWA)
    // ══════════════════════════════════════
    function AuthView({S,t}){
      const[email,setEmail]=useState("");
      const[displayName,setDisplayName]=useState("");
      const[code,setCode]=useState("");
      const[err,setErr]=useState("");
      const[busy,setBusy]=useState(false);
      const[step,setStep]=useState("email");

      const sendCode=async()=>{
        setErr("");setBusy(true);
        try{
          const {error}=await sb.auth.signInWithOtp({
            email,
            options:{
              data:displayName?{display_name:displayName}:undefined,
              shouldCreateUser:true,
            }
          });
          if(error)throw error;
          setStep("code");
        }catch(e){setErr(e.message||"Noe gikk galt");}
        setBusy(false);
      };

      const verifyCode=async()=>{
        setErr("");setBusy(true);
        try{
          const {error}=await sb.auth.verifyOtp({
            email,
            token:code.trim(),
            type:"email",
          });
          if(error)throw error;
        }catch(e){setErr(e.message||"Feil kode. Prøv igjen.");}
        setBusy(false);
      };

      if(step==="code"){
        return (
          <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
            <div style={{textAlign:"center",marginBottom:30}}>
              <img src="/icons/icon-192x192.png" alt="Fangstlogg" style={{width:80,height:80,borderRadius:18,boxShadow:t.btnShadow}}/>
              <h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>Skriv inn koden</h1>
            </div>
            <div style={{...S.sec,width:"100%",maxWidth:340}}>
              <p style={{fontSize:15,color:t.textSec,margin:"0 0 4px",textAlign:"center",lineHeight:1.5}}>Vi har sendt en kode til</p>
              <p style={{fontSize:15,color:t.primary,fontWeight:600,margin:"0 0 16px",textAlign:"center"}}>{email}</p>
              <input
                style={{...S.inp,fontSize:24,textAlign:"center",letterSpacing:6,fontWeight:600,marginBottom:14}}
                inputMode="numeric"
                autoComplete="one-time-code"
                pattern="[0-9]*"
                maxLength={8}
                placeholder="00000000"
                value={code}
                onChange={e=>setCode(e.target.value.replace(/\D/g,""))}
                autoFocus
              />
              {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
              <button style={{...S.btnPriFull,opacity:(busy||code.length<6)?.6:1,marginBottom:8}} disabled={busy||code.length<6} onClick={verifyCode}>
                {busy?"Sjekker..." : "Logg inn"}
              </button>
              <button style={{...S.btnSec,fontSize:14,width:"100%"}} onClick={()=>{setStep("email");setCode("");setErr("");}}>Bruk en annen e-post</button>
            </div>
          </div>
        );
      }

      return (
        <div className="safe-top safe-bottom" style={{...S.app,...S.center,minHeight:"100vh"}}>
          <div style={{textAlign:"center",marginBottom:30}}>
            <img src="/icons/icon-192x192.png" alt="Fangstlogg" style={{width:96,height:96,borderRadius:22,boxShadow:t.btnShadow}}/>
            <h1 style={{fontFamily:t.titleFont,fontSize:32,fontWeight:700,color:t.text,margin:"14px 0 4px"}}>Fangstlogg</h1>
            <p style={{fontSize:15,color:t.textMuted,margin:0}}>Personlig fangstlogg for laksefiske</p>
            <p style={{fontSize:11,color:t.textMuted,margin:"6px 0 0",opacity:.6}}>v37</p>
          </div>
          <div style={{...S.sec,width:"100%",maxWidth:340}}>
            <p style={{fontSize:15,color:t.textSec,margin:"0 0 16px",textAlign:"center",lineHeight:1.5}}>Skriv inn e-posten din, så sender vi deg en innloggingskode.</p>
            <label style={{fontSize:13,fontWeight:600,color:t.textSec}}>Navn (kun ny bruker)</label>
            <input style={{...S.inp,marginTop:4,marginBottom:10}} placeholder="Magnus" value={displayName} onChange={e=>setDisplayName(e.target.value)}/>
            <label style={{fontSize:13,fontWeight:600,color:t.textSec}}>E-post</label>
            <input style={{...S.inp,marginTop:4,marginBottom:14}} type="email" inputMode="email" autoComplete="email" placeholder="navn@example.com" value={email} onChange={e=>setEmail(e.target.value)}/>
            {err&&<p style={{color:t.danger,fontSize:14,marginBottom:10}}>{err}</p>}
            <button style={{...S.btnPriFull,opacity:busy?.6:1}} disabled={busy||!email} onClick={sendCode}>
              {busy?"Sender..." : "Send kode"}
            </button>
          </div>
        </div>
      );
    }

    // ══════════════════════════════════════
    // Main App (authenticated)
    // ══════════════════════════════════════
    function MainApp({session,S,t,themeKey,switchTheme}){
      const[catches,setCatches]=useState([]);
      const[publicFeed,setPublicFeed]=useState([]);
      const[profile,setProfile]=useState(null);
      const[customRivers,setCustomRivers]=useState(lsGet("fl_rivers")||[]);
      const[prefs,setPrefs]=useState(lsGet("fl_prefs")||{lastRiver:"",lastEquipment:"Flue"});
      const[view,setView]=useState("list");
      const[tab,setTab]=useState("mine");
      const[viewMode,setViewMode]=useState(lsGet("fl_viewMode")||"compact");
      const[selected,setSelected]=useState(null);
      const[editing,setEditing]=useState(null);
      const[loading,setLoading]=useState(true);
      const[fR,setFR]=useState("Alle");
      const[fS,setFS]=useState("Alle");
      const[fY,setFY]=useState("Alle");
      const[delModal,setDelModal]=useState(null);
      const[lightbox,setLightbox]=useState(null);
      const allRivers=[...new Set([...DEFAULT_RIVERS,...customRivers])].sort((a,b)=>a.localeCompare(b,"nb"));

      const loadCatches=async()=>{
        const {data:mine}=await sb.from("catches").select("*").eq("user_id",session.user.id).order("date",{ascending:false});
        setCatches(mine||[]);
        const {data:pub}=await sb.from("catches").select("*, profiles(display_name, username, avatar_url)").eq("is_public",true).order("date",{ascending:false}).limit(100);
        setPublicFeed(pub||[]);
        const {data:prof}=await sb.from("profiles").select("*").eq("id",session.user.id).single();
        setProfile(prof||null);
        setLoading(false);
      };

      useEffect(()=>{loadCatches();},[]);

      const savePrefs=(p)=>{setPrefs(p);lsSet("fl_prefs",p);};
      const switchViewMode=(m)=>{setViewMode(m);lsSet("fl_viewMode",m);};
      const addCustomRiver=(name)=>{if(!customRivers.includes(name)){const next=[...customRivers,name];setCustomRivers(next);lsSet("fl_rivers",next);}};

      const uploadPhotos=async(photoFiles)=>{
        const urls=[];
        for(const file of photoFiles){
          const ext="jpg";
          const filename=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
          const {error}=await sb.storage.from("catch-photos").upload(filename,file,{contentType:"image/jpeg"});
          if(error){console.error(error);continue;}
          const {data}=sb.storage.from("catch-photos").getPublicUrl(filename);
          urls.push(data.publicUrl);
        }
        return urls;
      };

      const addCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          user_id:session.user.id,
          is_public:form.is_public,
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
        };
        const {data,error}=await sb.from("catches").insert(row).select().single();
        if(error){alert("Feil: "+error.message);return;}
        setCatches(prev=>[data,...prev]);
        savePrefs({lastRiver:form.river,lastEquipment:form.equipment});
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        setView("list");
      };

      const updateCatch=async(form,newPhotoFiles)=>{
        let photoUrls=form.photos||[];
        if(newPhotoFiles.length>0){
          const uploaded=await uploadPhotos(newPhotoFiles);
          photoUrls=[...photoUrls,...uploaded];
        }
        const row={
          is_public:form.is_public,
          date:form.date,
          time:form.time||null,
          river:form.river,
          beat:form.beat||null,
          species:form.species,
          length:parseNum(form.length),
          weight:parseNum(form.weight),
          equipment:form.equipment,
          released:form.released,
          description:form.description||null,
          photos:photoUrls,
        };
        const {data,error}=await sb.from("catches").update(row).eq("id",form.id).select().single();
        if(error){alert("Feil: "+error.message);return;}
        setCatches(prev=>prev.map(x=>x.id===data.id?data:x));
        if(!DEFAULT_RIVERS.includes(form.river))addCustomRiver(form.river);
        setSelected(data);setView("detail");
      };

      const deleteCatch=async(id)=>{
        const {error}=await sb.from("catches").delete().eq("id",id);
        if(error){alert("Feil: "+error.message);return;}
        setCatches(prev=>prev.filter(x=>x.id!==id));
        setDelModal(null);setView("list");
      };

      const signOut=async()=>{await sb.auth.signOut();};

      const years=[...new Set(catches.map(c=>new Date(c.date).getFullYear()))].sort((a,b)=>b-a);
      const usedRivers=[...new Set(catches.map(c=>c.river))].sort();
      const sourceList=tab==="mine"?catches:publicFeed;
      const filtered=sourceList.filter(c=>{
        if(fR!=="Alle"&&c.river!==fR)return false;
        if(fS!=="Alle"&&c.species!==fS)return false;
        if(fY!=="Alle"&&new Date(c.date).getFullYear()!==+fY)return false;
        return true;
      });

      if(loading)return <div style={S.center}><div className="spinner"/></div>;

      const fp={fR,setFR,fS,setFS,fY,setFY,years,rivers:usedRivers};

      return (
        <div style={S.app}>
          {view==="list"&&<ListView catches={filtered} total={catches.length} fp={fp} S={S} t={t} tab={tab} setTab={setTab} viewMode={viewMode} switchViewMode={switchViewMode} session={session} profile={profile} onSelect={c=>{setSelected(c);setView("detail")}} onAdd={()=>setView("add")} onStats={()=>setView("stats")} onProfile={()=>setView("profile")} onRefresh={loadCatches} onExpandPhotos={(c,startIdx)=>setLightbox({photos:c.photos,index:startIdx||0})}/>}
          {view==="stats"&&<StatsView catches={catches} fp={fp} S={S} t={t} onBack={()=>setView("list")}/>}
          {view==="profile"&&<ProfileView session={session} profile={profile} catches={catches} S={S} t={t} themeKey={themeKey} switchTheme={switchTheme} onBack={()=>setView("list")} onUpdate={(p)=>setProfile(p)} onSignOut={signOut}/>}
          {view==="add"&&<FormView allRivers={allRivers} prefs={prefs} profile={profile} S={S} t={t} onSave={addCatch} onCancel={()=>setView("list")}/>}
          {view==="detail"&&selected&&<DetailView c={selected} session={session} profile={profile} S={S} t={t} onBack={()=>setView("list")} onEdit={()=>{setEditing({...selected});setView("edit")}} onDelete={()=>setDelModal(selected.id)}/>}
          {view==="edit"&&editing&&<FormView allRivers={allRivers} initial={editing} profile={profile} S={S} t={t} onSave={updateCatch} onCancel={()=>setView("detail")} isEdit/>}
          {delModal&&<div style={S.overlay}><div style={S.modal}>
            <p style={{fontSize:17,fontWeight:600,margin:"0 0 6px",color:t.text}}>Slette fangst?</p>
            <p style={{fontSize:14,color:t.textMuted,margin:"0 0 20px"}}>Kan ikke angres.</p>
            <div style={{display:"flex",gap:10}}>
              <button style={{...S.btnSec,flex:1}} onClick={()=>setDelModal(null)}>Avbryt</button>
              <button style={{...S.btnDng,flex:1}} onClick={()=>deleteCatch(delModal)}>Slett</button>
            </div>
          </div></div>}

          {lightbox&&<Lightbox photos={lightbox.photos} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
        </div>
      );
    }

    // ── Lightbox ──
    function Lightbox({photos,startIndex,onClose}){
      const[idx,setIdx]=useState(startIndex||0);
      useEffect(()=>{
        const onKey=(e)=>{
          if(e.key==="Escape")onClose();
          if(e.key==="ArrowLeft"&&idx>0)setIdx(idx-1);
          if(e.key==="ArrowRight"&&idx<photos.length-1)setIdx(idx+1);
        };
        document.addEventListener("keydown",onKey);
        return()=>document.removeEventListener("keydown",onKey);
      },[idx,photos.length,onClose]);
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
        <button onClick={onClose} style={{position:"absolute",top:"calc(12px + env(safe-area-inset-top))",right:16,background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",zIndex:201}}>{I.x()}</button>
        {photos.length>1&&<div style={{position:"absolute",bottom:"calc(20px + env(safe-area-inset-bottom))",color:"#fff",fontSize:14,opacity:.7}}>{idx+1} / {photos.length}</div>}
        {photos.length>1&&idx>0&&<button onClick={e=>{e.stopPropagation();setIdx(idx-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
        {photos.length>1&&idx<photos.length-1&&<button onClick={e=>{e.stopPropagation();setIdx(idx+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%) rotate(180deg)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}

    // ── Components ──
    function Filters({fp,S,t}){
      return(<div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
        <select style={S.sel} value={fp.fR} onChange={e=>fp.setFR(e.target.value)}><option value="Alle">Alle elver</option>{fp.rivers.map(r=><option key={r}>{r}</option>)}</select>
        <select style={S.sel} value={fp.fY} onChange={e=>fp.setFY(e.target.value)}><option value="Alle">Alle år</option>{fp.years.map(y=><option key={y}>{y}</option>)}</select>
        <select style={S.sel} value={fp.fS} onChange={e=>fp.setFS(e.target.value)}><option value="Alle">Alle arter</option>{SPECIES.map(s=><option key={s}>{s}</option>)}</select>
      </div>);
    }

    function RiverInput({value,onChange,allRivers,S,t}){
      const[query,setQuery]=useState(value||"");const[open,setOpen]=useState(false);const wrapRef=useRef();
      useEffect(()=>{setQuery(value||"");},[value]);
      useEffect(()=>{const h=e=>{if(wrapRef.current&&!wrapRef.current.contains(e.target))setOpen(false);};document.addEventListener("mousedown",h);document.addEventListener("touchstart",h);return()=>{document.removeEventListener("mousedown",h);document.removeEventListener("touchstart",h);};},[]);
      const q=query.toLowerCase().trim();const filtered=q?allRivers.filter(r=>r.toLowerCase().includes(q)):allRivers;const exactMatch=allRivers.some(r=>r.toLowerCase()===q);const showAdd=q&&!exactMatch&&q.length>=2;
      const select=r=>{setQuery(r);onChange(r);setOpen(false);};
      return(<div ref={wrapRef} style={{position:"relative"}}><div style={{position:"relative"}}><div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:t.textMuted,pointerEvents:"none"}}>{I.search()}</div><input style={{...S.inp,paddingLeft:34,paddingRight:query?34:12}} placeholder="Søk eller skriv elvenavn..." value={query} onChange={e=>{setQuery(e.target.value);onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)}/>{query&&<button style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:t.textMuted,padding:4}} onClick={()=>{setQuery("");onChange("");setOpen(false);}}>{I.x()}</button>}</div>
        {open&&(filtered.length>0||showAdd)&&(<div style={S.dropdown}><div style={{maxHeight:200,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>{filtered.map(r=><div key={r} style={S.dropItem} onMouseDown={()=>select(r)} onTouchEnd={e=>{e.preventDefault();select(r);}}>{r}</div>)}{showAdd&&<div style={{...S.dropItem,color:t.primary,fontWeight:600}} onMouseDown={()=>select(query.trim())} onTouchEnd={e=>{e.preventDefault();select(query.trim());}}>+ Legg til «{query.trim()}»</div>}</div></div>)}
      </div>);
    }

    function NumInput({value,onChange,placeholder,S}){
      const[display,setDisplay]=useState(value!=null&&value!==""?String(value):"");const skip=useRef(false);
      useEffect(()=>{if(skip.current){skip.current=false;return;}setDisplay(value!=null&&value!==undefined&&value!==""?String(value):"");},[value]);
      const handleChange=e=>{let v=e.target.value.replace(/[^0-9.,]/g,"");const parts=v.split(/[.,]/);if(parts.length>2)v=parts[0]+"."+parts.slice(1).join("");setDisplay(v);skip.current=true;onChange(parseNum(v));};
      return <input style={S.inp} inputMode="decimal" placeholder={placeholder} value={display} onChange={handleChange}/>;
    }

    function Lbl({t:text,th}){return <label style={{display:"block",fontSize:13,fontWeight:600,color:th.textSec,marginBottom:2,marginTop:10}}>{text}</label>;}

    // ── ListView ──
    function ListView({catches,total,fp,S,t,tab,setTab,viewMode,switchViewMode,session,profile,onSelect,onAdd,onStats,onProfile,onRefresh,onExpandPhotos}){
      const sorted=[...catches].sort((a,b)=>new Date(b.date)-new Date(a.date));
      const[pullY,setPullY]=useState(0);
      const[refreshing,setRefreshing]=useState(false);
      const startY=useRef(0);
      const isPulling=useRef(false);
      const PULL_THRESHOLD=70;
      const MAX_PULL=120;

      const handleTouchStart=(e)=>{
        if(window.scrollY<=0&&!refreshing){
          startY.current=e.touches[0].clientY;
          isPulling.current=true;
        }
      };
      const handleTouchMove=(e)=>{
        if(!isPulling.current||refreshing)return;
        const diff=e.touches[0].clientY-startY.current;
        if(diff>0&&window.scrollY<=0){
          setPullY(Math.min(diff*0.5,MAX_PULL));
        }else{
          isPulling.current=false;
          setPullY(0);
        }
      };
      const handleTouchEnd=async()=>{
        if(!isPulling.current)return;
        isPulling.current=false;
        if(pullY>=PULL_THRESHOLD){
          setRefreshing(true);
          setPullY(50);
          try{await onRefresh();}catch(e){console.error(e);}
          setRefreshing(false);
          setPullY(0);
        }else{
          setPullY(0);
        }
      };

      const pullProgress=Math.min(pullY/PULL_THRESHOLD,1);

      return(<div className="safe-top safe-bottom" style={S.page} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
        {(pullY>0||refreshing)&&(
          <div style={{position:"absolute",top:0,left:0,right:0,display:"flex",justifyContent:"center",alignItems:"center",height:pullY,pointerEvents:"none",zIndex:10}}>
            <div style={{width:32,height:32,borderRadius:16,border:`3px solid ${t.cardBorder}`,borderTopColor:t.primary,opacity:refreshing?1:pullProgress,transform:refreshing?"none":`rotate(${pullProgress*360}deg)`,animation:refreshing?"spin 0.8s linear infinite":"none"}}/>
          </div>
        )}
        <div style={{transform:`translateY(${pullY}px)`,transition:isPulling.current?"none":"transform 0.2s"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div><h1 style={{fontFamily:t.titleFont,fontSize:28,fontWeight:700,color:t.text,margin:0}}>Fangstlogg</h1><p style={{fontSize:14,color:t.textMuted,margin:"2px 0 0"}}>{tab==="mine"?`${total} fangst${total!==1?"er":""}`:"Felles feed"}</p></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button style={S.circBtn} onClick={onStats}>{I.chart()}</button>
            <button style={S.circPri} onClick={onAdd}>{I.plus()}</button>
            <Avatar url={profile?.avatar_url} name={profile?.display_name||profile?.username} seed={profile?.username||session.user.id} size={44} t={t} onClick={onProfile}/>
          </div>
        </div>
        <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
          <div style={{...S.tabBar,marginBottom:0,flex:1}}>
            <button style={tab==="mine"?S.tabActive:S.tab} onClick={()=>setTab("mine")}>Mine fangster</button>
            <button style={tab==="feed"?S.tabActive:S.tab} onClick={()=>setTab("feed")}>Felles feed</button>
          </div>
          <button onClick={()=>switchViewMode(viewMode==="compact"?"large":"compact")} style={{width:42,height:42,borderRadius:11,background:t.cardBg,color:t.primary,border:`1px solid ${t.cardBorder}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
            {viewMode==="compact"?I.grid():I.list()}
          </button>
        </div>
        <Filters fp={fp} S={S} t={t}/>
        {sorted.length===0?(<div style={{textAlign:"center",padding:"50px 20px"}}>{I.fish(44,t.textMuted)}<p style={{marginTop:10,color:t.textMuted,fontSize:15}}>{tab==="mine"?(total===0?"Ingen fangster ennå.":"Ingen treff."):"Ingen offentlige fangster ennå."}</p></div>):(
          <div style={{display:"flex",flexDirection:"column",gap:viewMode==="large"?14:8}}>
            {sorted.map(c=>viewMode==="large"
              ? <CatchCardLarge key={c.id} c={c} S={S} t={t} showOwner={tab==="feed"} currentUserId={session.user.id} onClick={()=>onSelect(c)} onExpandPhotos={(idx)=>onExpandPhotos(c,idx)}/>
              : <CatchCard key={c.id} c={c} S={S} t={t} showOwner={tab==="feed"} currentUserId={session.user.id} onClick={()=>onSelect(c)}/>
            )}
          </div>
        )}
        <div style={{marginTop:30,textAlign:"center"}}>
          <p style={{fontSize:11,color:t.textMuted,opacity:.5,margin:0}}>v37</p>
        </div>
        </div>
      </div>);
    }

    function CatchCard({c,S,t,showOwner,currentUserId,onClick}){
      const photos=c.photos||[];
      const thumb=photos.length>0?photos[0]:null;
      const isOwn=c.user_id===currentUserId;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      const displayedName=isOwn?(ownerName?`${ownerName} (deg)`:"Du"):ownerName;
      return(<div style={S.card} onClick={onClick}>
        {thumb?<LazyImage src={thumb} style={S.thumb}/>:<div style={S.thumbNone}>{I.fish(24,t.textMuted)}</div>}
        <div style={{flex:1,minWidth:0}}>
          {showOwner?(
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
              <Avatar url={avatarUrl} name={ownerName} seed={seed} size={26} t={t}/>
              <span style={{fontSize:14,fontWeight:600,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:1}}>{displayedName}</span>
              <span style={{fontSize:12,color:t.textMuted,flexShrink:0}}>{fmtDate(c.date)}</span>

          ):(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
              <span style={{fontSize:12,color:t.textMuted}}>{fmtDate(c.date)}</span>
              {c.is_public&&<span style={{fontSize:11,color:t.primary,display:"inline-flex",alignItems:"center",gap:3}}>{I.world()} Delt</span>}
            </div>
          )}
          <div style={{fontSize:14,color:t.textSec,marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.species} · {c.river}{c.beat?` · ${c.beat}`:""}</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {c.weight!=null&&<span style={S.chip}>{c.weight} kg</span>}
            {c.length!=null&&<span style={S.chip}>{c.length} cm</span>}
            <span style={S.chip}>{c.equipment}</span>
            <span style={{...S.chip,display:"inline-flex",alignItems:"center",gap:3,color:c.released?t.released:t.kept}}>{I.rel(c.released)}{c.released?"C&R":"Avlivet"}</span>
            {photos.length>1&&<span style={S.chip}>{photos.length} bilder</span>}
          </div>
        </div>
      </div>);

    function CatchCardLarge({c,S,t,showOwner,currentUserId,onClick,onExpandPhotos}){

        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

    // ── ProfileView ──
    function ProfileView({session,profile,catches,S,t,themeKey,switchTheme,onBack,onUpdate,onSignOut}){
      const fileRef=useRef();
      const[displayName,setDisplayName]=useState(profile?.display_name||"");
      const[defaultPublic,setDefaultPublic]=useState(profile?.default_public||false);
      const[avatarUrl,setAvatarUrl]=useState(profile?.avatar_url||null);
      const[saving,setSaving]=useState(false);
      const[uploading,setUploading]=useState(false);
      const[msg,setMsg]=useState("");

      const stats={
        total:catches.length,
        shared:catches.filter(c=>c.is_public).length,
        biggest:catches.reduce((max,c)=>(c.weight!=null&&c.weight>max?c.weight:max),0),
      };

      const showMsg=(m,isErr)=>{setMsg(m);setTimeout(()=>setMsg(""),isErr?4000:2000);};

      const saveName=async()=>{
        const name=displayName.trim();
        if(!name)return;
        setSaving(true);setMsg("");
        const {data,error}=await sb.from("profiles").update({display_name:name}).eq("id",session.user.id).select().single();
        setSaving(false);
        if(error){showMsg("Feil: "+error.message,true);return;}
        onUpdate(data);
        showMsg("Navn lagret");
      };

      const saveDefaultPublic=async(val)=>{
        setDefaultPublic(val);
        const {data,error}=await sb.from("profiles").update({default_public:val}).eq("id",session.user.id).select().single();
        if(error){showMsg("Feil: "+error.message,true);setDefaultPublic(!val);return;}
        if(data)onUpdate(data);
      };

      const handleAvatar=async(e)=>{
        const file=e.target.files?.[0];
        if(!file)return;
        setUploading(true);setMsg("");
        try{
          const blob=await resizeImage(file,400);
          const filename=`${session.user.id}/${Date.now()}.jpg`;
          const {error:upErr}=await sb.storage.from("avatars").upload(filename,blob,{contentType:"image/jpeg",upsert:false});
          if(upErr)throw upErr;
          const {data:urlData}=sb.storage.from("avatars").getPublicUrl(filename);
          const newUrl=urlData.publicUrl;
          if(profile?.avatar_url){
            const m=profile.avatar_url.match(/\/avatars\/(.+)$/);
            if(m&&m[1])await sb.storage.from("avatars").remove([m[1]]);
          }
          const {data,error}=await sb.from("profiles").update({avatar_url:newUrl}).eq("id",session.user.id).select().single();
          if(error)throw error;
          setAvatarUrl(newUrl);
          onUpdate(data);
          showMsg("Bilde oppdatert");
        }catch(err){
          showMsg("Feil: "+(err.message||"ukjent"),true);
        }
        setUploading(false);
        e.target.value="";
      };

      const nameUnchanged=displayName.trim()===(profile?.display_name||"");

      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}>
          <button style={S.backBtn} onClick={onBack}>{I.back()}</button>
        </div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 18px"}}>Profil</h2>

        <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginBottom:22}}>
          <div style={{position:"relative"}}>
            <Avatar url={avatarUrl} name={profile?.display_name||profile?.username} seed={profile?.username||session.user.id} size={96} t={t}/>
            <button onClick={()=>fileRef.current?.click()} disabled={uploading} style={{position:"absolute",bottom:-2,right:-2,width:34,height:34,borderRadius:17,border:`2px solid ${t.cardBg}`,background:t.primary,color:t.name==="Mørk"?"#0f1a17":"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,boxShadow:t.btnShadow}}>
              {uploading?<div className="spinner" style={{width:14,height:14,borderWidth:2}}/>:I.edit()}
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={handleAvatar} style={{display:"none"}}/>
          </div>
          <p style={{fontSize:20,fontWeight:600,color:t.text,margin:"12px 0 0"}}>{profile?.display_name||profile?.username||"—"}</p>
          <p style={{fontSize:14,color:t.textMuted,margin:"2px 0 0"}}>{session.user.email}</p>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.total}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>Fangster</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.shared}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>Delt</p>
          </div>
          <div style={{background:t.cardBg,borderRadius:14,padding:"14px 8px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}>
            <p style={{fontSize:24,fontWeight:700,color:t.primary,margin:0,fontFamily:t.titleFont}}>{stats.biggest||"—"}</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>Største (kg)</p>
          </div>
        </div>

        <div style={S.sec}>
          <p style={S.secT}>Visningsnavn</p>
          <input value={displayName} onChange={e=>setDisplayName(e.target.value)} style={S.inp}/>
          <button onClick={saveName} disabled={saving||!displayName.trim()||nameUnchanged} style={{...S.btnPriFull,marginTop:10,opacity:(saving||!displayName.trim()||nameUnchanged)?.45:1}}>
            {saving?"Lagrer...":"Lagre navn"}
          </button>
          {profile?.username&&<p style={{fontSize:13,color:t.textMuted,margin:"10px 0 0"}}>Brukernavn: {profile.username}</p>}
        </div>

        <div style={{...S.sec,display:"flex",alignItems:"center",gap:12}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:15,fontWeight:600,color:t.text,margin:0}}>Del nye fangster som default</p>
            <p style={{fontSize:12,color:t.textMuted,margin:"3px 0 0",lineHeight:1.4}}>Nye fangster blir automatisk synlig i felles feed. Du kan fortsatt overstyre på hver enkelt fangst.</p>
          </div>
          <button onClick={()=>saveDefaultPublic(!defaultPublic)} style={{width:46,height:26,borderRadius:13,border:"none",background:defaultPublic?t.primary:t.inputBorder,position:"relative",cursor:"pointer",flexShrink:0,transition:"background .2s"}}>
            <div style={{position:"absolute",top:3,left:defaultPublic?23:3,width:20,height:20,borderRadius:10,background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
          </button>
        </div>

        <div style={S.sec}>
          <p style={S.secT}>Tema</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {Object.entries(THEMES).map(([k,th])=>(
              <button key={k} onClick={()=>switchTheme(k)} style={{padding:"10px 8px",borderRadius:10,border:k===themeKey?`2px solid ${t.primary}`:`1px solid ${t.inputBorder}`,background:k===themeKey?t.primaryLight:t.cardBg,fontSize:14,fontWeight:k===themeKey?600:500,color:k===themeKey?t.primary:t.textSec,fontFamily:t.font,cursor:"pointer"}}>{th.name}</button>
            ))}
          </div>
        </div>

        {msg&&<p style={{fontSize:14,color:msg.startsWith("Feil")?t.danger:t.primary,textAlign:"center",margin:"0 0 14px",fontWeight:500}}>{msg}</p>}

        <button onClick={onSignOut} style={{...S.btnSec,width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:6}}>{I.logout()} Logg ut</button>
        <div style={{height:30}}/>
      </div>);
    }

    // ── DetailView ──
    function DetailView({c,session,S,t,onBack,onEdit,onDelete}){
      const[lightbox,setLightbox]=useState(null);
      const photos=c.photos||[];
      const isOwn=c.user_id===session.user.id;
      const ownerName=c.profiles?.display_name||c.profiles?.username||"";
      const avatarUrl=c.profiles?.avatar_url;
      const seed=c.profiles?.username||c.user_id;
      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}>
          <button style={S.backBtn} onClick={onBack}>{I.back()}</button>
          {isOwn&&<div style={{display:"flex",gap:8}}><button style={S.smBtn} onClick={onEdit}>{I.edit()}</button><button style={{...S.smBtn,color:t.danger}} onClick={onDelete}>{I.trash()}</button></div>}
        </div>
        {photos.length===1&&<div style={{borderRadius:14,overflow:"hidden",marginBottom:14,aspectRatio:"3/4",cursor:"pointer"}} onClick={()=>setLightbox(0)}><img src={photos[0]} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>}
        {photos.length>1&&<div className="photo-scroll" style={{marginBottom:14}}>{photos.map((p,i)=>(<div key={i} style={{width:"80%",aspectRatio:"3/4",borderRadius:14,overflow:"hidden",cursor:"pointer"}} onClick={()=>setLightbox(i)}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>))}</div>}
        {!isOwn&&ownerName&&<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
          <Avatar url={avatarUrl} name={ownerName} seed={seed} size={36} t={t}/>
          <span style={{fontSize:15,fontWeight:600,color:t.text}}>{ownerName}</span>
        </div>}
        <h2 style={{fontFamily:t.titleFont,fontSize:24,fontWeight:700,color:t.text,margin:"0 0 4px"}}>{c.species}</h2>
        <p style={{fontSize:16,color:t.textSec,margin:"0 0 2px",fontWeight:500}}>{c.river}{c.beat?` — ${c.beat}`:""}</p>
        <p style={{fontSize:14,color:t.textMuted,margin:"0 0 16px"}}>{fmtDate(c.date)}{c.time?` kl. ${c.time.slice(0,5)}`:""}{isOwn&&" · "}{isOwn&&(c.is_public?<span style={{color:t.primary}}>● Delt i feed</span>:<span>● Privat</span>)}</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
          {c.weight!=null&&<SBox v={c.weight} l="kg" t={t}/>}{c.length!=null&&<SBox v={c.length} l="cm" t={t}/>}
          <SBox v={c.equipment} l="Redskap" t={t}/><SBox v={c.released?"Ja":"Nei"} l="Gjenutsatt" t={t} color={c.released?t.released:t.kept}/>
        </div>
        {c.description&&<div style={{background:t.cardBg,borderRadius:12,padding:14,border:`1px solid ${t.cardBorder}`}}><p style={{fontSize:14,fontWeight:600,color:t.text,margin:"0 0 6px"}}>Notat</p><p style={{fontSize:15,color:t.textSec,lineHeight:1.6,margin:0}}>{c.description}</p></div>}
        {lightbox!==null&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setLightbox(null)}>
          <button onClick={()=>setLightbox(null)} style={{position:"absolute",top:"calc(12px + env(safe-area-inset-top))",right:16,background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff",zIndex:201}}>{I.x()}</button>
          {photos.length>1&&<div style={{position:"absolute",bottom:"calc(20px + env(safe-area-inset-bottom))",color:"#fff",fontSize:14,opacity:.7}}>{lightbox+1} / {photos.length}</div>}
          {photos.length>1&&lightbox>0&&<button onClick={e=>{e.stopPropagation();setLightbox(lightbox-1);}} style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
          {photos.length>1&&lightbox<photos.length-1&&<button onClick={e=>{e.stopPropagation();setLightbox(lightbox+1);}} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%) rotate(180deg)",background:"rgba(255,255,255,.15)",border:"none",borderRadius:20,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.back()}</button>}
          <img src={photos[lightbox]} alt="" style={{maxWidth:"100%",maxHeight:"90vh",objectFit:"contain"}} onClick={e=>e.stopPropagation()}/>
        </div>}
      </div>);
    }

    // For Supabase Storage CORS — the avatar/photo bucket needs to allow CORS for the canvas to work.
    // If we hit a tainted-canvas error, the photos must be served with appropriate CORS headers.

    function SBox({v,l,t,color}){return <div style={{background:t.cardBg,borderRadius:12,padding:"14px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:20,fontWeight:700,color:color||t.primary}}>{v}</span><span style={{display:"block",fontSize:12,color:t.textMuted,marginTop:2}}>{l}</span></div>;}

    // ── StatsView ──
    function StatsView({catches,fp,S,t,onBack}){
      const filtered=catches.filter(c=>{
        if(fp.fR!=="Alle"&&c.river!==fp.fR)return false;
        if(fp.fS!=="Alle"&&c.species!==fp.fS)return false;
        if(fp.fY!=="Alle"&&new Date(c.date).getFullYear()!==+fp.fY)return false;
        return true;
      });
      const n=filtered.length;const big=filtered.reduce((m,c)=>Math.max(m,c.weight||0),0);const avg=n>0?(filtered.reduce((s,c)=>s+(c.weight||0),0)/n).toFixed(1):0;const cr=n>0?((filtered.filter(c=>c.released).length/n)*100).toFixed(0):0;
      const specC={},eqC={},rivC={},moC={};const moN=["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];
      filtered.forEach(c=>{specC[c.species]=(specC[c.species]||0)+1;eqC[c.equipment]=(eqC[c.equipment]||0)+1;rivC[c.river]=(rivC[c.river]||0)+1;moC[new Date(c.date).getMonth()]=(moC[new Date(c.date).getMonth()]||0)+1;});
      const maxMo=Math.max(...Object.values(moC),1);
      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onBack}>{I.back()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:26,fontWeight:700,color:t.text,margin:"0 0 4px"}}>Statistikk</h2>
        <Filters fp={fp} S={S} t={t}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}><BStat v={n} l="Fangster" t={t}/><BStat v={big||"—"} l="Største (kg)" t={t}/><BStat v={avg>0?avg:"—"} l="Snitt (kg)" t={t}/><BStat v={`${cr}%`} l="Gjenutsatt" t={t}/></div>
        {n>0&&<div style={S.sec}><p style={S.secT}>Per måned</p><div style={{display:"flex",gap:3,alignItems:"flex-end",height:100}}>{moN.map((m,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}><div style={{width:"100%",minHeight:2,height:`${((moC[i]||0)/maxMo)*100}%`,background:`linear-gradient(${t.primary},${t.accent})`,borderRadius:"3px 3px 0 0",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>{moC[i]>0&&<span style={{fontSize:9,color:t.name==="Mørk"?"#0f1a17":"#fff",fontWeight:700,marginTop:2}}>{moC[i]}</span>}</div><span style={{fontSize:10,color:t.textMuted,marginTop:3}}>{m}</span></div>))}</div></div>}
        {Object.keys(specC).length>0&&<BDSec title="Art" d={specC} n={n} t={t} S={S}/>}
        {Object.keys(eqC).length>0&&<BDSec title="Redskap" d={eqC} n={n} t={t} S={S}/>}
        {Object.keys(rivC).length>0&&<BDSec title="Elv" d={rivC} n={n} t={t} S={S}/>}
        <div style={{height:30}}/>
      </div>);
    }
    function BStat({v,l,t}){return <div style={{background:t.cardBg,borderRadius:14,padding:"16px 10px",textAlign:"center",border:`1px solid ${t.cardBorder}`}}><span style={{display:"block",fontSize:24,fontWeight:700,color:t.primary,fontFamily:t.titleFont}}>{v}</span><span style={{display:"block",fontSize:12,color:t.textMuted,marginTop:3}}>{l}</span></div>;}
    function BDSec({title,d,n,t,S}){const sorted=Object.entries(d).sort((a,b)=>b[1]-a[1]);return <div style={S.sec}><p style={S.secT}>{title}</p>{sorted.map(([k,v],i)=>{const pct=((v/n)*100).toFixed(0);return(<div key={k} style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:14,marginBottom:3}}><span style={{color:t.text}}>{k}</span><span style={{color:t.textMuted}}>{v} ({pct}%)</span></div><div style={{height:7,background:t.chipBg,borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:t.primary,borderRadius:4,transition:"width .4s"}}/></div></div>);})}</div>;}

    // ── FormView ──
    function FormView({onSave,onCancel,initial,isEdit,prefs,profile,allRivers,S,t}){
      const fileRef=useRef();
      const[form,setForm]=useState(()=>{
        if(initial)return{...initial,photos:initial.photos||[],is_public:initial.is_public||false};
        return{river:prefs?.lastRiver||"",beat:"",date:new Date().toISOString().split("T")[0],time:"",length:"",weight:"",equipment:prefs?.lastEquipment||"Flue",species:"Laks",released:true,photos:[],description:"",is_public:profile?.default_public||false};
      });
      const[newPhotoFiles,setNewPhotoFiles]=useState([]);
      const[newPhotoPreviews,setNewPhotoPreviews]=useState([]);
      const[weightManual,setWeightManual]=useState(false);
      const[estimatedWt,setEstimatedWt]=useState(null);
      const[saving,setSaving]=useState(false);

      const set=(k,v)=>setForm(f=>({...f,[k]:v}));
      const handleLength=val=>{set("length",val);if(val&&!weightManual){const est=estimateWeight(val);setEstimatedWt(est);if(est)set("weight",est);}if(!val&&val!==0){setEstimatedWt(null);if(!weightManual)set("weight",null);}};
      const handleWeight=val=>{set("weight",val);setWeightManual(true);};

      const handlePhotos=async(e)=>{
        const files=Array.from(e.target.files||[]);
        const blobs=await Promise.all(files.map(f=>resizeImage(f)));
        const previews=blobs.map(b=>URL.createObjectURL(b));
        setNewPhotoFiles(prev=>[...prev,...blobs]);
        setNewPhotoPreviews(prev=>[...prev,...previews]);
        e.target.value="";
      };

      const removeExistingPhoto=idx=>set("photos",form.photos.filter((_,i)=>i!==idx));
      const removeNewPhoto=idx=>{
        URL.revokeObjectURL(newPhotoPreviews[idx]);
        setNewPhotoFiles(prev=>prev.filter((_,i)=>i!==idx));
        setNewPhotoPreviews(prev=>prev.filter((_,i)=>i!==idx));
      };

      const valid=form.river&&form.date&&form.species;
      const submit=async()=>{setSaving(true);await onSave(form,newPhotoFiles);setSaving(false);};

      return(<div className="safe-top safe-bottom" style={S.page}>
        <div style={S.topBar}><button style={S.backBtn} onClick={onCancel}>{I.xLarge()}</button></div>
        <h2 style={{fontFamily:t.titleFont,fontSize:24,fontWeight:700,color:t.text,margin:"0 0 14px"}}>{isEdit?"Rediger fangst":"Ny fangst"}</h2>

        <div style={{marginBottom:10}}>
          {(form.photos.length>0||newPhotoPreviews.length>0)&&(
            <div className="photo-scroll" style={{marginBottom:8}}>
              {form.photos.map((p,i)=>(<div key={"e"+i} style={{position:"relative",width:140,height:105,borderRadius:12,overflow:"hidden",flexShrink:0}}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>removeExistingPhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:12,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.x()}</button></div>))}
              {newPhotoPreviews.map((p,i)=>(<div key={"n"+i} style={{position:"relative",width:140,height:105,borderRadius:12,overflow:"hidden",flexShrink:0}}><img src={p} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button onClick={()=>removeNewPhoto(i)} style={{position:"absolute",top:4,right:4,background:"rgba(0,0,0,.6)",border:"none",borderRadius:12,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#fff"}}>{I.x()}</button></div>))}
            </div>
          )}
          <button onClick={()=>fileRef.current?.click()} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",borderRadius:12,border:`2px dashed ${t.inputBorder}`,background:t.primaryLight,cursor:"pointer",color:t.textSec,fontSize:15,fontFamily:t.font,width:"100%",justifyContent:"center"}}>
            {I.imgPlus()} {(form.photos.length+newPhotoPreviews.length)===0?"Legg til bilder":"Legg til flere bilder"}
          </button>
          <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={handlePhotos}/>
        </div>

        <Lbl t="Elv *" th={t}/><RiverInput value={form.river} onChange={v=>set("river",v)} allRivers={allRivers} S={S} t={t}/>
        <Lbl t="Beat / Sone" th={t}/><input style={S.inp} placeholder="f.eks. Orton Estate" value={form.beat||""} onChange={e=>set("beat",e.target.value)}/>
        <div style={{display:"grid",gridTemplateColumns:"3fr 2fr",gap:8}}><div><Lbl t="Dato *" th={t}/><input style={{...S.inp,fontSize:15}} type="date" value={form.date} onChange={e=>set("date",e.target.value)}/></div><div><Lbl t="Klokkeslett" th={t}/><input style={{...S.inp,fontSize:15}} type="time" value={form.time||""} onChange={e=>set("time",e.target.value)}/></div></div>
        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><div><Lbl t="Lengde (cm)" th={t}/><NumInput placeholder="70" value={form.length} onChange={handleLength} S={S}/></div><div><Lbl t="Vekt (kg)" th={t}/><NumInput placeholder="3,3" value={form.weight} onChange={handleWeight} S={S}/></div></div>
        {estimatedWt&&!weightManual&&<p style={{fontSize:13,color:t.textSec,margin:"4px 0 0",fontStyle:"italic"}}>Estimert vekt: {estimatedWt} kg</p>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><Lbl t="Art *" th={t}/><select style={S.inp} value={form.species} onChange={e=>set("species",e.target.value)}>{SPECIES.map(s=><option key={s}>{s}</option>)}</select></div>
          <div><Lbl t="Redskap" th={t}/><select style={S.inp} value={form.equipment} onChange={e=>set("equipment",e.target.value)}>{EQUIPMENT.map(eq=><option key={eq}>{eq}</option>)}</select></div>
        </div>
        <Lbl t="Gjenutsatt?" th={t}/><div style={{display:"flex",gap:8}}><button style={form.released?S.togOn:S.togOff} onClick={()=>set("released",true)}>Ja</button><button style={!form.released?S.togOn:S.togOff} onClick={()=>set("released",false)}>Nei</button></div>

        <div style={{height:1,background:t.cardBorder,margin:"12px 0"}}/>

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",background:t.primaryLight,borderRadius:11,marginTop:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1,minWidth:0}}>
            {form.is_public?I.world():I.lock()}
            <div style={{minWidth:0}}>
              <p style={{fontSize:14,fontWeight:600,color:t.text,margin:0}}>{form.is_public?"Delt i felles feed":"Privat fangst"}</p>
              <p style={{fontSize:12,color:t.textMuted,margin:"2px 0 0"}}>{form.is_public?"Andre kan se denne fangsten":"Bare du ser denne fangsten"}</p>
            </div>
          </div>
          <button onClick={()=>set("is_public",!form.is_public)} style={{width:46,height:26,borderRadius:13,border:"none",background:form.is_public?t.primary:t.inputBorder,position:"relative",cursor:"pointer",flexShrink:0,transition:"background .2s"}}>
            <div style={{position:"absolute",top:3,left:form.is_public?23:3,width:20,height:20,borderRadius:10,background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
          </button>
        </div>

        <Lbl t="Notat" th={t}/><textarea style={{...S.inp,minHeight:70,resize:"vertical"}} placeholder="f.eks. Junction pool, tung strøm..." value={form.description||""} onChange={e=>set("description",e.target.value)}/>
        <button style={{...S.btnPriFull,opacity:(valid&&!saving)?1:.45,marginTop:20}} disabled={!valid||saving} onClick={submit}>
          {saving?"Lagrer...":(isEdit?"Lagre endringer":"Registrer fangst")}
        </button>
        <div style={{height:30}}/>
      </div>);
    }

    // ── Mount ──
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('/sw.js').catch(e=>console.log('SW:',e));});}</script>
</body>
</html>
